# Non-secret Omnigent server configuration example for local Docker Compose.
# Set OMNIGENT_CONFIG to a mounted config path only when overriding defaults.
# Secrets such as DATABASE_URL and cookie/OIDC secrets stay in environment vars.

host: 0.0.0.0
port: 8000
artifact_location: /data/artifacts

# Optional: the compose file provides DATABASE_URL via environment because it
# carries the database password. Use database_uri here only for a non-secret,
# self-managed connection string.
# database_uri: postgresql+psycopg://omnigent:password@postgres:5432/omnigent

admins: []
allowed_domains: []

# Optional managed-host sandbox config. Omit this section for the default
# external-host mode. When enabled, provider and server_url are required.
# sandbox:
#   provider: modal
#   server_url: https://omnigent.example.com
#   modal:
#     image: ghcr.io/omnigent-ai/omnigent-host:latest
