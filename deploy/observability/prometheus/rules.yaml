groups:
  - name: moonmind-recording
    rules:
      - record: moonmind:api_error_ratio:5m
        expr: sum(rate(moonmind_api_requests_total{outcome="failure"}[5m])) / clamp_min(sum(rate(moonmind_api_requests_total[5m])), 1)
      - record: moonmind:workflow_failure_ratio:1h
        expr: sum(rate(moonmind_workflow_started_total{outcome="failure"}[1h])) / clamp_min(sum(rate(moonmind_workflow_started_total[1h])), 1)
  - name: moonmind-alerts
    rules:
      - alert: MoonMindApiErrorBudgetBurn
        expr: moonmind:api_error_ratio:5m > 0.05
        for: 15m
        labels: {severity: ticket, owner: api}
        annotations:
          summary: API errors are consuming the provisional budget
          impact: Operators may be unable to submit or inspect work.
          dashboard: moonmind-overview
          runbook: docs/Runbooks/Observability/ServiceHealth.md
          query: Inspect API failure outcomes and correlated traces.
          recovery: Error ratio remains below the calibrated threshold for one hour.
          dedupe_key: moonmind-api-budget-burn
      - alert: MoonMindWorkflowFailureBudgetBurn
        expr: moonmind:workflow_failure_ratio:1h > 0.10
        for: 30m
        labels: {severity: ticket, owner: workflows}
        annotations:
          summary: Workflow failures are consuming the provisional budget
          impact: Supported workflow classes may not complete.
          dashboard: moonmind-overview
          runbook: docs/Runbooks/Observability/ServiceHealth.md
          query: Inspect bounded failure outcomes, then drill into Temporal by authorized link.
          recovery: Failure ratio remains below the calibrated threshold for one hour.
          dedupe_key: moonmind-workflow-budget-burn
      - alert: MoonMindCheckpointResumeIntegrityFailure
        expr: increase(moonmind_workflow_managed_checkpoint_restore_integrity_failure_total[5m]) > 0
        labels: {severity: critical, owner: reliability}
        annotations:
          summary: An admitted checkpoint restore failed integrity verification
          runbook: docs/Temporal/CheckpointResumePromotion.md
          recovery: Pause new Resume admissions; preserve and reconcile in-flight evidence.
      - alert: MoonMindCheckpointResumeFalseEligibility
        expr: increase(moonmind_workflow_checkpoint_resume_false_positive_eligibility_total[5m]) > 0
        labels: {severity: critical, owner: reliability}
        annotations:
          summary: Checkpoint Resume eligibility was exposed for an unsupported request
          runbook: docs/Temporal/CheckpointResumePromotion.md
          recovery: Pause new admissions and correct capability/readiness divergence.
      - alert: MoonMindCheckpointResumeDuplicateSideEffect
        expr: increase(moonmind_workflow_checkpoint_resume_duplicate_side_effect_total[5m]) > 0
        labels: {severity: critical, owner: reliability}
        annotations:
          summary: A recovery produced a duplicate non-idempotent side effect
          runbook: docs/Temporal/CheckpointResumePromotion.md
          recovery: Pause new admissions while allowing in-flight reconciliation.
      - alert: MoonMindCheckpointRestoreFailureRate
        expr: sum(rate(moonmind_workflow_managed_checkpoint_restore_failure_total[15m])) / clamp_min(sum(rate(moonmind_workflow_managed_checkpoint_restore_total[15m])), 1) > 0.05
        for: 10m
        labels: {severity: critical, owner: reliability}
        annotations:
          summary: Managed checkpoint restore failures exceed the promotion threshold
          runbook: docs/Temporal/CheckpointResumePromotion.md
          recovery: Pause new admissions and retain worker routes until recoveries drain.
      - alert: MoonMindCheckpointCredentialInclusion
        expr: increase(moonmind_workflow_checkpoint_resume_credential_inclusion_total[5m]) > 0
        labels: {severity: critical, owner: security}
        annotations:
          summary: Checkpoint validation detected credential material
          runbook: docs/Temporal/CheckpointResumePromotion.md
          recovery: Pause new admissions and investigate the capture exclusion boundary.
      - alert: MoonMindCheckpointSandboxAuthorityViolation
        expr: increase(moonmind_workflow_checkpoint_resume_managed_workspace_sandbox_route_total[5m]) > 0
        labels: {severity: critical, owner: reliability}
        annotations:
          summary: Checkpoint restore crossed the managed workspace sandbox route
          runbook: docs/Temporal/CheckpointResumePromotion.md
          recovery: Pause new admissions and restore the managed-runtime authority boundary.
      - alert: MoonMindCheckpointSourceStateDependency
        expr: increase(moonmind_workflow_checkpoint_resume_source_state_dependency_total[5m]) > 0
        labels: {severity: critical, owner: reliability}
        annotations:
          summary: Cold restore depended on source workspace or session state
          runbook: docs/Temporal/CheckpointResumePromotion.md
          recovery: Pause new admissions until a disposable source-independent restore passes.
      - alert: MoonMindCheckpointRouteReadinessDivergence
        expr: increase(moonmind_workflow_checkpoint_resume_route_readiness_divergence_total[5m]) > 0
        labels: {severity: critical, owner: reliability}
        annotations:
          summary: Recorded checkpoint route readiness diverged from deployed routes
          runbook: docs/Temporal/CheckpointResumePromotion.md
          recovery: Pause new admissions and reconcile the deployment readiness snapshot.
      - alert: MoonMindCheckpointCapabilityGenerationMismatch
        expr: increase(moonmind_workflow_checkpoint_resume_capability_generation_mismatch_total[5m]) > 0
        labels: {severity: critical, owner: reliability}
        annotations:
          summary: Checkpoint capability digest or deployment generation mismatched
          runbook: docs/Temporal/CheckpointResumePromotion.md
          recovery: Pause new admissions while retaining routes for frozen in-flight decisions.
      - alert: MoonMindCheckpointRequiredJourneyMissing
        expr: increase(moonmind_workflow_checkpoint_resume_required_journey_missing_total[5m]) > 0
        labels: {severity: critical, owner: reliability}
        annotations:
          summary: Required cold-resume promotion journey is missing or unhealthy
          runbook: docs/Temporal/CheckpointResumePromotion.md
          recovery: Pause new admissions until generation-bound journey evidence is green.
