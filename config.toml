[core]
workspace_base = "/workspace"

[runtime]
container_port_range_start = 52000
container_port_range_end = 52100

[llm]
model = "devstral:24b"
base_url = "http://ollama:11434"
custom_llm_provider = "ollama"

[google_drive]
# Optional: Enable Google Drive indexing
google_drive_enabled = false
# Optional: Comma-separated list of Google Drive folder IDs to index
google_drive_folder_id = ""
# Optional: Path to the Google Cloud service account JSON file for authentication
# This is also used by the Google Embeddings client if GOOGLE_API_KEY is not set.
google_application_credentials = "/path/to/your/service-account-file.json"

[workflow]
job_image = "ghcr.io/moonladderstudios/moonmind:latest"
workspace_root = "/work"
allow_manifest_path_source = false
manifest_required_capabilities = ["manifest"]
codex_queue = "codex"
artifact_root = "var/artifacts/workflows"
metrics_enabled = false
metrics_namespace = "automation"
# Provide to emit StatsD metrics (optional)
metrics_host = ""
metrics_port = 8125
# Attachment + vision defaults stay aligned with WorkflowSettings
agent_job_attachment_enabled = true
agent_job_attachment_max_count = 10
agent_job_attachment_max_bytes = 10485760
agent_job_attachment_total_bytes = 26214400
agent_job_attachment_allowed_content_types = ["image/png", "image/jpeg", "image/webp"]
moonmind_vision_context_enabled = true
moonmind_vision_provider = "gemini"
moonmind_vision_model = "models/gemini-2.5-flash"
moonmind_vision_max_tokens = 512
moonmind_vision_ocr_enabled = true

[workflow.self_heal]
# Default self-heal budgets enforced by Codex workers (docs/WorkerSelfHealSystem.md §8)
step_max_attempts = 3
step_timeout_seconds = 900
step_idle_timeout_seconds = 300
step_no_progress_limit = 2
job_self_heal_max_resets = 1

[orchestrator]
artifact_root = "var/artifacts/workflows"
statsd_host = ""
statsd_port = 8125

