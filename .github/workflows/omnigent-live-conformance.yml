name: Provider / Omnigent Live Conformance

on:
  schedule:
    - cron: "41 6 * * 1"
  workflow_dispatch:
    inputs:
      server_image:
        description: "Optional digest-pinned stock Omnigent server image override"
        required: false
        type: string
      host_image:
        description: "Optional digest-pinned stock Omnigent host image override"
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: omnigent-live-conformance
  cancel-in-progress: false

jobs:
  live-matrix:
    name: Live ${{ matrix.mode }} conformance
    runs-on: [self-hosted, linux, omnigent-provider-verification]
    environment: omnigent-provider-verification
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        mode: [product, stock, static, ondemand, failures]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -e .[tests]
      - name: Resolve pinned image inputs
        id: images
        shell: bash
        env:
          DISPATCH_SERVER_IMAGE: ${{ inputs.server_image }}
          DISPATCH_HOST_IMAGE: ${{ inputs.host_image }}
          DEFAULT_SERVER_IMAGE: ${{ vars.OMNIGENT_CONFORMANCE_SERVER_IMAGE }}
          DEFAULT_HOST_IMAGE: ${{ vars.OMNIGENT_CONFORMANCE_HOST_IMAGE }}
        run: |
          server_image="${DISPATCH_SERVER_IMAGE:-$DEFAULT_SERVER_IMAGE}"
          host_image="${DISPATCH_HOST_IMAGE:-$DEFAULT_HOST_IMAGE}"
          if [[ ! "$server_image" =~ @sha256:[0-9a-fA-F]{64}$ ]]; then
            echo "::error::The Omnigent server image must be configured by immutable digest"
            exit 1
          fi
          if [[ ! "$host_image" =~ @sha256:[0-9a-fA-F]{64}$ ]]; then
            echo "::error::The Omnigent host image must be configured by immutable digest"
            exit 1
          fi
          echo "server=$server_image" >> "$GITHUB_OUTPUT"
          echo "host=$host_image" >> "$GITHUB_OUTPUT"
      - name: Run credentialed live matrix case
        id: live_case
        env:
          OMNIGENT_ENABLED: ${{ vars.OMNIGENT_ENABLED }}
          OMNIGENT_SERVER_URL: ${{ vars.OMNIGENT_SERVER_URL }}
          OMNIGENT_API_TOKEN: ${{ secrets.OMNIGENT_API_TOKEN }}
          OMNIGENT_DEFAULT_AGENT_NAME: ${{ vars.OMNIGENT_DEFAULT_AGENT_NAME }}
          MOONMIND_OMNIGENT_ACTION_COMMAND: ${{ secrets.MOONMIND_OMNIGENT_ACTION_COMMAND }}
          MOONMIND_OMNIGENT_LOG_EVIDENCE: ${{ vars.MOONMIND_OMNIGENT_LOG_EVIDENCE }}
          MOONMIND_OMNIGENT_TEMPORAL_HISTORY_EVIDENCE: ${{ vars.MOONMIND_OMNIGENT_TEMPORAL_HISTORY_EVIDENCE }}
          MOONMIND_OMNIGENT_SCREENSHOT_EVIDENCE: ${{ vars.MOONMIND_OMNIGENT_SCREENSHOT_EVIDENCE }}
          MOONMIND_OMNIGENT_ARCHIVE_EVIDENCE: ${{ vars.MOONMIND_OMNIGENT_ARCHIVE_EVIDENCE }}
        run: |
          python tools/run_omnigent_live_conformance.py \
            --mode "${{ matrix.mode }}" \
            --server-image "${{ steps.images.outputs.server }}" \
            --host-image "${{ steps.images.outputs.host }}" \
            --output-dir "artifacts/omnigent-conformance/live/${{ matrix.mode }}"
      - name: Stage secret-safe case evidence
        if: always()
        shell: bash
        env:
          LIVE_CASE_OUTCOME: ${{ steps.live_case.outcome }}
        run: |
          source_dir="artifacts/omnigent-conformance/live/${{ matrix.mode }}"
          upload_dir="artifacts/omnigent-conformance/upload/${{ matrix.mode }}"
          mkdir -p "$upload_dir"
          if [[ "$LIVE_CASE_OUTCOME" == "success" ]]; then
            cp -R "$source_dir"/. "$upload_dir"/
          else
            printf '{"mode":"%s","status":"failed","evidence":"withheld-after-unsuccessful-safety-gate"}\n' \
              "${{ matrix.mode }}" > "$upload_dir/failure.json"
          fi
      - name: Upload case evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: omnigent-live-${{ matrix.mode }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/omnigent-conformance/upload/${{ matrix.mode }}
          if-no-files-found: error
          retention-days: 30

  publish-matrix:
    name: Publish passing matrix evidence
    needs: live-matrix
    if: ${{ needs.live-matrix.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download passing case evidence
        uses: actions/download-artifact@v8
        with:
          pattern: omnigent-live-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/omnigent-conformance/published
      - name: Write publication manifest
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          root = Path("artifacts/omnigent-conformance/published")
          reports = sorted(root.glob("*/report.json"))
          if len(reports) != 5:
              raise SystemExit(f"expected five passing reports, found {len(reports)}")
          report_payloads = [json.loads(path.read_text(encoding="utf-8")) for path in reports]
          for path, report in zip(reports, report_payloads):
              if report.get("schemaVersion") != "moonmind.omnigent.conformance-report/v1":
                  raise SystemExit(f"unsupported report schema: {path}")
              if report.get("summary", {}).get("failed"):
                  raise SystemExit(f"failed cases cannot be published: {path}")
              if not any(case.get("status") == "passed" for case in report.get("cases", [])):
                  raise SystemExit(f"report has no passing controlling case: {path}")
          product_paths = list(root.glob("*/product-evidence.json"))
          if len(product_paths) != 1:
              raise SystemExit(f"expected one product evidence document, found {len(product_paths)}")
          product = json.loads(product_paths[0].read_text(encoding="utf-8"))
          required_assertions = {
              "normal_create_api", "authored_intent_and_snapshot",
              "external_omnigent_compilation", "selected_profile_policy_workspace",
              "real_temporal_activity_route", "workflow_detail_sse", "release_last",
              "replay_after_host_removal", "no_fallback",
          }
          if any(product.get("assertions", {}).get(key) is not True for key in required_assertions):
              raise SystemExit("product evidence lacks a controlling assertion")
          required_records = {
              "runtimeCatalog", "createRequest", "authoredWorkflow", "taskInputSnapshot",
              "compiledExecutionRequest", "temporalHistory", "hostBinding", "profileLease",
              "workflowDetail", "bridgeEvents", "artifactInventory", "cleanupResult",
          }
          if not required_records.issubset(set(product.get("sourceRecordTypes", []))):
              raise SystemExit("product evidence lacks independently resolved production records")
          required_ids = {"workflowId", "runId", "stepId", "bridgeId", "hostId", "sessionId"}
          if any(not product.get("identifiers", {}).get(key) for key in required_ids):
              raise SystemExit("product evidence lacks safe lifecycle identifiers")
          selection = product.get("selection", {})
          if selection.get("agentKind") != "external" or selection.get("agentId") != "omnigent":
              raise SystemExit("product evidence is not the explicit Omnigent selection")
          if not product.get("schemaVersions") or not product.get("evidenceRefs"):
              raise SystemExit("product evidence lacks schema versions or durable evidence refs")
          manifest = {
              "schemaVersion": "moonmind.omnigent.product-acceptance/v1",
              "issue": "MoonLadderStudios/MoonMind#3456",
              "parentIssue": "MoonLadderStudios/MoonMind#3448",
              "runId": os.environ["GITHUB_RUN_ID"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "commit": os.environ["GITHUB_SHA"],
              "runUrl": (
                  f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}"
                  f"/actions/runs/{os.environ['GITHUB_RUN_ID']}"
              ),
              "artifactName": (
                  f"omnigent-live-published-matrix-{os.environ['GITHUB_RUN_ID']}-"
                  f"{os.environ['GITHUB_RUN_ATTEMPT']}"
              ),
              "reports": [str(path) for path in reports],
              "productEvidence": str(product_paths[0]),
              "productSchemaVersions": product["schemaVersions"],
              "selection": selection,
              "safeIdentities": product["identifiers"],
              "replayAfterHostRemoval": product["assertions"]["replay_after_host_removal"],
              "noFallback": product["assertions"]["no_fallback"],
              "modes": ["product", "stock", "static", "ondemand", "failures"],
              "status": "passed",
              "generatedAt": os.environ.get("GITHUB_RUN_STARTED_AT"),
              "producer": {"workflow": os.environ["GITHUB_WORKFLOW"], "runId": os.environ["GITHUB_RUN_ID"]},
              "supersessionPolicy": "newest passing report for the same commit and immutable image digests",
          }
          (root / "published-matrix.json").write_text(
              json.dumps(manifest, indent=2) + "\n", encoding="utf-8"
          )
          PY
      - name: Upload published matrix
        uses: actions/upload-artifact@v7
        with:
          name: omnigent-live-published-matrix-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/omnigent-conformance/published
          if-no-files-found: error
          retention-days: 90
      - name: Write publication summary
        shell: bash
        run: |
          {
            echo "### Omnigent credentialed conformance matrix"
            echo ""
            echo "- Issue: \`MoonLadderStudios/MoonMind#3456\` (parent \`#3448\`)"
            echo "- Result: product-create, stock, static, on-demand, and failure cases passed"
            echo "- Durable evidence: \`omnigent-live-published-matrix-${{ github.run_id }}-${{ github.run_attempt }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Link passing acceptance report from issues 3456 and 3448
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact="omnigent-live-published-matrix-${{ github.run_id }}-${{ github.run_attempt }}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          comment_file="${RUNNER_TEMP}/omnigent-matrix-comment.md"
          {
            echo "Credentialed Codex–Omnigent conformance matrix: PASS"
            echo
            echo "- Run: ${run_url} (attempt ${{ github.run_attempt }})"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Modes: \`product\`, \`stock\`, \`static\`, \`ondemand\`, \`failures\`"
            echo "- Durable artifact: \`${artifact}\`"
            echo "- Evidence refs and immutable image digests: the five \`report.json\` trees in \`${artifact}\`"
          } > "$comment_file"
          gh issue comment 3456 --repo "${{ github.repository }}" --body-file "$comment_file"
          gh issue comment 3448 --repo "${{ github.repository }}" --body-file "$comment_file"
