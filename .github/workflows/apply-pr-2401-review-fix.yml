name: Apply PR 2401 review fix

on:
  push:
    branches:
      - fetch-jira-issue-mm-795-through-the-dete-1bd111b9

permissions:
  contents: write

jobs:
  apply:
    if: github.repository == 'MoonLadderStudios/MoonMind'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Apply patch and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          patch_path=".moonmind/pr-2401-review-fix.patch"
          workflow_path=".github/workflows/apply-pr-2401-review-fix.yml"
          if [ ! -f "$patch_path" ]; then
            echo "Patch artifact is absent; nothing to apply."
            exit 0
          fi
          git config user.name "MoonMind Agent"
          git config user.email "agent@moonmind.local"
          git apply --index "$patch_path"
          rm -f "$patch_path" "$workflow_path"
          rmdir .moonmind 2>/dev/null || true
          git add -A
          git commit -m "Address operational metrics review feedback"
          git push origin "HEAD:${GITHUB_REF_NAME}"
