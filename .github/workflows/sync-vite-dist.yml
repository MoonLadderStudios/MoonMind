# Regenerates api_service/static/task_dashboard/dist/ when frontend inputs change and
# commits the result so Mission Control manifest entrypoints stay in sync (no manual ui:build).
#
# Does not run for pull requests from forks (GITHUB_TOKEN cannot push to the contributor's fork).

name: Sync Vite dist

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - '**'
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: sync-vite-dist-${{ github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Check out head branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies and build UI
        run: |
          npm ci
          npm run ui:build

      - name: Commit and push dist when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api_service/static/task_dashboard/dist/
          if git diff --staged --quiet; then
            echo "Vite dist already matches source; nothing to commit."
            exit 0
          fi
          git commit -m "chore(ui): sync Vite dist"
          git push
