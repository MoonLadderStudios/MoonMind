# Convenience only: commits refreshed dist/ when inputs change so clones match recent source.
# CI, Docker, and production images build the UI from source; committed dist/ is not authoritative.
# Run on branch pushes only so PRs see one authoritative sync check instead of duplicated push/pull_request runs.

name: Sync Vite dist

on:
  push:
    branches:
      - '**'
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tailwind.config.cjs'
      - 'postcss.config.cjs'
      - 'api_service/static/task_dashboard/dashboard.tailwind.css'
      - 'api_service/templates/**'
      - '.npmrc'
      - '.nvmrc'

concurrency:
  group: sync-vite-dist-${{ github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out head branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies and build UI
        run: |
          npm ci
          npm run ui:clean-dist
          npm run ui:build
          npm run ui:verify-manifest

      - name: Commit and push dist when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api_service/static/task_dashboard/dist/
          if git diff --staged --quiet; then
            echo "Vite dist already matches source; nothing to commit."
            exit 0
          fi
          git commit -m "chore(ui): sync Vite dist"
          git push
