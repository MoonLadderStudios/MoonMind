          12. Unsaved Create draft warnings, when required, are accessible before route-changing mode changes complete.

          ---''',
              f"{path} accessibility section",
          )
          text = replace_optional(
              text,
              "1. A page must declare mode behavior before the masthead control appears on that page.",
              "1. A page must declare mode behavior before the shell/workspace control appears for that page.",
              f"{path} future extension wording",
          )
          text = replace_optional(
              text,
              "1. The masthead renders the list display radio group immediately after the MoonMind brand on Workflows and Create surfaces.",
              "1. The Workflow shell/workspace utility region renders the list display radio group on Workflows and Create surfaces.",
              f"{path} test placement wording",
          )
          text = replace_optional(
              text,
              "20. Keyboard users can operate the masthead radio group and receive deterministic focus after navigation.",
              "20. Keyboard users can operate the shell/workspace radio group and receive deterministic focus after navigation.",
              f"{path} test keyboard wording",
          )
          save(path, text)


          # Workflow workspace: update control terminology and repair layout numbering.
          path = "docs/UI/WorkflowWorkspaceSidebar.md"
          text = load(path)
          text = text.replace("masthead list-mode control", "shell/workspace list-mode control")
          text = text.replace("masthead list display radio group", "shell/workspace list display radio group")
          text = text.replace("masthead radio group", "shell/workspace radio group")
          text = text.replace("masthead `table` mode", "shell/workspace `table` mode")
          text = replace_optional(
              text,
              "2. `WorkflowsWorkspacePage` owns desktop workspace composition, route-derived workspace mode, list context, sidebar visibility preference, and split layout.",
              "2. `WorkflowsWorkspacePage` owns desktop workspace composition, route-derived workspace mode, list context, sidebar visibility preference, split layout, and Workflow collection utility state.",
              f"{path} workspace ownership",
          )
          text = replace_optional(
              text,
              "1. `DashboardShell` owns global app providers, masthead, global navigation, route-level error boundaries, and capability state.",
              "1. `DashboardShell` owns global app providers, the application rail, global utilities, route-level error boundaries, and capability state.",
              f"{path} shell ownership",
          )
