name: Clean up shared layout documentation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - .github/workflows/docs-contract-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out documentation branch
        uses: actions/checkout@v4
        with:
          ref: docs/m1-shared-sidebar-detail-contract
          fetch-depth: 0

      - name: Apply and validate cleanup
        shell: bash
        run: |
          cat > /tmp/docs_contract_cleanup.py <<'PY'
          from pathlib import Path

          ROOT = Path.cwd()


          def load(path: str) -> str:
              return (ROOT / path).read_text(encoding="utf-8")


          def save(path: str, text: str) -> None:
              (ROOT / path).write_text(text.rstrip() + "\n", encoding="utf-8")


          def replace_optional(text: str, old: str, new: str, label: str) -> str:
              if old in text:
                  return text.replace(old, new)
              if new in text:
                  return text
              raise RuntimeError(f"missing replacement anchor for {label}: {old[:120]!r}")


          def replace_section(text: str, start: str, end: str, replacement: str, label: str) -> str:
              try:
                  a = text.index(start)
                  b = text.index(end, a)
              except ValueError as exc:
                  raise RuntimeError(f"missing section markers for {label}: {start!r} -> {end!r}") from exc
              return text[:a] + replacement.rstrip() + "\n\n" + text[b:]


          # Dashboard design system: preserve detailed component rules and remove duplicate heading.
          path = "docs/UI/DashboardDesignSystem.md"
          text = load(path)
          text = replace_optional(
              text,
              "- **Constrained shell** for mastheads, forms, compact controls, and narrative content: roughly `1100-1280px`",
              "- **Constrained primary-pane shell** for page headers, forms, compact controls, and narrative content: roughly `1100-1280px`",
              f"{path} constrained shell wording",
          )
          text = replace_section(
              text,
              "### 10.1 Application rail and collection sidebars",
              "### 10.2 Buttons",
              r'''### 10.1 Application rail and collection sidebars

          Top-level destinations render in the far-left application rail. The rail is a persistent shell primitive rather than a page-level card or a centered row of navigation pills.

          Application-rail rules:

          - active destinations must be unmistakable;
          - hover, focus, and active states brighten rather than darken;
          - icon and label spacing uses shared metrics;
          - an active destination may use controlled bloom and a slightly stronger shell;
          - the rail uses a refined edge-light or horizon separator at its content boundary;
          - version, environment, account, and settings utilities read like a consistent telemetry/utility cluster rather than leftover labels.

          Collection sidebars reuse one header, filter, row, selected state, divider, scrolling container, pinned-current row, and loading/empty/error treatment. They must read as collapsed table slices rather than card stacks. Entity-specific copy and data are adapters; CSS and interaction primitives are shared.

          Collection-sidebar rules:

          - Workflows, Recurring, and Skills share width, header height, row metrics, padding, borders, focus rings, hover treatment, selected treatment, and state components;
          - header copy, row data, compact metadata, filter labels, and accessible names are supplied by the entity adapter;
          - the right divider clearly separates local collection navigation from the primary pane;
          - active state remains visible without relying on color alone;
          - the rail and sidebar remain coherent without liquidGL;
          - use glass only for bounded control shells and matte/satin row interiors for sustained scanning.

          ''',
              f"{path} component navigation section",
          )
          text = replace_optional(
              text,
              "- horizon line beneath the masthead",
              "- horizon or edge-light separator at the application-rail/content boundary or beneath a page header",
              f"{path} separator wording",
          )
          duplicate = (
              "---\n\n"
              "## 12. Accessibility and performance\n\n"
              "---\n\n"
              "## 12. Accessibility and performance\n"
          )
          text = replace_optional(
              text,
              duplicate,
              "---\n\n## 12. Accessibility and performance\n",
              f"{path} duplicate accessibility heading",
          )
          text = replace_section(
              text,
              "### 11.3 Workflow and recurring schedule detail pages",
              "## 12. Accessibility and performance",
              r'''### 11.3 Workflow and recurring schedule detail pages

          Workflow detail and Recurring schedule detail use the shared `EntityDetailFrame` defined by `docs/UI/CollectionWorkspaceLayout.md`.

          Shared composition includes:

          - concise breadcrumb and summary header;
          - title, subtitle, identity, and status cluster;
          - primary and overflow actions in a consistent location;
          - compact summary/facts strip;
          - tabs or section navigation;
          - main data/evidence slab;
          - optional right facts rail;
          - localized loading, permission, not-found, and error states;
          - an elevated or sticky action surface when the entity needs persistent controls.

          Typography, spacing, status chips, action placement, tabs, facts-rail geometry, focus behavior, and responsive stacking must match. Workflow adapters supply execution progress, evidence, logs, artifacts, remediation, and recovery. Recurring adapters supply cadence, next run, policy, configuration, and run history.

          The collection sidebar remains a workspace sibling at the far-left content edge. It is never owned by or centered with the detail frame. Do not allow glass effects to compete with evidence density.

          ---''',
              f"{path} shared detail page section",
          )
          if text.count("## 12. Accessibility and performance") != 1:
              raise RuntimeError(f"{path} must contain exactly one Section 12 heading")
          save(path, text)


          # SPA shell: restore provider ownership while keeping far-left geometry canonical.
          path = "docs/UI/DashboardSPAArchitecture.md"
          text = load(path)
          text = replace_section(
              text,
              "## 8. Shell, application rail, and collection workspaces",
              "## 9. Capability and endpoint discovery",
              r'''## 8. Shell, application rail, and collection workspaces

          The React-owned `DashboardShell` provides global providers plus a persistent application rail.

          The shell owns:

          - `QueryClientProvider`;
          - router provider;
          - UI info/capability provider;
          - theme provider;
          - global alert/toast provider;
          - live update provider;
          - route-level loading and error boundaries;
          - optional command palette provider;
          - shared workspace and collection-display state.

          On desktop, the application rail is the first column at the viewport's far-left edge. It contains the brand and top-level links, including Workflows, Create, Recurring, and Skills. Primary navigation is not recreated as a centered masthead pill row. Navigation uses router-native links (`Link`, `NavLink`, or equivalent), and active state comes from the current route rather than direct DOM mutation.

          Immediately to the right, the dashboard content region hosts route-family workspaces. A collection workspace may render a collection sidebar as its first column and a primary pane as its second. The workspace grid is fluid and must not be nested in a centered/max-width page wrapper. Readable-width limits belong inside the primary pane.

          `docs/UI/CollectionWorkspaceLayout.md` is canonical for geometry, shared sidebar anatomy, and the common Workflow/Recurring detail frame. List-display controls for participating collections live in the shell/workspace utility area associated with that collection.

          Required shell primitives include `ApplicationRail`, `DashboardContent`, `CollectionWorkspace`, `CollectionSidebar`, and `EntityDetailFrame`. Workflows, Recurring, and Skills supply adapters rather than copying layout or CSS.

          Legacy server-rendered navigation partials should be removed after the SPA shell owns the application rail and global utilities. On tablet/mobile, the application rail and collection sidebar may collapse into drawers or list-to-detail flows. Non-rendered desktop controls must be absent from the accessibility tree.

          ---''',
              f"{path} shell section",
          )
          save(path, text)


          # Recurring schedule detail: restore explicit tab behavior.
          path = "docs/UI/RecurringScheduleDetailsPage.md"
          text = load(path)
          text = replace_section(
              text,
              "## 6. Default Detail Layout",
              "## 7. Data Contract",
              r'''## 6. Default Detail Layout

          ```text
          ┌──────────────────┬──────────────────────────┬───────────────────────────────────────────┐
          │ Application rail │ Recurring sidebar        │ Shared EntityDetailFrame                  │
          │ viewport far-left│ content-region far-left  │ breadcrumb + title/state + actions        │
          │                  │                          │ summary/facts + tabs + main + facts rail  │
          └──────────────────┴──────────────────────────┴───────────────────────────────────────────┘
          ```

          The frame uses the same header spacing, panel rhythm, status family, action placement, summary strip, tabs, facts rail, loading states, error states, and responsive stacking as Workflow detail. Workflow-only steps, artifacts, logs, and remediation are not copied onto the schedule definition.

          Default tab behavior:

          - **Overview** shows the schedule summary, next run, cadence, timezone, target, policy, and latest dispatch status.
          - **Runs** loads recent and historical runs from `/api/recurring-workflows/{definitionId}/runs`; each spawned run links to its Workflow detail page.
          - **Configuration** shows editable schedule fields in read-only form until the user chooses **Edit schedule**.
          - **Activity** is optional and may show audit events, reconciliation warnings, and the latest Temporal describe metadata when available.

          ---''',
              f"{path} default detail section",
          )
          save(path, text)


          # Recurring workspace: restore detailed control/accessibility contracts and fix numbering.
          path = "docs/UI/RecurringSchedulesPage.md"
          text = load(path)
          text = replace_optional(
              text,
              "masthead list display behavior for recurring schedules",
              "shell/workspace list display behavior for recurring schedules",
              f"{path} canonical metadata",
          )
          text = replace_optional(
              text,
              "reference for the masthead list display radio group",
              "reference for the shell/workspace list display radio group",
              f"{path} related-doc wording",
          )
          text = replace_section(
              text,
              "## 6. Shell/workspace list display radio control",
              "## 7. Default full-table page layout",
              r'''## 6. Shell/workspace list display radio control

          The list display selector belongs to the current Recurring collection's shell/workspace utility region. It remains adjacent to route and collection context without becoming a centered masthead element or moving into page content, the Recurring sidebar, or the table toolbar.

          ```text
          [Application rail] [Recurring sidebar when visible] [Recurring utility + primary pane]
          ```

          Recurring-specific control contract:

          | Mode | Icon | Accessible label | Tooltip/title |
          | --- | --- | --- | --- |
          | `hidden` | `Square` | `No list` | `No list` |
          | `sidebar` | `PanelLeft` | `Sidebar list` | `Sidebar list` |
          | `table` | `Rows3` | `Full table` | `Full table` |

          Rules:

          1. The control is one radio group, not three unrelated buttons.
          2. On Recurring routes, expose a stable accessible name such as `Recurring list display`.
          3. Each option uses native radio semantics or `role="radio"` with `aria-checked`.
          4. The selected option reflects the resolved mode after route transitions settle.
          5. Keyboard users Tab into the group and use arrow keys to move between options.
          6. Each icon-only option has an accessible name and visible focus state.
          7. Hover, selected, disabled, and focus states use the shared dashboard control tokens.
          8. `table` always means the full Recurring table at `/schedules`.
          9. `sidebar` always means a Recurring schedule sidebar beside Recurring schedule detail.
          10. `hidden` keeps the current detail route and removes only the Recurring collection sidebar.
          11. The Recurring detail page must never show Workflow rows as its list region.
          12. Recurring preference and selection state remain independent from Workflow state.
          13. Routes without declared Recurring list-display behavior hide the control.
          14. Mobile omits desktop-only modes until a mobile-specific contract exists.

          Implementation guidance:

          - Generalize the display-mode registry so Workflows and Recurring are entity-aware participants in one shell/workspace control pattern.
          - Share icons, radio semantics, focus behavior, and visual treatment while preserving entity-specific labels and route resolution.
          - Do not duplicate separate, visually divergent controls for each route family.

          ---''',
              f"{path} list display control section",
          )
          text = replace_optional(
              text,
              '''Desired layout:

          ```text
          Global masthead / nav

          Recurring table control band
            [+]  Total  Active  Next 24h  Attention      [optional refresh/live state]

          Full recurring schedules table
            column filters / view options / table / pagination / live-update state
          ```''',
              '''Desired layout:

          ```text
          Far-left application rail │ Recurring page
                                    │ Page header / route context
                                    │ Recurring table control band
                                    │   [+] Total Active Next 24h Attention [optional refresh/live]
                                    │ Full recurring schedules table
                                    │   filters / view options / table / pagination / live state
          ```''',
              f"{path} full-table diagram",
          )
          text = replace_optional(
              text,
              "1. Leave deliberate space between the masthead/nav and the table.\n2. Use that space for the compact create action and summary metrics.\n3. The `+` action should be visually near the summary strip, not buried inside the global masthead.",
              "1. Leave deliberate space between the page header/route context and the table.\n2. Use that space for the compact create action and summary metrics.\n3. The `+` action should be visually near the summary strip, not buried inside the application rail or global shell.",
              f"{path} full-table spacing rules",
          )
          text = replace_section(
              text,
              "## 11. Recurring schedule sidebar",
              "## 12. Detail page composition",
              r'''## 11. Recurring schedule sidebar

          When a user opens `/schedules/{definitionId}` on desktop, the workspace shows a recurring schedule sidebar by default.

          The sidebar is the collapsed table-slice version of the Recurring table. It is not a generic nav menu and not the Workflows sidebar.

          Suggested shape:

          ```text
          ┌──────────────────────────────┐
          │ Recurring                    │
          ├──────────────────────────────┤
          │ Nightly code scan            │
          │ Active · next 2:00 AM        │
          ├──────────────────────────────┤
          │ Weekly manifest refresh      │
          │ Paused · next —              │
          └──────────────────────────────┘
          ```

          Rules:

          1. The sidebar uses the shared `CollectionSidebar` shell, header, filter, row metrics, selected/focus states, divider, scrolling, and localized state components.
          2. It is the first content-region column immediately right of the far-left application rail and is never wrapped inside the detail frame or a centered page container.
          3. Sidebar rows link to `/schedules/{definitionId}`.
          4. The active schedule row exposes `aria-current="page"`.
          5. The sidebar has an accessible name such as `Recurring schedule navigation`.
          6. The sidebar list uses the same authorized recurring schedule API family as the full table when possible.
          7. The sidebar should reuse cached Recurring table data when the query matches.
          8. Sidebar failures do not block selected detail from rendering.
          9. Detail failures do not erase a successfully loaded sidebar.
          10. The sidebar header row remains visible during loading, empty, and error states.
          11. Sidebar row height is compatible with the table's first-column row height.
          12. Status and next-run summaries may appear only when they fit the shared row height.
          13. Sidebar rows must not grow individually based on long descriptions, errors, payloads, or target metadata.
          14. Long names clamp; full names remain available through accessible text or title attributes when appropriate.
          15. Sidebar filtering/search may be deferred; the first implementation may show the current effective table query or a compact default authorized list.
          16. The sidebar may include a compact create affordance only when it does not duplicate or conflict with the full-table create action and detail actions.
          17. Clicking a spawned Workflow run inside detail navigates to the Workflow detail route and does not change the Recurring sidebar selection.

          Visual contract:

          1. The sidebar reads as the first-column slice of the full Recurring table.
          2. Header typography, row height, divider, hover, selected, and focus states align with the full table and the shared collection-sidebar tokens.
          3. Do not style the sidebar as cards, a menu, or a separate navigation rail.
          4. The sidebar's right divider aligns with shared table/list divider tokens.
          5. Reduced-motion users do not see large layout animations when switching between table and sidebar modes.

          ---''',
              f"{path} recurring sidebar section",
          )
          text = replace_optional(
              text,
              "keep masthead mode selector available",
              "keep the shell/workspace mode selector available",
              f"{path} list-error state",
          )
          text = replace_optional(
              text,
              "3. Masthead list display radio control is available on Recurring routes.",
              "3. The shell/workspace list display radio control is available on Recurring routes.",
              f"{path} responsive desktop control",
          )
          text = replace_section(
              text,
              "## 18. Accessibility requirements",
              "## 19. Motion and continuity",
              r'''## 18. Accessibility requirements

          Rules:

          1. The shell/workspace mode selector has a stable accessible name such as `Recurring list display`.
          2. The mode selector uses radio semantics and announces checked state.
          3. The mode selector is keyboard reachable in the Recurring collection utility region after route/page context.
          4. Route-changing mode switches restore focus deterministically to the page title, selected schedule row, active sidebar row, or detail heading.
          5. The full table has an accessible name such as `Recurring schedules`.
          6. The sidebar has an accessible name such as `Recurring schedule navigation`.
          7. The sidebar header row is not announced as a selectable schedule.
          8. Active sidebar links expose `aria-current="page"`.
          9. The create button has visible text or an accessible label such as `Create recurring schedule`.
          10. Status and attention are not conveyed by color alone.
          11. Error and permission messages use appropriate live-region or alert semantics when they appear after user action.
          12. Icon-only controls have accessible names and visible focus states.
          13. Mobile users must not encounter hidden desktop-only sidebar controls in the accessibility tree.
          14. Long schedule names and IDs remain accessible even when visually truncated.

          ---''',
              f"{path} accessibility section",
          )
          text = replace_optional(
              text,
              "2. Preserve dashboard shell and masthead continuity.",
              "2. Preserve `DashboardShell`, application-rail, and collection-utility continuity.",
              f"{path} motion continuity",
          )
          text = replace_optional(
              text,
              "3. The area between masthead/nav and table includes the create action plus Total, Active, Next 24h, and Attention metrics.",
              "3. The area between the page header/route context and table includes the create action plus Total, Active, Next 24h, and Attention metrics.",
              f"{path} test layout wording",
          )
          text = replace_optional(
              text,
              "5. The masthead renders the list display radio group on Recurring routes with `No list`, `Sidebar list`, and `Full table` options.",
              "5. The shell/workspace utility region renders the list display radio group on Recurring routes with `No list`, `Sidebar list`, and `Full table` options.",
              f"{path} test control placement",
          )
          text = replace_optional(
              text,
              "20. Keyboard users can operate the masthead radio group and receive deterministic focus after navigation.",
              "20. Keyboard users can operate the shell/workspace radio group and receive deterministic focus after navigation.",
              f"{path} test keyboard wording",
          )
          text = replace_optional(
              text,
              "7. Add tests for route/mode resolution, masthead radio semantics, summary metrics, sidebar selection, and one-off exclusion.",
              "7. Add tests for route/mode resolution, shell/workspace radio semantics, summary metrics, sidebar selection, and one-off exclusion.",
              f"{path} rollout wording",
          )
          save(path, text)


          # Workflow list modes: retain the detailed control contract in its new shell/workspace location.
          path = "docs/UI/WorkflowListDisplayModes.md"
          text = load(path)
          text = replace_optional(
              text,
              "Canonical for: Workflows/Create list display modes, masthead list-mode control, workflow sidebar/table visual continuity, and first-workflow selection fallback when the list is hidden",
              "Canonical for: Workflows/Create list display modes, shell/workspace list-mode control, workflow sidebar/table visual continuity, and first-workflow selection fallback when the list is hidden",
              f"{path} canonical metadata",
          )
          text = replace_optional(
              text,
              "This document narrows and supersedes only the list-display mode and masthead control portions",
              "This document narrows and supersedes only the list-display mode and shell/workspace control portions",
              f"{path} relationship wording",
          )
          text = replace_optional(
              text,
              "collapse into the shared masthead radio group",
              "collapse into the shared shell/workspace radio group",
              f"{path} superseding control wording",
          )
          text = replace_optional(
              text,
              "1. `requestedMode` is what the user selected in the masthead control.",
              "1. `requestedMode` is what the user selected in the shell/workspace control.",
              f"{path} requested-mode wording",
          )
          text = replace_section(
              text,
              "## 6. Shell/workspace list display control",
              "## 7. Surface composition",
              r'''## 6. Shell/workspace list display control

          The list display selector belongs to the current collection's shell/workspace utility region. It remains adjacent to route and collection context without becoming a centered masthead element or moving into page content, the collection sidebar, or a table toolbar.

          ```text
          [Application rail] [Workflow sidebar when visible] [Workflow utility + primary pane]
          ```

          Control contract:

          | Mode | Icon | Accessible label | Tooltip/title |
          | --- | --- | --- | --- |
          | `hidden` | `Square` | `No list` | `No list` |
          | `sidebar` | `PanelLeft` | `Sidebar list` | `Sidebar list` |
          | `table` | `Rows3` | `Full screen table` | `Full screen table` |

          Rules:

          1. Use the canonical Lucide icons `Square`, `PanelLeft`, and `Rows3`.
          2. The control is one radio group, not three unrelated buttons.
          3. On Workflow routes, expose a stable accessible name such as `Workflow list display`.
          4. Each option uses native radio semantics or `role="radio"` with `aria-checked`.
          5. The selected option reflects the resolved current mode after required navigation or selection resolution.
          6. Keyboard users Tab into the group and use arrow keys to move between options.
          7. Each icon-only option has an accessible name and visible focus state.
          8. Hover, selected, disabled, and focus states use shared dashboard control tokens.
          9. The shell supplies common placement and styling; each participating collection supplies its accessible name and route-resolution contract.
          10. Workflow and Recurring preferences remain independent.
          11. Routes without a declared display-mode contract hide the control.
          12. Mobile omits desktop-only modes until a mobile-specific contract exists.

          ---''',
              f"{path} list display control section",
          )
          text = replace_optional(
              text,
              "4. The masthead radio group remains available so the user can reopen the sidebar or return to the table.",
              "4. The shell/workspace radio group remains available so the user can reopen the sidebar or return to the table.",
              f"{path} detail-hidden control wording",
          )
          text = replace_optional(
              text,
              "3. The masthead radio group remains available so the user can open the sidebar or navigate to the table.",
              "3. The shell/workspace radio group remains available so the user can open the sidebar or navigate to the table.",
              f"{path} create-hidden control wording",
          )
          text = replace_optional(
              text,
              '''Rules:

          1. The sidebar is owned by the workspace/layout composition layer, not by the detail page body.
          2. It is the first dashboard-content column immediately right of the far-left application rail; it is never inside the detail page's centered/max-width wrapper.
          2. Sidebar row links navigate to canonical workflow detail URLs.
          3. The active workflow row uses `aria-current="page"`.
          4. Sidebar list failures do not prevent the selected detail from rendering.
          5. Detail failures do not erase a successfully loaded sidebar.''',
              '''Rules:

          1. The sidebar is owned by the workspace/layout composition layer, not by the detail page body.
          2. It is the first dashboard-content column immediately right of the far-left application rail; it is never inside the detail page's centered/max-width wrapper.
          3. Sidebar row links navigate to canonical workflow detail URLs.
          4. The active workflow row uses `aria-current="page"`.
          5. Sidebar list failures do not prevent the selected detail from rendering.
          6. Detail failures do not erase a successfully loaded sidebar.''',
              f"{path} detail sidebar numbering",
          )
          text = replace_optional(
              text,
              "10. The route may change, but the dashboard shell and masthead remain mounted.",
              "10. The route may change, but `DashboardShell`, the application rail, and the collection utility region remain mounted.",
              f"{path} motion continuity",
          )
          text = replace_optional(
              text,
              "6. List refetching must not steal focus from the Create form, Workflow Detail, or masthead mode control.",
              "6. List refetching must not steal focus from the Create form, Workflow Detail, or shell/workspace mode control.",
              f"{path} data-focus wording",
          )
          text = replace_section(
              text,
              "## 12. Accessibility requirements",
              "## 13. Empty, loading, and error states",
              r'''## 12. Accessibility requirements

          Rules:

          1. The shell/workspace mode selector is keyboard reachable in the Workflow collection utility region after route/page context.
          2. The mode selector has a stable accessible name such as `Workflow list display`.
          3. Each option announces its label and checked state.
          4. Changing to a mode that navigates routes moves focus deterministically after navigation.
