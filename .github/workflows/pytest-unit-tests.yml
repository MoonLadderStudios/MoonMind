name: Run Pytest Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.head_ref || github.ref }}
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev pkg-config
    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .[tests]
        python -m pip install pre-commit readmeai~=0.6.0
    - name: Run pre-commit
      id: pre_commit
      run: pre-commit run --all-files
      continue-on-error: true
    - name: Commit changes
      id: auto_commit
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: "style: auto-fixes from pre-commit"
    - name: Fail if pre-commit failed and no changes were auto-fixed
      if: steps.pre_commit.outcome == 'failure' && steps.auto_commit.outputs.changes_detected == 'false'
      run: exit 1
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install Node dependencies
      run: npm ci
    - name: Verify dashboard CSS build is in sync
      run: |
        npm run dashboard:css:min
        git diff --exit-code -- api_service/static/task_dashboard/dashboard.css
    - name: Run pytest unit tests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        ./tools/test_unit.sh --python-only --no-xdist tests/unit/workflows > /tmp/unit-workflows.log 2>&1 &
        pid_workflows=$!

        ./tools/test_unit.sh --python-only --no-xdist \
          tests/unit/api \
          tests/unit/api_service \
          tests/unit/auth \
          tests/unit/config \
          tests/unit/planning \
          tests/unit/services \
          tests/unit/specs \
          > /tmp/unit-api.log 2>&1 &
        pid_api=$!

        ./tools/test_unit.sh --python-only --no-xdist \
          tests/unit/agents \
          tests/unit/celery_worker \
          tests/unit/claude \
          tests/unit/factories \
          tests/unit/indexers \
          tests/unit/jules \
          tests/unit/manifest \
          tests/unit/mcp \
          tests/unit/moonmind \
          tests/unit/test_batch_pr_resolver.py \
          tests/unit/test_models_cache.py \
          tests/unit/test_pr_resolver_tools.py \
          tests/unit/test_sync.py \
          > /tmp/unit-misc.log 2>&1 &
        pid_misc=$!

        status=0
        wait "$pid_workflows" || status=$?
        wait "$pid_api" || status=$?
        wait "$pid_misc" || status=$?

        cat /tmp/unit-workflows.log
        cat /tmp/unit-api.log
        cat /tmp/unit-misc.log

        if [[ "$status" -ne 0 ]]; then
          exit "$status"
        fi

        ./tools/test_unit.sh --dashboard-only


