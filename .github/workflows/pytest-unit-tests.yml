name: Run Pytest Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pytest-unit-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev pkg-config
    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .[tests]
    - name: Verify Node.js runtime
      run: |
        node --version
        npm --version
    - name: Install Node dependencies
      run: npm ci
    - name: Verify dashboard CSS build is in sync
      run: |
        npm run dashboard:css:min
        git diff --exit-code -- api_service/static/task_dashboard/dashboard.css
    - name: Run pytest unit tests
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        ./tools/test_unit.sh


