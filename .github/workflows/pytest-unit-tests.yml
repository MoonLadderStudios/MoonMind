name: Run Pytest Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pytest-unit-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev pkg-config
    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies via uv
      run: |
        python -m pip install --upgrade pip uv
        uv pip install --system -e .[tests]
    - name: Set up Node.js for UI build
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - name: Install Node dependencies
      run: npm ci
    - name: Build frontend assets for backend tests
      run: npm run ui:build
    - name: Run pytest unit tests
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        ./tools/test_unit.sh --python-only

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - name: Install Node dependencies
      run: npm ci
    - name: Run frontend typecheck
      run: npm run ui:typecheck
    - name: Run frontend lint
      run: npm run ui:lint
    - name: Run frontend unit tests
      run: npm run ui:test
    - name: Build frontend
      run: npm run ui:build
    - name: Verify generated artifact
      run: npm run ui:verify-manifest
    - name: Upload Mission Control dist artifact
      uses: actions/upload-artifact@v7
      with:
        name: mission-control-dist
        path: api_service/static/task_dashboard/dist/
        if-no-files-found: error
