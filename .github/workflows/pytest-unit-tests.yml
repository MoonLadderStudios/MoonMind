name: Run Pytest Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pytest-unit-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev pkg-config
    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies via uv
      run: |
        python -m pip install --upgrade pip uv
        uv pip install --system -e .[tests]
    - name: Run pytest unit tests
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        ./tools/test_unit.sh --python-only

  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Install Node dependencies
      run: npm ci
    - name: Verify dashboard CSS build is in sync
      run: |
        npm run dashboard:css:min
        git diff --exit-code -- api_service/static/task_dashboard/dashboard.css
    - name: Set up Python for OpenAPI generation
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install system dependencies for backend API check
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev pkg-config
    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install backend dependencies via uv
      run: |
        python -m pip install --upgrade pip uv
        uv pip install --system -e .[tests]
    - name: Run frontend tests and build
      run: |
        npm run ui:typecheck
        npm run ui:lint
        npm run ui:test
        npm run ui:clean-dist
        npm run ui:build
        npm run ui:verify-manifest
        npm run api:types:check
    - name: Upload Mission Control dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: mission-control-dist
        path: api_service/static/task_dashboard/dist/
        if-no-files-found: error
    - name: Run dashboard legacy browser tests
      run: |
        set -euo pipefail
        ./tools/test_unit.sh --dashboard-only
