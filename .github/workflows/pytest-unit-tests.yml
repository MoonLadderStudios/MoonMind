name: CI / Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: read

concurrency:
  group: pytest-unit-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  select-test-suites:
    runs-on: ubuntu-latest
    outputs:
      unit_fast: ${{ steps.select.outputs.unit_fast }}
      unit_slow: ${{ steps.select.outputs.unit_slow }}
      api_component: ${{ steps.select.outputs.api_component }}
      temporal_boundary: ${{ steps.select.outputs.temporal_boundary }}
      integration_ci: ${{ steps.select.outputs.integration_ci }}
      reliability_journey: ${{ steps.select.outputs.reliability_journey }}
      full_backend: ${{ steps.select.outputs.full_backend }}
      frontend_static: ${{ steps.select.outputs.frontend_static }}
      frontend_browser_chromium: ${{ steps.select.outputs.frontend_browser_chromium }}
      frontend_browser_firefox: ${{ steps.select.outputs.frontend_browser_firefox }}
      full_frontend: ${{ steps.select.outputs.full_frontend }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Compute changed files
        shell: bash
        run: |
          set -euo pipefail
          bash tools/ci/compute_changed_files.sh /tmp/changed-files.txt
          echo "Changed files:"
          sed 's/^/  - /' /tmp/changed-files.txt || true

      - name: Select test suites
        id: select
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 tools/select_test_suites.py < /tmp/changed-files.txt

  preflight-policy:
    # Static repository policy checks run in parallel with test selection so they
    # are off the serial tail of required CI (MoonLadderStudios/MoonMind#3326).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Compute changed files
        id: changed-files
        shell: bash
        run: |
          set -euo pipefail
          bash tools/ci/compute_changed_files.sh /tmp/changed-files.txt | tee /tmp/changed-files-resolution.txt
          cat /tmp/changed-files-resolution.txt >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          sed 's/^/  - /' /tmp/changed-files.txt || true
      - name: Check docs terminology guardrails
        run: |
          set -euo pipefail
          ./tools/check_terminology.sh
      - name: Verify workflow terminology guardrails
        run: |
          set -euo pipefail
          python3 tools/verify_workflow_terminology.py --mode all
      - name: Check removed capability semantics
        run: |
          set -euo pipefail
          python3 tools/check_removed_capability_semantics.py
      - name: Audit status token domains
        run: |
          set -euo pipefail
          python3 tools/status_domain_audit.py
      - name: Audit status tokens
        run: |
          set -euo pipefail
          python3 tools/audit_status_tokens.py --fail-on-unknown > /tmp/status-token-audit.csv
      - name: Reject task-specific GitHub workflow names
        run: |
          set -euo pipefail
          python3 tools/check_github_workflow_names.py
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install runtime dependencies via uv
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e .
      - name: Validate AgentSession deployment safety
        if: steps.changed-files.outputs.resolution == 'known'
        run: |
          set -euo pipefail
          ./tools/validate_agent_session_deployment_safety.py --changed-files-file /tmp/changed-files.txt
      - name: Block deployment safety validation on an unknown diff
        if: steps.changed-files.outputs.resolution != 'known'
        run: |
          echo "Unable to resolve the exact changed-file set; deployment safety cannot be validated." >&2
          exit 1
      - name: Summarize policy checks
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Repository policy checks"
            echo ""
            echo "All static repository policy checks passed:"
            echo ""
            echo "- docs terminology guardrails"
            echo "- workflow terminology guardrails"
            echo "- removed capability semantics"
            echo "- status token domains"
            echo "- status token audit (\`--fail-on-unknown\`)"
            echo "- GitHub workflow display-name guard"
            echo "- AgentSession deployment safety (exact changed files)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload status token audit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: status-token-audit
          path: /tmp/status-token-audit.csv
          if-no-files-found: ignore

  unit-fast:
    needs: select-test-suites
    if: needs.select-test-suites.outputs.unit_fast == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config
      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies via uv
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e .[tests]
      - name: Initialize MoonSpec test fixtures
        run: git submodule update --init --depth 1 -- moonspec
      - name: Run selected unit suite
        run: |
          set -euo pipefail
          python -m pytest tests/unit \
            --ignore=tests/unit/workflows/temporal \
            --ignore=tests/unit/api \
            --ignore=tests/unit/api_service \
            -m "unit_fast and not provider_verification and not requires_credentials" \
            -q -n auto --dist loadfile --durations=25 \
            --junitxml=artifacts/pytest-unit-fast.xml

  moonspec-projection:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Initialize MoonSpec submodule
        run: |
          set -euo pipefail
          git submodule update --init --depth 1 -- moonspec
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check vendored MoonSpec projection
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip PyYAML
          python3 tools/sync_moonspec.py --check

  unit-slow:
    needs: select-test-suites
    if: needs.select-test-suites.outputs.unit_slow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install dependencies via uv
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e .[tests]
      - name: Run slow unit suite
        run: |
          set -euo pipefail
          python -m pytest tests/unit \
            -m "slow and not provider_verification and not requires_credentials and not integration" \
            -q --durations=50 \
            --junitxml=artifacts/pytest-unit-slow.xml

  api-component:
    needs: select-test-suites
    if: needs.select-test-suites.outputs.api_component == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install dependencies via uv
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e .[tests]
      - name: Run API/component suite
        run: |
          set -euo pipefail
          python -m pytest tests/unit/api tests/unit/api_service tests/component/api \
            -m "component and not temporal_boundary and not slow and not provider_verification and not requires_credentials" \
            -q -n auto --dist loadfile --durations=25 \
            --junitxml=artifacts/pytest-api-component.xml

  temporal-boundary:
    needs: select-test-suites
    if: needs.select-test-suites.outputs.temporal_boundary == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies via uv
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e .[tests]
      - name: Run Temporal boundary suite
        run: |
          set -euo pipefail
          python -m pytest tests/unit/workflows/temporal \
            -m "temporal_boundary and not slow and not provider_verification and not requires_credentials" \
            -q --durations=25 \
            --junitxml=artifacts/pytest-temporal-boundary.xml

  integration-ci:
    needs: select-test-suites
    if: needs.select-test-suites.outputs.integration_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Run hermetic integration CI suite
        env:
          MOONMIND_FORCE_LOCAL_TESTS: "1"
        run: |
          set -euo pipefail
          ./tools/test_integration.sh
      - name: Capture docker compose diagnostics
        if: failure()
        run: |
          set -uo pipefail
          mkdir -p /tmp/pytest-integration-ci
          printf 'Collecting docker compose diagnostics\n' > /tmp/pytest-integration-ci/diagnostics-status.txt
          if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD=(docker-compose)
          else
            COMPOSE_CMD=()
            printf 'docker compose CLI is unavailable\n' >> /tmp/pytest-integration-ci/diagnostics-status.txt
          fi
          if [[ ${#COMPOSE_CMD[@]} -gt 0 ]]; then
            if ! "${COMPOSE_CMD[@]}" -f docker-compose.test.yaml config > /tmp/pytest-integration-ci/docker-compose-config.txt 2>&1; then
              printf 'docker compose config failed\n' >> /tmp/pytest-integration-ci/diagnostics-status.txt
            fi
            if ! "${COMPOSE_CMD[@]}" -f docker-compose.test.yaml ps -a > /tmp/pytest-integration-ci/docker-compose-ps.txt 2>&1; then
              printf 'docker compose ps -a failed\n' >> /tmp/pytest-integration-ci/diagnostics-status.txt
            fi
            if ! "${COMPOSE_CMD[@]}" -f docker-compose.test.yaml logs --no-color > /tmp/pytest-integration-ci/docker-compose-logs.txt 2>&1; then
              printf 'docker compose logs failed\n' >> /tmp/pytest-integration-ci/diagnostics-status.txt
            fi
          fi
          if [[ -d var/artifacts ]]; then
            cp -R var/artifacts /tmp/pytest-integration-ci/var-artifacts || printf 'copying var/artifacts failed\n' >> /tmp/pytest-integration-ci/diagnostics-status.txt
          fi
      - name: Upload integration diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-integration-ci-diagnostics
          path: /tmp/pytest-integration-ci
          if-no-files-found: error

  reliability-journey-checkpoint-resume:
    needs: select-test-suites
    if: needs.select-test-suites.outputs.reliability_journey == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install dependencies via uv
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e .[tests]
      - name: Run hermetic checkpoint-resume reliability journey
        env:
          MOONMIND_FORCE_LOCAL_TESTS: "1"
        run: |
          set -euo pipefail
          python -m pytest tests/integration/reliability \
            -m reliability_journey \
            -q --durations=25 \
            --junitxml=artifacts/pytest-reliability-journey.xml
      - name: Collect reliability journey diagnostics
        if: failure()
        run: |
          set -uo pipefail
          mkdir -p /tmp/pytest-reliability-journey
          for path in artifacts tests/integration/reliability/replays var/artifacts var/pr_resolver; do
            if [[ -e "$path" ]]; then
              cp -R --parents "$path" /tmp/pytest-reliability-journey/
            fi
          done
          find . -type f \
            \( -name 'workspace-manifest*.json' -o -name 'provider-transcript*.jsonl' \
               -o -name 'temporal-diagnostics*.json' -o -name 'replay-manifest*.json' \) \
            -exec cp --parents '{}' /tmp/pytest-reliability-journey/ \; 2>/dev/null || true
      - name: Upload reliability journey diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-reliability-journey-diagnostics
          path: /tmp/pytest-reliability-journey
          if-no-files-found: error

  verify-test-shard-ownership:
    needs: select-test-suites
    if: needs.select-test-suites.outputs.full_backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install dependencies via uv
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e .[tests]
      - name: Verify exclusive backend shard ownership
        run: python tools/verify_test_shard_ownership.py

  ci-required:
    # Pure, no-checkout result aggregator for required backend CI
    # (MoonLadderStudios/MoonMind#3326). It performs no repository operations:
    # no checkout, no submodules, no Python/Node setup, no repository command.
    # It evaluates every dependency and reports every failure before exiting.
    needs:
      - select-test-suites
      - preflight-policy
      - moonspec-projection
      - unit-fast
      - unit-slow
      - api-component
      - temporal-boundary
      - integration-ci
      - reliability-journey-checkpoint-resume
      - verify-test-shard-ownership
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate required backend results
        shell: bash
        run: |
          set -uo pipefail

          failures=0

          {
            echo "## Required backend CI"
            echo ""
            echo "| Check | Selected | Result |"
            echo "|---|---:|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          record() {
            local name="$1" selected="$2" result="$3"
            echo "| \`$name\` | $selected | \`$result\` |" >> "$GITHUB_STEP_SUMMARY"
          }

          require_always() {
            local name="$1" result="$2"
            record "$name" "always" "$result"
            if [[ "$result" != "success" ]]; then
              echo "::error::$name is always required but ended with result=$result"
              failures=$((failures + 1))
            fi
          }

          require_selected() {
            local name="$1" selected="$2" result="$3"
            record "$name" "$selected" "$result"
            if [[ "$selected" == "true" ]]; then
              if [[ "$result" != "success" ]]; then
                echo "::error::$name was selected but ended with result=$result"
                failures=$((failures + 1))
              fi
            elif [[ "$result" != "skipped" ]]; then
              echo "::error::$name was not selected but ended with result=$result (expected skipped)"
              failures=$((failures + 1))
            fi
          }

          require_always "select-test-suites" "${{ needs.select-test-suites.result }}"
          require_always "preflight-policy" "${{ needs.preflight-policy.result }}"
          require_always "moonspec-projection" "${{ needs.moonspec-projection.result }}"

          require_selected "unit-fast" \
            "${{ needs.select-test-suites.outputs.unit_fast }}" \
            "${{ needs.unit-fast.result }}"
          require_selected "unit-slow" \
            "${{ needs.select-test-suites.outputs.unit_slow }}" \
            "${{ needs.unit-slow.result }}"
          require_selected "api-component" \
            "${{ needs.select-test-suites.outputs.api_component }}" \
            "${{ needs.api-component.result }}"
          require_selected "temporal-boundary" \
            "${{ needs.select-test-suites.outputs.temporal_boundary }}" \
            "${{ needs.temporal-boundary.result }}"
          require_selected "integration-ci" \
            "${{ needs.select-test-suites.outputs.integration_ci }}" \
            "${{ needs.integration-ci.result }}"
          require_selected "reliability-journey-checkpoint-resume" \
            "${{ needs.select-test-suites.outputs.reliability_journey }}" \
            "${{ needs.reliability-journey-checkpoint-resume.result }}"
          require_selected "verify-test-shard-ownership" \
            "${{ needs.select-test-suites.outputs.full_backend }}" \
            "${{ needs.verify-test-shard-ownership.result }}"

          if [[ "$failures" -gt 0 ]]; then
            echo "::error::$failures required backend check(s) did not pass; see annotations above."
            exit 1
          fi

          echo "All required backend checks passed."

  frontend-static:
    needs: select-test-suites
    if: needs.select-test-suites.outputs.frontend_static == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - name: Install Node dependencies
      run: npm ci
    - name: Run frontend CI
      run: npm run frontend:ci

  frontend-browser:
    needs: select-test-suites
    if: needs.select-test-suites.outputs.frontend_browser_chromium == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    env:
      # GitHub overrides the container HOME with /github/home (owned by
      # pwuser), but the job runs as root. Firefox refuses that mismatch.
      HOME: /root
    strategy:
      fail-fast: false
      matrix:
        engine: ${{ fromJSON(needs.select-test-suites.outputs.frontend_browser_firefox == 'true' && '["chromium","firefox"]' || '["chromium"]') }}
    steps:
    - name: Check out code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - name: Install Node dependencies
      run: npm ci --no-audit --no-fund
    - name: Report Playwright environment
      run: npx playwright --version
    - name: Run real-browser style regression suite
      env:
        MOONMIND_BROWSER_ENGINES: ${{ matrix.engine }}
      run: npm run ui:test:browser

  test-frontend:
    needs:
      - select-test-suites
      - frontend-static
      - frontend-browser
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Verify frontend validation status
      shell: bash
      run: |
        set -euo pipefail

        static_selected="${{ needs.select-test-suites.outputs.frontend_static }}"
        browser_selected="${{ needs.select-test-suites.outputs.frontend_browser_chromium }}"
        static_result="${{ needs.frontend-static.result }}"
        browser_result="${{ needs.frontend-browser.result }}"

        {
          echo "## Frontend validation"
          echo "| Check | Selected | Result |"
          echo "|---|---:|---|"
          echo "| Static | $static_selected | $static_result |"
          echo "| Chromium | $browser_selected | $browser_result |"
          echo "| Firefox | ${{ needs.select-test-suites.outputs.frontend_browser_firefox }} | $browser_result |"
        } >> "$GITHUB_STEP_SUMMARY"

        if [[ "${{ needs.select-test-suites.result }}" != "success" ]]; then
          echo "::error::select-test-suites ended with result=${{ needs.select-test-suites.result }}"
          exit 1
        fi
        if [[ "$static_selected" == "true" && "$static_result" != "success" ]]; then
          echo "::error::frontend-static was selected but ended with result=$static_result"
          exit 1
        fi
        if [[ "$browser_selected" == "true" && "$browser_result" != "success" ]]; then
          echo "::error::frontend-browser was selected but ended with result=$browser_result"
          exit 1
        fi

        if [[ "$static_selected" != "true" && "$browser_selected" != "true" ]]; then
          echo "Known non-frontend change; frontend validation skipped intentionally."
        else
          echo "All selected frontend checks passed."
        fi

  detect-openapi-contract-impact:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_check: ${{ steps.detect.outputs.run_check }}
    steps:
    - name: Check out code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
    - name: Detect OpenAPI-affecting changes
      id: detect
      shell: bash
      run: |
        set -euo pipefail

        # Reuse the shared event classifier so the detector, the selector, and
        # deployment-safety validation share one changed-file resolution path
        # (MoonLadderStudios/MoonMind#3326). An unknown change set stays
        # conservative and runs the generated-contract check.
        resolution="$(bash tools/ci/compute_changed_files.sh /tmp/contract-changed-files.txt)"
        if [[ "$resolution" == "resolution=unknown" ]]; then
          echo "run_check=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if bash tools/check_openapi_affecting_changes.sh < /tmp/contract-changed-files.txt; then
          echo "run_check=true" >> "$GITHUB_OUTPUT"
        else
          echo "run_check=false" >> "$GITHUB_OUTPUT"
        fi

  run-generated-contracts:
    needs: detect-openapi-contract-impact
    if: needs.detect-openapi-contract-impact.outputs.run_check == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - name: Install OpenAPI TypeScript generator
      run: bash tools/install_openapi_typescript.sh
    - name: Set up Python for OpenAPI generation
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install system dependencies for backend API check
      run: |
        sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev pkg-config
    - name: Cache pip dependencies
      uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install backend dependencies via uv
      run: |
        python -m pip install --upgrade pip uv
        uv pip install --system -e .
    - name: Verify generated frontend API types are in sync
      run: npm run contracts:check

  check-generated-contracts:
    needs:
      - detect-openapi-contract-impact
      - run-generated-contracts
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Verify generated contract status
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${{ needs.detect-openapi-contract-impact.result }}" != "success" ]]; then
          echo "::error::detect-openapi-contract-impact ended with result=${{ needs.detect-openapi-contract-impact.result }}"
          exit 1
        fi

        if [[ "${{ needs.detect-openapi-contract-impact.outputs.run_check }}" == "true" ]]; then
          if [[ "${{ needs.run-generated-contracts.result }}" != "success" ]]; then
            echo "::error::run-generated-contracts was selected but ended with result=${{ needs.run-generated-contracts.result }}"
            exit 1
          fi
          echo "Generated contract verification passed."
        else
          echo "No backend/OpenAPI-affecting files changed; generated contract verification skipped intentionally."
        fi
