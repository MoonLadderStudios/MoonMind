name: Run Pytest Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pytest-unit-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev pkg-config
    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies via uv
      run: |
        python -m pip install --upgrade pip uv
        uv pip install --system -e .[tests]
    - name: Set up Node.js for UI build
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - name: Install Node dependencies
      run: npm ci
    - name: Build frontend assets for backend tests
      run: npm run ui:build
    - name: Run pytest unit tests
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        ./tools/test_unit.sh --python-only

  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - name: Install Node dependencies
      run: npm ci
    - name: Run frontend CI
      run: npm run frontend:ci
    - name: Upload Mission Control dist artifact
      uses: actions/upload-artifact@v7
      with:
        name: mission-control-dist
        path: api_service/static/task_dashboard/dist/
        if-no-files-found: error

  check-generated-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    - name: Detect OpenAPI-affecting changes
      id: detect
      run: |
        set -euo pipefail

        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed_files="$(git diff --name-only "$base_sha...$head_sha")"
        elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
          base_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"
          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
        else
          echo "run_check=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if printf '%s\n' "$changed_files" | grep -Eq '^(api_service/|moonmind/|tools/(export_openapi\.py|generate_openapi_types\.py|run_repo_python\.sh)|frontend/src/generated/openapi\.ts|package(-lock)?\.json|pyproject\.toml|uv\.lock)$'; then
          echo "run_check=true" >> "$GITHUB_OUTPUT"
        else
          echo "run_check=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Set up Node.js
      if: steps.detect.outputs.run_check == 'true'
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - name: Install Node dependencies
      if: steps.detect.outputs.run_check == 'true'
      run: npm ci
    - name: Set up Python for OpenAPI generation
      if: steps.detect.outputs.run_check == 'true'
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install system dependencies for backend API check
      if: steps.detect.outputs.run_check == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev pkg-config
    - name: Cache pip dependencies
      if: steps.detect.outputs.run_check == 'true'
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install backend dependencies via uv
      if: steps.detect.outputs.run_check == 'true'
      run: |
        python -m pip install --upgrade pip uv
        uv pip install --system -e .[tests]
    - name: Verify generated frontend API types are in sync
      if: steps.detect.outputs.run_check == 'true'
      run: npm run contracts:check
    - name: Skip generated contract check
      if: steps.detect.outputs.run_check != 'true'
      run: echo "No backend/OpenAPI-affecting files changed; skipping generated contract verification."
