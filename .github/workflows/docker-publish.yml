name: Build and Publish Docker Image to GHCR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
    steps:
      - name: Generate image metadata
        id: meta
        run: |
          VERSION_TAG="$(date -u +'%Y%m%d').${{ github.run_number }}"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          IMAGE_NAME="${{ env.REGISTRY_IMAGE }}"
          IMAGE_NAME="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

  build:
    needs: metadata
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        if: matrix.platform == 'linux/amd64'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        if: matrix.platform == 'linux/amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config

      - name: Cache pip dependencies
        if: matrix.platform == 'linux/amd64'
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        if: matrix.platform == 'linux/amd64'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Setup Node.js
        if: matrix.platform == 'linux/amd64'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check frontend and generated contracts
        if: matrix.platform == 'linux/amd64'
        run: |
          npm ci
          npm run frontend:ci
          npm run contracts:check

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build metadata
        id: meta
        run: |
          platform=${{ matrix.platform }}
          echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"
          echo "image_name=${{ needs.metadata.outputs.image_name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./api_service/Dockerfile
          target: api-runtime
          build-args: |
            INSTALL_CODEX_CLI=true
            INSTALL_GEMINI_CLI=true
            MOONMIND_BUILD_ID=${{ needs.metadata.outputs.version_tag }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.meta.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ steps.meta.outputs.pair }}
          cache-to: type=gha,scope=build-${{ steps.meta.outputs.pair }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ steps.meta.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          IMAGE_NAME="${{ needs.metadata.outputs.image_name }}"
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${{ needs.metadata.outputs.version_tag }}" \
            -t "${IMAGE_NAME}:latest" \
            $(printf "${IMAGE_NAME}@sha256:%s " *)

      - name: Inspect image
        run: |
          IMAGE_NAME="${{ needs.metadata.outputs.image_name }}"
          docker buildx imagetools inspect "${IMAGE_NAME}:latest"
