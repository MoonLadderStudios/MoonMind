name: Promote GHCR image to stable

# Promotion is a registry-side retag, never a rebuild. Build workflows keep the
# `latest` / `1.0` "current build channel" tags fresh automatically; this
# workflow only moves the human-approved `stable` channel to an already-published
# manifest selected by an operator. `docker buildx imagetools create` builds a
# fresh manifest list from source manifests that already exist in GHCR, so no
# image layers are pulled or rebuilt here.

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image to promote"
        required: true
        type: choice
        options:
          - app
          - pentestgpt-runner
      source_tag:
        description: "Existing tag to promote, e.g. 20260624.123"
        required: true
        type: string
      channel:
        description: "Stable channel tag to update"
        required: true
        default: stable
        type: choice
        options:
          - stable
      expected_digest:
        description: "Optional expected sha256:... digest guard"
        required: false
        type: string
      codex_conformance_result_path:
        description: "Required for app: path to compact Codex conformance result JSON"
        required: false
        type: string
      codex_conformance_artifact_name:
        description: "Required for app unless result path is supplied: Codex canary artifact name"
        required: false
        type: string
      codex_conformance_run_id:
        description: "Required with artifact name: workflow run id that published the Codex canary artifact"
        required: false
        type: string

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: promote-ghcr-${{ inputs.image }}-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  promote:
    name: Promote image
    runs-on: ubuntu-latest
    environment: ghcr-stable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install promotion gate dependencies
        if: inputs.image == 'app'
        run: python -m pip install pydantic

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo="$(printf '%s' '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"

          case '${{ inputs.image }}' in
            app)
              image="ghcr.io/${owner}/${repo}"
              ;;
            pentestgpt-runner)
              image="ghcr.io/${owner}/${repo}-pentestgpt"
              ;;
            *)
              echo "::error::Unknown image '${{ inputs.image }}'"
              exit 64
              ;;
          esac

          echo "name=${image}" >> "$GITHUB_OUTPUT"

      - name: Resolve source digest
        id: source
        shell: bash
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
          EXPECTED_DIGEST: ${{ inputs.expected_digest }}
        run: |
          image="${{ steps.image.outputs.name }}"
          source_ref="${image}:${SOURCE_TAG}"

          docker buildx imagetools inspect "${source_ref}"

          digest="$(docker buildx imagetools inspect "${source_ref}" --format '{{.Manifest.Digest}}')"
          if [ -z "${digest}" ]; then
            echo "::error::Could not resolve digest for ${source_ref}"
            exit 1
          fi

          expected="${EXPECTED_DIGEST}"
          if [ -n "${expected}" ] && [ "${digest}" != "${expected}" ]; then
            echo "::error::Digest mismatch. Expected ${expected}, got ${digest}"
            exit 1
          fi

          echo "source_ref=${source_ref}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Require Codex conformance run id for artifact download
        if: inputs.image == 'app' && inputs.codex_conformance_result_path == '' && inputs.codex_conformance_artifact_name != '' && inputs.codex_conformance_run_id == ''
        shell: bash
        run: |
          echo "::error::codex_conformance_run_id is required when codex_conformance_artifact_name is supplied without codex_conformance_result_path."
          exit 1

      - name: Download prior-run Codex conformance artifact
        if: inputs.image == 'app' && inputs.codex_conformance_result_path == '' && inputs.codex_conformance_artifact_name != '' && inputs.codex_conformance_run_id != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.codex_conformance_artifact_name }}
          run-id: ${{ inputs.codex_conformance_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp/codex-conformance

      - name: Validate Codex conformance result
        if: inputs.image == 'app'
        shell: bash
        env:
          RESULT_PATH: ${{ inputs.codex_conformance_result_path }}
        run: |
          if [ -z "$RESULT_PATH" ]; then
            RESULT_PATH="$(find /tmp/codex-conformance -name canary-result.json -type f | head -n 1 || true)"
          fi
          if [ -z "$RESULT_PATH" ]; then
            echo "::error::App image promotion requires codex_conformance_result_path or codex_conformance_artifact_name from a passing Codex canary run."
            exit 1
          fi
          if [ ! -f "$RESULT_PATH" ]; then
            echo "::error::Codex conformance result not found at $RESULT_PATH"
            exit 1
          fi
          python -m moonmind.codex_conformance.canary check \
            --result "$RESULT_PATH" \
            --candidate-digest "${{ steps.source.outputs.digest }}" \
            --max-age-hours 72

      - name: Promote manifest
        shell: bash
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
        run: |
          image="${{ steps.image.outputs.name }}"
          digest="${{ steps.source.outputs.digest }}"
          channel="${{ inputs.channel }}"
          source_tag="${SOURCE_TAG}"

          docker buildx imagetools create \
            -t "${image}:${channel}" \
            -t "${image}:${channel}-${source_tag}" \
            "${image}@${digest}"

      - name: Verify promoted image and write summary
        shell: bash
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
        run: |
          image="${{ steps.image.outputs.name }}"
          channel="${{ inputs.channel }}"

          docker buildx imagetools inspect "${image}:${channel}"
          promoted_digest="$(docker buildx imagetools inspect "${image}:${channel}" --format '{{.Manifest.Digest}}')"

          {
            echo "### GHCR stable promotion"
            echo ""
            echo "- Image: \`${image}\`"
            echo "- Source tag: \`${SOURCE_TAG}\`"
            echo "- Source digest: \`${{ steps.source.outputs.digest }}\`"
            echo "- Updated channel: \`${image}:${channel}\`"
            echo "- Audit tag: \`${image}:${channel}-${SOURCE_TAG}\`"
            echo "- Digest-pinned stable reference: \`${image}:${channel}@${promoted_digest}\`"
          } >> "$GITHUB_STEP_SUMMARY"
