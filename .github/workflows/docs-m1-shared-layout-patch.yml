name: Apply Milestone 1 shared layout docs

on:
  push:
    branches:
      - docs/m1-shared-sidebar-detail-contract
    paths:
      - .github/workflows/docs-m1-shared-layout-patch.yml
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - .github/workflows/docs-m1-shared-layout-patch.yml

permissions:
  contents: write

jobs:
  patch-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out documentation branch
        uses: actions/checkout@v4
        with:
          ref: docs/m1-shared-sidebar-detail-contract
          fetch-depth: 0

      - name: Assemble and apply declarative documentation patch
        shell: bash
        run: |
          cat .github/docs-patch-parts/part-*.py > /tmp/docs_patch.py
          python -m py_compile /tmp/docs_patch.py
          python /tmp/docs_patch.py

      - name: Restore temporary transport files
        shell: bash
        run: |
          git checkout HEAD -- \
            .github/workflows/docs-m1-shared-layout-patch.yml \
            .github/docs-patch-parts/part-00.py \
            .github/docs-patch-parts/part-01.py \
            .github/docs-patch-parts/part-02.py \
            .github/docs-patch-parts/part-03.py \
            .github/docs-patch-parts/part-04.py \
            .github/docs-patch-parts/part-05.py \
            .github/docs-patch-parts/part-06.py \
            .github/docs-patch-parts/part-07.py

      - name: Commit documentation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "Expected documentation changes were not produced." >&2
            exit 1
          fi
          git commit -m "docs: unify collection sidebars and detail frames"

      - name: Push documentation commit
        shell: bash
        run: git push origin HEAD:docs/m1-shared-sidebar-detail-contract
