services:
  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address :9001
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000"
      - "9001"
    networks:
      - local-network

  pytest:
    build:
      context: .
      dockerfile: api_service/Dockerfile
      args:
        INSTALL_CODEX_CLI: "false"
        INSTALL_GEMINI_CLI: "false"
        INSTALL_TEST_DEPS: "true"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - TEST_TYPE=unit
      - MOONMIND_FORCE_LOCAL_TESTS=1
      - TEMPORAL_ARTIFACT_BACKEND=${TEMPORAL_ARTIFACT_BACKEND:-s3}
      - TEMPORAL_ARTIFACT_S3_ENDPOINT=${TEMPORAL_ARTIFACT_S3_ENDPOINT:-http://minio:9000}
      - TEMPORAL_ARTIFACT_S3_BUCKET=${TEMPORAL_ARTIFACT_S3_BUCKET:-moonmind-temporal-artifacts}
      - TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID=${TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID:-minioadmin}
      - TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY=${TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - ./:/app
    working_dir: /app
    # Run through test_unit.sh so xdist, flags, and env setup are identical to CI.
    # Pass --python-only to skip Node/dashboard tests (node may not be in this image).
    command: ["bash", "-lc", "/app/tools/test_unit.sh --python-only"]
    depends_on:
      - minio
    networks:
      - local-network

  orchestrator-tests:
    build:
      context: .
      dockerfile: api_service/Dockerfile
      args:
        INSTALL_CODEX_CLI: "false"
        INSTALL_GEMINI_CLI: "false"
        INSTALL_TEST_DEPS: "true"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - TEST_TYPE=integration/orchestrator
      - TEMPORAL_ARTIFACT_BACKEND=${TEMPORAL_ARTIFACT_BACKEND:-s3}
      - TEMPORAL_ARTIFACT_S3_ENDPOINT=${TEMPORAL_ARTIFACT_S3_ENDPOINT:-http://minio:9000}
      - TEMPORAL_ARTIFACT_S3_BUCKET=${TEMPORAL_ARTIFACT_S3_BUCKET:-moonmind-temporal-artifacts}
      - TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID=${TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID:-minioadmin}
      - TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY=${TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - ./:/app
    working_dir: /app
    command: ["bash", "-c", "pytest -s /app/tests/$${TEST_TYPE}"]
    depends_on:
      - minio
    networks:
      - local-network

  cli-tooling-smoke:
    build:
      context: .
      dockerfile: api_service/Dockerfile
      args:
        INSTALL_CODEX_CLI: "false"
        INSTALL_GEMINI_CLI: "false"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app:/app/moonmind
    command: ["bash", "-lc", "codex --version && agentkit --version"]
    networks:
      - local-network

networks:
  local-network:
    external: true
