services:
  keycloak-db:
    profiles: ["keycloak"]
    image: postgres:${POSTGRES_VERSION:-17}
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PW:-keycloak}
      POSTGRES_DB: keycloak
    volumes: [ keycloak-data:/var/lib/postgresql/data ]
    networks: [ local-network ]
    restart: unless-stopped

  keycloak:
    profiles: ["keycloak"]
    image: quay.io/keycloak/keycloak:24.0
    command: >
      start-dev
      --proxy-headers=xforwarded
      --hostname-url=http://keycloak:8080
      --import-realm
      --db=postgres
      --db-url=jdbc:postgresql://keycloak-db:5432/keycloak
      --db-username=keycloak
      --db-password=${KC_DB_PW:-keycloak}
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PW:-admin}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports: [ "8085:8080" ]        # host→container
    depends_on:
      - keycloak-db
    networks: [ local-network ]
    restart: unless-stopped

  ui:
    image: ghcr.io/open-webui/open-webui:main
    volumes:
      - open-webui:/app/backend/data
    ports:
      - 8080:8080
    environment:
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-http://api:5000/v1}
      - WEBUI_AUTH=${WEBUI_AUTH:-false}
      # - WEBUI_FORWARD_AUTH_HEADER=${WEBUI_FORWARD_AUTH_HEADER:-true} # Keep or remove based on final setup with OIDC
      - ENABLE_OLLAMA_API=false
      # OIDC specific variables for OpenWebUI
      - ENABLE_OAUTH_SIGNUP=${WEBUI_AUTH:-false}
      - OAUTH_PROVIDER_NAME=Keycloak # Can be changed by .env if needed
      - OAUTH_CLIENT_ID=open-webui # As defined in realm-export.json
      - OAUTH_CLIENT_SECRET= # Left blank for PKCE
      - OAUTH_SCOPES=openid email profile
      - OPENID_PROVIDER_URL=http://keycloak:8080/realms/moonmind/.well-known/openid-configuration # Internal URL for Keycloak
      - WEBUI_FORWARD_AUTH_HEADER=${WEBUI_AUTH:-false} # Important for API to get the token
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - local-network
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    image: ghcr.io/moonladderstudios/moonmind:latest
    ports:
      - "5000:5000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=${POSTGRES_HOST:-moonmind-api-db}
      - CODEX_TEMPLATE_PATH=/app/api_service/config.template.toml
      - FASTAPI_RELOAD=${FASTAPI_RELOAD:-false}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MODEL_CONTEXT_PROTOCOL_ENABLED=true
      - MODEL_CONTEXT_PROTOCOL_PORT=5000
      - MODEL_CONTEXT_PROTOCOL_HOST=0.0.0.0
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-moonmind}
      # OIDC specific variables for API service
      - AUTH_PROVIDER=${AUTH_PROVIDER:-disabled} # local, google, or disabled
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-http://keycloak:8080/realms/moonmind} # For 'local'
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-api-service} # For 'local', matches realm-export.json
      - OIDC_CLIENT_SECRET=${API_CLIENT_SECRET:-changeme} # For 'local', matches realm-export.json
      - JWT_SECRET=${JWT_SECRET:-devsecret} # For 'disabled' auth provider (legacy JWT)
    env_file:
      - .env
    volumes:
      - ./model_data:/app/model_data
      - ./api_service:/app/api_service
      - ./moonmind:/app/moonmind:ro
      - ./.agents:/app/.agents:ro
      - ./keycloak:/app/keycloak:ro # Mount keycloak configs if needed by api, or remove if only for keycloak service
      - speckit_workspaces:/work/runs:ro
    command: sh /app/api_service/entrypoint.sh
    networks:
      - local-network
    labels:
      - "ai.model.context.protocol.version=0.1"
      - "ai.model.context.protocol.endpoint=/context"
    depends_on:
      init-db:
        condition: service_completed_successfully
      api-db:
        condition: service_started

  api-db:
    image: postgres:${POSTGRES_VERSION:-17}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-moonmind}
    volumes:
      - api-db-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      local-network:
        aliases:
          # local-network is external/shared; use a unique DB hostname to avoid cross-stack DNS collisions.
          - moonmind-api-db
    restart: unless-stopped

  temporal-db:
    image: postgres:${TEMPORAL_POSTGRES_VERSION:-17}
    environment:
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER:-temporal}
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      POSTGRES_DB: ${TEMPORAL_POSTGRES_DB:-temporal}
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${TEMPORAL_POSTGRES_USER:-temporal} -d ${TEMPORAL_POSTGRES_DB:-temporal}
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - temporal-network
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION:-1.29.1}
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=temporal-db
      - POSTGRES_USER=${TEMPORAL_POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      - DBNAME=${TEMPORAL_POSTGRES_DB:-temporal}
      - VISIBILITY_DBNAME=${TEMPORAL_VISIBILITY_DB:-temporal_visibility}
      - NUM_HISTORY_SHARDS=${TEMPORAL_NUM_HISTORY_SHARDS:-1}
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamicconfig/development-sql.yaml
    expose:
      - "7233"
    volumes:
      - ./services/temporal/dynamicconfig:/etc/temporal/dynamicconfig:ro
    depends_on:
      temporal-db:
        condition: service_healthy
    networks:
      - temporal-network
      - local-network
    restart: unless-stopped

  temporal-namespace-init:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.1-tctl-1.18.4-cli-1.5.0}
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-moonmind}
      - TEMPORAL_NAMESPACE_RETENTION_DAYS=${TEMPORAL_NAMESPACE_RETENTION_DAYS:-36500}
      - TEMPORAL_RETENTION_MAX_STORAGE_GB=${TEMPORAL_RETENTION_MAX_STORAGE_GB:-100}
    volumes:
      - ./services/temporal/scripts/bootstrap-namespace.sh:/etc/temporal/bootstrap-namespace.sh:ro
    entrypoint:
      - /bin/sh
      - /etc/temporal/bootstrap-namespace.sh
    depends_on:
      temporal:
        condition: service_started
    networks:
      - temporal-network
      - local-network
    restart: "no"

  temporal-visibility-rehearsal:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.1-tctl-1.18.4-cli-1.5.0}
    profiles: ["temporal-tools"]
    environment:
      - TEMPORAL_POSTGRES_HOST=temporal-db
      - TEMPORAL_POSTGRES_PORT=5432
      - TEMPORAL_POSTGRES_USER=${TEMPORAL_POSTGRES_USER:-temporal}
      - TEMPORAL_POSTGRES_PASSWORD=${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      - TEMPORAL_VISIBILITY_DB=${TEMPORAL_VISIBILITY_DB:-temporal_visibility}
      - TEMPORAL_VISIBILITY_SCHEMA_DIR=${TEMPORAL_VISIBILITY_SCHEMA_DIR:-/etc/temporal/schema/postgresql/v12/visibility/versioned}
      - TEMPORAL_NUM_HISTORY_SHARDS=${TEMPORAL_NUM_HISTORY_SHARDS:-1}
      - TEMPORAL_SHARD_DECISION_ACK=${TEMPORAL_SHARD_DECISION_ACK:-}
    volumes:
      - ./services/temporal/scripts/rehearse-visibility-schema-upgrade.sh:/etc/temporal/rehearse-visibility-schema-upgrade.sh:ro
    entrypoint:
      - /bin/sh
      - /etc/temporal/rehearse-visibility-schema-upgrade.sh
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
    networks:
      - temporal-network
    restart: "no"

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.1-tctl-1.18.4-cli-1.5.0}
    profiles: ["temporal-tools"]
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
    command: sh -lc "sleep infinity"
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
    networks:
      - temporal-network
      - local-network
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-2.34.0}
    profiles: ["temporal-ui"]
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
    ports:
      - "${TEMPORAL_UI_HOST_PORT:-8088}:8080"
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
    networks:
      - local-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - local-network

  init-db:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    image: ghcr.io/moonladderstudios/moonmind:latest
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@${POSTGRES_HOST:-moonmind-api-db}:5432/${POSTGRES_DB:-moonmind}
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
    env_file:
      - .env
    volumes:
      - ./moonmind:/app/moonmind:ro
      - ./tools:/app/tools:ro
      - ./model_data:/app/model_data:ro
      - ./api_service:/app/api_service:ro
      - ./init_db:/app/init_db
    command: sh /app/init_db/init_db_entrypoint.sh
    networks:
      - local-network
    restart: "no"
    depends_on:
      - api-db
      - qdrant

  agent-workspaces-init:
    image: alpine:3.20
    command: >-
      sh -lc "mkdir -p /work/agent_jobs && chown -R 1000:1000 /work/agent_jobs && chmod 0775 /work/agent_jobs"
    volumes:
      - agent_workspaces:/work/agent_jobs
    restart: "no"

  gemini-auth-init:
    image: alpine:3.20
    command: >-
      sh -lc "mkdir -p /var/lib/gemini-auth && chown -R 1000:1000 /var/lib/gemini-auth && chmod 0775 /var/lib/gemini-auth"
    volumes:
      - gemini_auth_volume:/var/lib/gemini-auth
    restart: "no"

  codex-auth-init:
    image: alpine:3.20
    environment:
      - CODEX_HOME=${CODEX_HOME:-/home/app/.codex}
    command: >-
      sh -lc "CODEX_HOME=$${CODEX_HOME:-/home/app/.codex}; mkdir -p \"$${CODEX_HOME}\" && chown -R 1000:1000 \"$${CODEX_HOME}\" && chmod 0775 \"$${CODEX_HOME}\""
    volumes:
      - codex_auth_volume:${CODEX_HOME:-/home/app/.codex}
    restart: "no"

  claude-auth-init:
    image: alpine:3.20
    command: >-
      sh -lc "mkdir -p ${CLAUDE_HOME:-/home/app/.claude} && chown -R 1000:1000 ${CLAUDE_HOME:-/home/app/.claude} && chmod 0775 ${CLAUDE_HOME:-/home/app/.claude}"
    volumes:
      - claude_auth_volume:${CLAUDE_HOME:-/home/app/.claude}
    restart: "no"

  codex-worker:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    image: ghcr.io/moonladderstudios/moonmind:latest
    user: app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - CODEX_VOLUME_PATH=${CODEX_VOLUME_PATH:-/home/app/.codex}
      - CODEX_HOME=${CODEX_HOME:-/home/app/.codex}
      - CODEX_CONFIG_HOME=${CODEX_CONFIG_HOME:-/home/app/.codex}
      - CODEX_CONFIG_PATH=${CODEX_CONFIG_PATH:-/home/app/.codex/config.toml}
      - MOONMIND_URL=${MOONMIND_URL:-http://api:5000}
      - MOONMIND_WORKER_ID=${MOONMIND_WORKER_ID:-codex-worker-1}
      - MOONMIND_ENABLE_TASK_PROPOSALS=${MOONMIND_ENABLE_TASK_PROPOSALS:-true}
      - MOONMIND_WORKER_TOKEN=${MOONMIND_WORKER_TOKEN:-}
      - MOONMIND_WORKER_BOOTSTRAP_TOKEN=${MOONMIND_WORKER_BOOTSTRAP_TOKEN:-true}
      - MOONMIND_WORKER_RUNTIME=${MOONMIND_CODEX_WORKER_RUNTIME:-${MOONMIND_WORKER_RUNTIME:-codex}}
      - MOONMIND_WORKER_ALLOWED_TYPES=${MOONMIND_CODEX_WORKER_ALLOWED_TYPES:-${MOONMIND_WORKER_ALLOWED_TYPES:-task,codex_exec,codex_skill}}
      - MOONMIND_WORKER_CAPABILITIES=${MOONMIND_CODEX_WORKER_CAPABILITIES:-${MOONMIND_WORKER_CAPABILITIES:-codex,git,gh,docker,proposals_write}}
      - MOONMIND_WORKER_TOKEN_DESCRIPTION=${MOONMIND_CODEX_WORKER_TOKEN_DESCRIPTION:-Docker Compose codex worker}
      - MOONMIND_WORKER_TOKEN_FILE=${MOONMIND_CODEX_WORKER_TOKEN_FILE:-${CODEX_HOME:-/home/app/.codex}/moonmind_worker_token}
      - MOONMIND_API_TOKEN=${MOONMIND_API_TOKEN:-}
      - MOONMIND_WORKDIR=${MOONMIND_WORKDIR:-/work/agent_jobs}
      - MOONMIND_WORKER_WORKFLOW_REPO_ROOT=${MOONMIND_WORKER_WORKFLOW_REPO_ROOT:-/workspace}
      - WORKFLOW_SKILLS_CACHE_ROOT=${WORKFLOW_SKILLS_CACHE_ROOT:-/work/agent_jobs/skill_cache}
      - WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT=${WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT:-${MOONMIND_WORKER_WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT:-/workspace/.agents/skills/local}}
      - WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT=${WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT:-${MOONMIND_WORKER_WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT:-/workspace/.agents/skills}}
      - MOONMIND_LIVE_SESSION_ENABLED_DEFAULT=${MOONMIND_LIVE_SESSION_ENABLED_DEFAULT:-true}
      - MOONMIND_LIVE_SESSION_PROVIDER=${MOONMIND_LIVE_SESSION_PROVIDER:-tmate}
      - MOONMIND_LIVE_SESSION_TTL_MINUTES=${MOONMIND_LIVE_SESSION_TTL_MINUTES:-60}
      - MOONMIND_LIVE_SESSION_RW_GRANT_TTL_MINUTES=${MOONMIND_LIVE_SESSION_RW_GRANT_TTL_MINUTES:-15}
      - MOONMIND_LIVE_SESSION_ALLOW_WEB=${MOONMIND_LIVE_SESSION_ALLOW_WEB:-false}
      - MOONMIND_TMATE_SERVER_HOST=${MOONMIND_TMATE_SERVER_HOST:-}
      - MOONMIND_LIVE_SESSION_MAX_CONCURRENT_PER_WORKER=${MOONMIND_LIVE_SESSION_MAX_CONCURRENT_PER_WORKER:-4}
      - MOONMIND_CONTAINER_WORKSPACE_VOLUME=${MOONMIND_AGENT_WORKSPACES_VOLUME_NAME:-agent_workspaces}
      - DOCKER_HOST=${ORCHESTRATOR_DOCKER_HOST:-tcp://docker-proxy:2375}
      - MOONMIND_CODEX_SANDBOX_MODE=${MOONMIND_CODEX_SANDBOX_MODE:-danger-full-access}
      - MOONMIND_CODEX_MODEL=${MOONMIND_CODEX_MODEL:-}
      - MOONMIND_CODEX_EFFORT=${MOONMIND_CODEX_EFFORT:-}
      - MOONMIND_WORKER_RETRY_ENABLED=${MOONMIND_WORKER_RETRY_ENABLED:-true}
      - MOONMIND_WORKER_RETRY_SECONDS=${MOONMIND_WORKER_RETRY_SECONDS:-20}
      - MOONMIND_DEFAULT_TASK_RUNTIME=${MOONMIND_CODEX_DEFAULT_TASK_RUNTIME:-${MOONMIND_DEFAULT_TASK_RUNTIME:-codex}}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEFAULT_EMBEDDING_PROVIDER=${MOONMIND_WORKER_EMBEDDING_PROVIDER_OVERRIDE:-disabled}
    volumes:
      - .:/workspace
      - codex_auth_volume:${CODEX_VOLUME_PATH:-/home/app/.codex}
      - speckit_workspaces:/work/runs
      - ./var/artifacts:/workspace/var/artifacts
      - agent_workspaces:/work/agent_jobs
    working_dir: /workspace
    command: >-
      /workspace/tools/start-worker.sh
    depends_on:
      api:
        condition: service_started
      docker-proxy:
        condition: service_started
      agent-workspaces-init:
        condition: service_completed_successfully
      codex-auth-init:
        condition: service_completed_successfully
    networks:
      - local-network
      - docker-proxy-network
    restart: unless-stopped

  gemini-worker:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    image: ghcr.io/moonladderstudios/moonmind:latest
    user: app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - CODEX_VOLUME_PATH=${CODEX_VOLUME_PATH:-/home/app/.codex}
      - CODEX_HOME=${CODEX_HOME:-/home/app/.codex}
      - CODEX_CONFIG_HOME=${CODEX_CONFIG_HOME:-/home/app/.codex}
      - CODEX_CONFIG_PATH=${CODEX_CONFIG_PATH:-/home/app/.codex/config.toml}
      - GEMINI_HOME=${GEMINI_HOME:-/var/lib/gemini-auth}
      - GEMINI_CLI_HOME=${GEMINI_CLI_HOME:-${GEMINI_HOME:-/var/lib/gemini-auth}}
      - MOONMIND_URL=${MOONMIND_URL:-http://api:5000}
      - MOONMIND_WORKER_ID=${MOONMIND_GEMINI_WORKER_ID:-gemini-worker-1}
      - MOONMIND_ENABLE_TASK_PROPOSALS=${MOONMIND_ENABLE_TASK_PROPOSALS:-true}
      - MOONMIND_WORKER_TOKEN=${MOONMIND_GEMINI_WORKER_TOKEN:-}
      - MOONMIND_WORKER_BOOTSTRAP_TOKEN=${MOONMIND_GEMINI_WORKER_BOOTSTRAP_TOKEN:-${MOONMIND_WORKER_BOOTSTRAP_TOKEN:-true}}
      - MOONMIND_WORKER_RUNTIME=${MOONMIND_GEMINI_WORKER_RUNTIME:-gemini}
      - MOONMIND_WORKER_ALLOWED_TYPES=${MOONMIND_GEMINI_WORKER_ALLOWED_TYPES:-task}
      - MOONMIND_WORKER_CAPABILITIES=${MOONMIND_GEMINI_WORKER_CAPABILITIES:-gemini,git,gh,docker,proposals_write}
      - MOONMIND_WORKER_TOKEN_DESCRIPTION=${MOONMIND_GEMINI_WORKER_TOKEN_DESCRIPTION:-Docker Compose gemini worker}
      - MOONMIND_WORKER_TOKEN_FILE=${MOONMIND_GEMINI_WORKER_TOKEN_FILE:-${GEMINI_CLI_HOME:-${GEMINI_HOME:-/var/lib/gemini-auth}}/moonmind_worker_token}
      - MOONMIND_API_TOKEN=${MOONMIND_API_TOKEN:-}
      - MOONMIND_WORKDIR=${MOONMIND_WORKDIR:-/work/agent_jobs}
      - MOONMIND_WORKER_WORKFLOW_REPO_ROOT=${MOONMIND_WORKER_WORKFLOW_REPO_ROOT:-/workspace}
      - WORKFLOW_SKILLS_CACHE_ROOT=${WORKFLOW_SKILLS_CACHE_ROOT:-/work/agent_jobs/skill_cache}
      - WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT=${WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT:-${MOONMIND_WORKER_WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT:-/workspace/.agents/skills/local}}
      - WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT=${WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT:-${MOONMIND_WORKER_WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT:-/workspace/.agents/skills}}
      - MOONMIND_LIVE_SESSION_ENABLED_DEFAULT=${MOONMIND_LIVE_SESSION_ENABLED_DEFAULT:-true}
      - MOONMIND_LIVE_SESSION_PROVIDER=${MOONMIND_LIVE_SESSION_PROVIDER:-tmate}
      - MOONMIND_LIVE_SESSION_TTL_MINUTES=${MOONMIND_LIVE_SESSION_TTL_MINUTES:-60}
      - MOONMIND_LIVE_SESSION_RW_GRANT_TTL_MINUTES=${MOONMIND_LIVE_SESSION_RW_GRANT_TTL_MINUTES:-15}
      - MOONMIND_LIVE_SESSION_ALLOW_WEB=${MOONMIND_LIVE_SESSION_ALLOW_WEB:-false}
      - MOONMIND_TMATE_SERVER_HOST=${MOONMIND_TMATE_SERVER_HOST:-}
      - MOONMIND_LIVE_SESSION_MAX_CONCURRENT_PER_WORKER=${MOONMIND_LIVE_SESSION_MAX_CONCURRENT_PER_WORKER:-4}
      - MOONMIND_CONTAINER_WORKSPACE_VOLUME=${MOONMIND_AGENT_WORKSPACES_VOLUME_NAME:-agent_workspaces}
      - DOCKER_HOST=${ORCHESTRATOR_DOCKER_HOST:-tcp://docker-proxy:2375}
      - MOONMIND_CODEX_SANDBOX_MODE=${MOONMIND_CODEX_SANDBOX_MODE:-danger-full-access}
      - MOONMIND_CODEX_MODEL=${MOONMIND_CODEX_MODEL:-}
      - MOONMIND_CODEX_EFFORT=${MOONMIND_CODEX_EFFORT:-}
      - MOONMIND_GEMINI_MODEL=${MOONMIND_GEMINI_MODEL:-}
      - MOONMIND_GEMINI_EFFORT=${MOONMIND_GEMINI_EFFORT:-}
      - MOONMIND_WORKER_RETRY_ENABLED=${MOONMIND_WORKER_RETRY_ENABLED:-true}
      - MOONMIND_WORKER_RETRY_SECONDS=${MOONMIND_WORKER_RETRY_SECONDS:-20}
      - MOONMIND_DEFAULT_TASK_RUNTIME=${MOONMIND_GEMINI_DEFAULT_TASK_RUNTIME:-gemini}
      - MOONMIND_GEMINI_CLI_AUTH_MODE=${MOONMIND_GEMINI_CLI_AUTH_MODE:-oauth}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEFAULT_EMBEDDING_PROVIDER=${MOONMIND_WORKER_EMBEDDING_PROVIDER_OVERRIDE:-disabled}
    volumes:
      - .:/workspace
      - codex_auth_volume:${CODEX_VOLUME_PATH:-/home/app/.codex}
      - gemini_auth_volume:${GEMINI_HOME:-/var/lib/gemini-auth}
      - speckit_workspaces:/work/runs
      - ./var/artifacts:/workspace/var/artifacts
      - agent_workspaces:/work/agent_jobs
    working_dir: /workspace
    command: >-
      /workspace/tools/start-worker.sh
    depends_on:
      api:
        condition: service_started
      docker-proxy:
        condition: service_started
      agent-workspaces-init:
        condition: service_completed_successfully
      gemini-auth-init:
        condition: service_completed_successfully
      codex-auth-init:
        condition: service_completed_successfully
    networks:
      - local-network
      - docker-proxy-network
    restart: unless-stopped

  claude-worker:
    profiles: ["claude"]
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    image: ghcr.io/moonladderstudios/moonmind:latest
    user: app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - CODEX_VOLUME_PATH=${CODEX_VOLUME_PATH:-/home/app/.codex}
      - CODEX_HOME=${CODEX_HOME:-/home/app/.codex}
      - CODEX_CONFIG_HOME=${CODEX_CONFIG_HOME:-/home/app/.codex}
      - CODEX_CONFIG_PATH=${CODEX_CONFIG_PATH:-/home/app/.codex/config.toml}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_HOME=${CLAUDE_HOME:-/home/app/.claude}
      - MOONMIND_CLAUDE_CLI_AUTH_MODE=${MOONMIND_CLAUDE_CLI_AUTH_MODE:-api_key}
      - CLAUDE_VOLUME_PATH=${CLAUDE_VOLUME_PATH:-/home/app/.claude}
      - MOONMIND_URL=${MOONMIND_URL:-http://api:5000}
      - MOONMIND_WORKER_ID=${MOONMIND_CLAUDE_WORKER_ID:-claude-worker-1}
      - MOONMIND_ENABLE_TASK_PROPOSALS=${MOONMIND_ENABLE_TASK_PROPOSALS:-true}
      - MOONMIND_WORKER_TOKEN=${MOONMIND_CLAUDE_WORKER_TOKEN:-}
      - MOONMIND_WORKER_BOOTSTRAP_TOKEN=${MOONMIND_CLAUDE_WORKER_BOOTSTRAP_TOKEN:-${MOONMIND_WORKER_BOOTSTRAP_TOKEN:-true}}
      - MOONMIND_WORKER_RUNTIME=${MOONMIND_CLAUDE_WORKER_RUNTIME:-claude}
      - MOONMIND_WORKER_ALLOWED_TYPES=${MOONMIND_CLAUDE_WORKER_ALLOWED_TYPES:-task}
      - MOONMIND_WORKER_CAPABILITIES=${MOONMIND_CLAUDE_WORKER_CAPABILITIES:-claude,git,gh,docker,proposals_write}
      - MOONMIND_WORKER_TOKEN_DESCRIPTION=${MOONMIND_CLAUDE_WORKER_TOKEN_DESCRIPTION:-Docker Compose claude worker}
      - MOONMIND_WORKER_TOKEN_FILE=${MOONMIND_CLAUDE_WORKER_TOKEN_FILE:-${CODEX_HOME:-/home/app/.codex}/moonmind_claude_worker_token}
      - MOONMIND_API_TOKEN=${MOONMIND_API_TOKEN:-}
      - MOONMIND_WORKDIR=${MOONMIND_WORKDIR:-/work/agent_jobs}
      - MOONMIND_WORKER_WORKFLOW_REPO_ROOT=${MOONMIND_WORKER_WORKFLOW_REPO_ROOT:-/workspace}
      - WORKFLOW_SKILLS_CACHE_ROOT=${WORKFLOW_SKILLS_CACHE_ROOT:-/work/agent_jobs/skill_cache}
      - WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT=${WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT:-${MOONMIND_WORKER_WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT:-/workspace/.agents/skills/local}}
      - WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT=${WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT:-${MOONMIND_WORKER_WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT:-/workspace/.agents/skills}}
      - MOONMIND_LIVE_SESSION_ENABLED_DEFAULT=${MOONMIND_LIVE_SESSION_ENABLED_DEFAULT:-true}
      - MOONMIND_LIVE_SESSION_PROVIDER=${MOONMIND_LIVE_SESSION_PROVIDER:-tmate}
      - MOONMIND_LIVE_SESSION_TTL_MINUTES=${MOONMIND_LIVE_SESSION_TTL_MINUTES:-60}
      - MOONMIND_LIVE_SESSION_RW_GRANT_TTL_MINUTES=${MOONMIND_LIVE_SESSION_RW_GRANT_TTL_MINUTES:-15}
      - MOONMIND_LIVE_SESSION_ALLOW_WEB=${MOONMIND_LIVE_SESSION_ALLOW_WEB:-false}
      - MOONMIND_TMATE_SERVER_HOST=${MOONMIND_TMATE_SERVER_HOST:-}
      - MOONMIND_LIVE_SESSION_MAX_CONCURRENT_PER_WORKER=${MOONMIND_LIVE_SESSION_MAX_CONCURRENT_PER_WORKER:-4}
      - MOONMIND_CONTAINER_WORKSPACE_VOLUME=${MOONMIND_AGENT_WORKSPACES_VOLUME_NAME:-agent_workspaces}
      - DOCKER_HOST=${ORCHESTRATOR_DOCKER_HOST:-tcp://docker-proxy:2375}
      - MOONMIND_CODEX_SANDBOX_MODE=${MOONMIND_CODEX_SANDBOX_MODE:-danger-full-access}
      - MOONMIND_CODEX_MODEL=${MOONMIND_CODEX_MODEL:-}
      - MOONMIND_CODEX_EFFORT=${MOONMIND_CODEX_EFFORT:-}
      - MOONMIND_CLAUDE_MODEL=${MOONMIND_CLAUDE_MODEL:-}
      - MOONMIND_CLAUDE_EFFORT=${MOONMIND_CLAUDE_EFFORT:-}
      - MOONMIND_WORKER_RETRY_ENABLED=${MOONMIND_WORKER_RETRY_ENABLED:-true}
      - MOONMIND_WORKER_RETRY_SECONDS=${MOONMIND_WORKER_RETRY_SECONDS:-20}
      - MOONMIND_DEFAULT_TASK_RUNTIME=${MOONMIND_CLAUDE_DEFAULT_TASK_RUNTIME:-claude}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEFAULT_EMBEDDING_PROVIDER=${MOONMIND_WORKER_EMBEDDING_PROVIDER_OVERRIDE:-disabled}
    volumes:
      - .:/workspace
      - codex_auth_volume:${CODEX_VOLUME_PATH:-/home/app/.codex}
      - claude_auth_volume:${CLAUDE_HOME:-/home/app/.claude}
      - speckit_workspaces:/work/runs
      - ./var/artifacts:/workspace/var/artifacts
      - agent_workspaces:/work/agent_jobs
    working_dir: /workspace
    command: >-
      /workspace/tools/start-worker.sh
    depends_on:
      api:
        condition: service_started
      docker-proxy:
        condition: service_started
      agent-workspaces-init:
        condition: service_completed_successfully
      codex-auth-init:
        condition: service_completed_successfully
      claude-auth-init:
        condition: service_completed_successfully
    networks:
      - local-network
      - docker-proxy-network
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    image: ghcr.io/moonladderstudios/moonmind:latest
    user: root
    command: >-
      /workspace/tools/start-worker.sh -m moonmind.workflows.orchestrator.queue_worker
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - CODEX_VOLUME_PATH=${CODEX_VOLUME_PATH:-/home/app/.codex}
      - CODEX_HOME=${CODEX_HOME:-/home/app/.codex}
      - CODEX_CONFIG_HOME=${CODEX_CONFIG_HOME:-/home/app/.codex}
      - CODEX_CONFIG_PATH=${CODEX_CONFIG_PATH:-/home/app/.codex/config.toml}
      - MOONMIND_WORKER_COMMAND=python
      - MOONMIND_URL=${MOONMIND_URL:-http://api:5000}
      - MOONMIND_WORKER_ID=${MOONMIND_ORCHESTRATOR_WORKER_ID:-orchestrator-worker-1}
      - MOONMIND_WORKER_TOKEN=${MOONMIND_ORCHESTRATOR_WORKER_TOKEN:-}
      - MOONMIND_WORKER_BOOTSTRAP_TOKEN=${MOONMIND_ORCHESTRATOR_WORKER_BOOTSTRAP_TOKEN:-true}
      - MOONMIND_WORKER_ALLOWED_TYPES=${MOONMIND_ORCHESTRATOR_WORKER_ALLOWED_TYPES:-orchestrator_run}
      - MOONMIND_WORKER_CAPABILITIES=${MOONMIND_ORCHESTRATOR_WORKER_CAPABILITIES:-orchestrator,docker}
      - MOONMIND_WORKER_TOKEN_DESCRIPTION=${MOONMIND_ORCHESTRATOR_WORKER_TOKEN_DESCRIPTION:-Docker Compose orchestrator DB worker}
      - MOONMIND_WORKER_TOKEN_FILE=${MOONMIND_ORCHESTRATOR_WORKER_TOKEN_FILE:-${CODEX_HOME:-/home/app/.codex}/moonmind_orchestrator_worker_token}
      - MOONMIND_API_TOKEN=${MOONMIND_API_TOKEN:-}
      - MOONMIND_WORKDIR=${MOONMIND_WORKDIR:-/work/agent_jobs}
      - MOONMIND_WORKER_RETRY_ENABLED=${MOONMIND_WORKER_RETRY_ENABLED:-true}
      - MOONMIND_WORKER_RETRY_SECONDS=${MOONMIND_WORKER_RETRY_SECONDS:-20}
      - MOONMIND_POLL_INTERVAL_MS=${MOONMIND_ORCHESTRATOR_POLL_INTERVAL_MS:-1500}
      - MOONMIND_LEASE_SECONDS=${MOONMIND_ORCHESTRATOR_LEASE_SECONDS:-120}
      - ORCHESTRATOR_ARTIFACT_ROOT=${ORCHESTRATOR_ARTIFACT_ROOT:-var/artifacts/spec_workflows}
      - ORCHESTRATOR_STATSD_HOST=${ORCHESTRATOR_STATSD_HOST:-}
      - ORCHESTRATOR_STATSD_PORT=${ORCHESTRATOR_STATSD_PORT:-8125}
      - DOCKER_HOST=${ORCHESTRATOR_DOCKER_HOST:-unix:///var/run/docker.sock}
      - WORKFLOW_REPO_ROOT=${WORKFLOW_REPO_ROOT:-${MOONMIND_ORCHESTRATOR_WORKFLOW_REPO_ROOT:-/workspace}}
      - WORKFLOW_SKILLS_CACHE_ROOT=${WORKFLOW_SKILLS_CACHE_ROOT:-/work/agent_jobs/skill_cache}
      - WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT=${WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT:-${MOONMIND_ORCHESTRATOR_WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT:-/workspace/.agents/skills/local}}
      - WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT=${WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT:-${MOONMIND_ORCHESTRATOR_WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT:-/workspace/.agents/skills}}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - .:/workspace
      - codex_auth_volume:${CODEX_VOLUME_PATH:-/home/app/.codex}
      - agent_workspaces:/work/agent_jobs
      - ./var/artifacts:/workspace/var/artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    depends_on:
      api:
        condition: service_started
      agent-workspaces-init:
        condition: service_completed_successfully
      codex-auth-init:
        condition: service_completed_successfully
    networks:
      - local-network
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    image: ghcr.io/moonladderstudios/moonmind:latest
    user: app
    command: >-
      moonmind-scheduler
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=${POSTGRES_HOST:-moonmind-api-db}
      - MOONMIND_SCHEDULER_POLL_INTERVAL_MS=${MOONMIND_SCHEDULER_POLL_INTERVAL_MS:-2000}
      - MOONMIND_SCHEDULER_BATCH_SIZE=${MOONMIND_SCHEDULER_BATCH_SIZE:-50}
      - MOONMIND_SCHEDULER_MAX_BACKFILL=${MOONMIND_SCHEDULER_MAX_BACKFILL:-3}
      - MOONMIND_SCHEDULER_LOCK_TIMEOUT_SECONDS=${MOONMIND_SCHEDULER_LOCK_TIMEOUT_SECONDS:-}
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      api:
        condition: service_started
    networks:
      - local-network
    restart: unless-stopped

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    environment:
      INFO: 1
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - docker-proxy-network
    restart: unless-stopped

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    ports:
      - 11434:11434
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./model_data:/root/.ollama/models
      - ./tools/entrypoint-ollama.sh:/entrypoint-ollama.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint-ollama.sh"]
    networks:
      - local-network
    env_file:
      - .env
    environment:
      - OLLAMA_CONTEXT_LENGTH=32768
      - OLLAMA_FLASH_ATTENTION=true
      - OLLAMA_KV_CACHE_TYPE=q4_0

  openhands:
    profiles: ["openhands"]
    image: docker.all-hands.dev/all-hands-ai/openhands:0.39
    container_name: openhands-app
    pull_policy: always
    tty: true
    stdin_open: true
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.openhands-state-data:/.openhands-state
      - ./config.toml:/app/openhands/config.toml:ro
      - .:/workspace
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:0.39-nikolaik
      - LOG_ALL_EVENTS=true
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - local-network
    env_file:
      - .env

  vllm:
    profiles: ["vllm"]
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./model_data:/root/.cache/huggingface/hub
      - ./tools/entrypoint-vllm.sh:/entrypoint-vllm.sh:ro
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=${VLLM_MODEL_NAME:-ByteDance-Seed/UI-TARS-1.5-7B}
      - DTYPE=${VLLM_DTYPE:-float16}
      - GPU_MEMORY_UTILIZATION=${VLLM_GPU_MEMORY_UTILIZATION:-0.95}
      - HF_HOME=/root/.cache/huggingface
      - MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-32768}
      - NVIDIA_DRIVER_CAPABILITIES=all
    entrypoint: ["/bin/sh", "/entrypoint-vllm.sh"]
    networks:
      - local-network
    tty: true
    init: true

volumes:
  open-webui:
  qdrant-storage:
  api-db-data:
  temporal-db-data:
  keycloak-data:
  speckit_workspaces:
  agent_workspaces:
    name: ${MOONMIND_AGENT_WORKSPACES_VOLUME_NAME:-agent_workspaces}
  unreal_ccache_volume:
    name: unreal_ccache_volume
  unreal_ubt_volume:
    name: unreal_ubt_volume
  codex_auth_volume:
    name: ${CODEX_VOLUME_NAME:-codex_auth_volume}
  gemini_auth_volume:
  claude_auth_volume:

networks:
  local-network:
    external: true
  docker-proxy-network:
    internal: true
  temporal-network:
    internal: true
