        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
      agent-workspaces-init:
        condition: service_completed_successfully
      codex-auth-init:
        condition: service_completed_successfully
      claude-auth-init:
        condition: service_completed_successfully
      gemini-auth-init:
        condition: service_completed_successfully
      cursor-auth-init:
        condition: service_completed_successfully
