services:


  keycloak:
    profiles: ["keycloak"]
    image: quay.io/keycloak/keycloak:24.0
    command: >
      start-dev
      --proxy-headers=xforwarded
      --hostname-url=http://keycloak:8080
      --import-realm
      --db=postgres
      --db-url=jdbc:postgresql://postgres:5432/keycloak
      --db-username=keycloak
      --db-password=${KC_DB_PW:-keycloak}
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PW:-admin}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports: [ "8085:8080" ]        # host→container
    depends_on:
      postgres:
        condition: service_healthy
    networks: [ local-network ]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    image: ghcr.io/moonladderstudios/moonmind:latest
    ports:
      - "5000:5000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=${POSTGRES_HOST:-moonmind-api-db}
      - CODEX_TEMPLATE_PATH=/app/api_service/config.template.toml
      - FASTAPI_RELOAD=${FASTAPI_RELOAD:-false}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MODEL_CONTEXT_PROTOCOL_ENABLED=true
      - MODEL_CONTEXT_PROTOCOL_PORT=5000
      - MODEL_CONTEXT_PROTOCOL_HOST=0.0.0.0
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-moonmind}
      - TEMPORAL_DASHBOARD_SUBMIT_ENABLED=true
      # OIDC specific variables for API service
      - AUTH_PROVIDER=${AUTH_PROVIDER:-disabled} # local, google, or disabled
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-http://keycloak:8080/realms/moonmind} # For 'local'
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-api-service} # For 'local', matches realm-export.json
      - OIDC_CLIENT_SECRET=${API_CLIENT_SECRET:-changeme} # For 'local', matches realm-export.json
      - JWT_SECRET=${JWT_SECRET:-devsecret} # For 'disabled' auth provider (legacy JWT)
    env_file:
      - .env
    volumes:
      - ./model_data:/app/model_data
      - ./api_service:/app/api_service
      - ./moonmind:/app/moonmind:ro
      - ./.agents:/app/.agents:ro
      - ./keycloak:/app/keycloak:ro # Mount keycloak configs if needed by api, or remove if only for keycloak service
      - workflow_workspaces:/work/runs:ro
    command: sh /app/api_service/entrypoint.sh
    networks:
      - local-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "ai.model.context.protocol.version=0.1"
      - "ai.model.context.protocol.endpoint=/context"
    depends_on:
      init-db:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:${POSTGRES_VERSION:-17}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-moonmind}
      TEMPORAL_POSTGRES_USER: ${TEMPORAL_POSTGRES_USER:-temporal}
      TEMPORAL_POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      TEMPORAL_POSTGRES_DB: ${TEMPORAL_POSTGRES_DB:-temporal}
      TEMPORAL_VISIBILITY_DB: ${TEMPORAL_VISIBILITY_DB:-temporal_visibility}
      KC_DB_PW: ${KC_DB_PW:-keycloak}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init_db_scripts:/docker-entrypoint-initdb.d
    expose:
      - "5432"
    networks:
      local-network:
        aliases:
          - moonmind-api-db
          - temporal-db
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-moonmind}
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION:-1.29.1}
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgres
      - POSTGRES_USER=${TEMPORAL_POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      - DBNAME=${TEMPORAL_POSTGRES_DB:-temporal}
      - VISIBILITY_DBNAME=${TEMPORAL_VISIBILITY_DB:-temporal_visibility}
      - NUM_HISTORY_SHARDS=${TEMPORAL_NUM_HISTORY_SHARDS:-1}
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamicconfig/development-sql.yaml
      - BIND_ON_IP=0.0.0.0
    expose:
      - "7233"
    volumes:
      - ./services/temporal/dynamicconfig:/etc/temporal/dynamicconfig:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      local-network:
        aliases:
          - temporal-internal
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address :9001
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000"
      - "9001"
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - local-network
    restart: unless-stopped

  temporal-namespace-init:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.1-tctl-1.18.4-cli-1.5.0}
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-moonmind}
      - TEMPORAL_NAMESPACE_RETENTION_DAYS=${TEMPORAL_NAMESPACE_RETENTION_DAYS:-}
      - TEMPORAL_RETENTION_MAX_STORAGE_GB=${TEMPORAL_RETENTION_MAX_STORAGE_GB:-100}
      - TEMPORAL_RETENTION_ESTIMATED_GB_PER_DAY=${TEMPORAL_RETENTION_ESTIMATED_GB_PER_DAY:-1}
    volumes:
      - ./services/temporal/scripts/bootstrap-namespace.sh:/etc/temporal/bootstrap-namespace.sh:ro
    entrypoint:
      - /bin/sh
      - /etc/temporal/bootstrap-namespace.sh
    depends_on:
      temporal:
        condition: service_started
    networks:
      - local-network
    restart: "no"

  temporal-visibility-rehearsal:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.1-tctl-1.18.4-cli-1.5.0}
    profiles: ["temporal-tools"]
    environment:
      - TEMPORAL_POSTGRES_HOST=postgres
      - TEMPORAL_POSTGRES_PORT=5432
      - TEMPORAL_POSTGRES_USER=${TEMPORAL_POSTGRES_USER:-temporal}
      - TEMPORAL_POSTGRES_PASSWORD=${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      - TEMPORAL_VISIBILITY_DB=${TEMPORAL_VISIBILITY_DB:-temporal_visibility}
      - TEMPORAL_VISIBILITY_SCHEMA_DIR=${TEMPORAL_VISIBILITY_SCHEMA_DIR:-/etc/temporal/schema/postgresql/v12/visibility/versioned}
      - TEMPORAL_NUM_HISTORY_SHARDS=${TEMPORAL_NUM_HISTORY_SHARDS:-1}
      - TEMPORAL_SHARD_DECISION_ACK=${TEMPORAL_SHARD_DECISION_ACK:-}
    volumes:
      - ./services/temporal/scripts/rehearse-visibility-schema-upgrade.sh:/etc/temporal/rehearse-visibility-schema-upgrade.sh:ro
    entrypoint:
      - /bin/sh
      - /etc/temporal/rehearse-visibility-schema-upgrade.sh
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
    networks:
      - local-network
    restart: "no"

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.1-tctl-1.18.4-cli-1.5.0}
    profiles: ["temporal-tools"]
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
    command: sh -lc "sleep infinity"
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
    networks:
      - local-network
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-2.34.0}
    profiles: ["temporal-ui"]
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
    ports:
      - "${TEMPORAL_UI_HOST_PORT:-8088}:8080"
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
