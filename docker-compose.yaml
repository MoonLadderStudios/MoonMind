      - codex_auth_volume:${CODEX_VOLUME_PATH:-/home/app/.codex}
      - claude_auth_volume:${CLAUDE_VOLUME_PATH:-/home/app/.claude}
      - gemini_auth_volume:${GEMINI_VOLUME_PATH:-/var/lib/gemini-auth}
      - cursor_auth_volume:${CURSOR_VOLUME_PATH:-/home/app/.cursor}
