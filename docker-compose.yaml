      - CODEX_VOLUME_PATH=${CODEX_VOLUME_PATH:-/home/app/.codex}
      - CODEX_HOME=${CODEX_VOLUME_PATH:-/home/app/.codex}
      - CODEX_CONFIG_HOME=${CODEX_VOLUME_PATH:-/home/app/.codex}
      - CODEX_CONFIG_PATH=${CODEX_VOLUME_PATH:-/home/app/.codex}/config.toml
      - CLAUDE_HOME=${CLAUDE_VOLUME_PATH:-/home/app/.claude}
      - CLAUDE_VOLUME_PATH=${CLAUDE_VOLUME_PATH:-/home/app/.claude}
      - MOONMIND_CLAUDE_CLI_AUTH_MODE=${MOONMIND_CLAUDE_CLI_AUTH_MODE:-api_key}
      - MOONMIND_GEMINI_CLI_AUTH_MODE=${MOONMIND_GEMINI_CLI_AUTH_MODE:-oauth}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - MOONMIND_CODEX_MODEL=${MOONMIND_CODEX_MODEL:-}
      - MOONMIND_CODEX_EFFORT=${MOONMIND_CODEX_EFFORT:-}
      - MOONMIND_GEMINI_MODEL=${MOONMIND_GEMINI_MODEL:-}
      - MOONMIND_GEMINI_EFFORT=${MOONMIND_GEMINI_EFFORT:-}
      - MOONMIND_CLAUDE_MODEL=${MOONMIND_CLAUDE_MODEL:-}
      - MOONMIND_CLAUDE_EFFORT=${MOONMIND_CLAUDE_EFFORT:-}
      - GEMINI_HOME=${GEMINI_VOLUME_PATH:-/var/lib/gemini-auth}
      - GEMINI_CLI_HOME=${GEMINI_VOLUME_PATH:-/var/lib/gemini-auth}
      - MOONMIND_CURSOR_CLI_AUTH_MODE=${MOONMIND_CURSOR_CLI_AUTH_MODE:-api_key}
      - CURSOR_API_KEY=${CURSOR_API_KEY:-}
      - CURSOR_HOME=${CURSOR_VOLUME_PATH:-/home/app/.cursor}
      - MOONMIND_CURSOR_MODEL=${MOONMIND_CURSOR_MODEL:-}
      - MOONMIND_CURSOR_EFFORT=${MOONMIND_CURSOR_EFFORT:-}
      - TEMPORAL_WORKER_COMMAND=${TEMPORAL_WORKER_COMMAND:-python -m moonmind.workflows.temporal.worker_runtime}
