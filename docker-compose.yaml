  temporal-worker-integrations:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    image: ghcr.io/moonladderstudios/moonmind:latest
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-moonmind}
      - TEMPORAL_WORKER_FLEET=integrations
      - TEMPORAL_ACTIVITY_INTEGRATIONS_TASK_QUEUE=${TEMPORAL_ACTIVITY_INTEGRATIONS_TASK_QUEUE:-mm.activity.integrations}
      - TEMPORAL_INTEGRATIONS_WORKER_CONCURRENCY=${TEMPORAL_INTEGRATIONS_WORKER_CONCURRENCY:-4}
      - JULES_ENABLED=${JULES_ENABLED:-true}
      - JULES_API_URL=${JULES_API_URL:-}
      - JULES_API_KEY=${JULES_API_KEY:-}
      - TEMPORAL_WORKER_COMMAND=${TEMPORAL_WORKER_COMMAND:-python -m moonmind.workflows.temporal.worker_runtime}
    env_file:
      - .env
    volumes:
      - ./moonmind:/app/moonmind:ro
      - ./api_service:/app/api_service:ro
      - ./services:/app/services:ro
    entrypoint:
      - /bin/sh
      - /app/services/temporal/scripts/start-worker.sh
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
    networks:
      - local-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - local-network

  init-db:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    image: ghcr.io/moonladderstudios/moonmind:latest
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@${POSTGRES_HOST:-moonmind-api-db}:5432/${POSTGRES_DB:-moonmind}
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
    env_file:
      - .env
    volumes:
      - ./moonmind:/app/moonmind:ro
      - ./tools:/app/tools:ro
      - ./api_service:/app/api_service:ro
      - ./model_data:/app/model_data:ro
      - ./api_service:/app/api_service:ro
      - ./init_db:/app/init_db
    command: sh /app/init_db/init_db_entrypoint.sh
    networks:
      - local-network
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  agent-workspaces-init:
    image: alpine:3.20
    command: >-
      sh -lc "mkdir -p /work/agent_jobs && chown -R 1000:1000 /work/agent_jobs && chmod 0775 /work/agent_jobs"
    volumes:
      - agent_workspaces:/work/agent_jobs
    restart: "no"

  gemini-auth-init:
    image: alpine:3.20
    command: >-
      sh -lc "mkdir -p /var/lib/gemini-auth && chown -R 1000:1000 /var/lib/gemini-auth && chmod 0775 /var/lib/gemini-auth"
    volumes:
      - gemini_auth_volume:/var/lib/gemini-auth
    restart: "no"

  codex-auth-init:
    image: alpine:3.20
    environment:
      - CODEX_HOME=${CODEX_VOLUME_PATH:-/home/app/.codex}
    command: >-
      sh -lc "CODEX_HOME=$${CODEX_HOME:-/home/app/.codex}; mkdir -p \"$${CODEX_HOME}\" && chown -R 1000:1000 \"$${CODEX_HOME}\" && chmod 0775 \"$${CODEX_HOME}\""
    volumes:
      - codex_auth_volume:${CODEX_VOLUME_PATH:-/home/app/.codex}
    restart: "no"

  claude-auth-init:
    image: alpine:3.20
    command: >-
      sh -lc "mkdir -p ${CLAUDE_VOLUME_PATH:-/home/app/.claude} && chown -R 1000:1000 ${CLAUDE_VOLUME_PATH:-/home/app/.claude} && chmod 0775 ${CLAUDE_VOLUME_PATH:-/home/app/.claude}"
    volumes:
      - claude_auth_volume:${CLAUDE_VOLUME_PATH:-/home/app/.claude}
    restart: "no"

  cursor-auth-init:
    image: alpine:3.20
    command: >-
      sh -lc "mkdir -p ${CURSOR_VOLUME_PATH:-/home/app/.cursor} && chown -R 1000:1000 ${CURSOR_VOLUME_PATH:-/home/app/.cursor} && chmod 0775 ${CURSOR_VOLUME_PATH:-/home/app/.cursor}"
    volumes:
      - cursor_auth_volume:${CURSOR_VOLUME_PATH:-/home/app/.cursor}
    restart: "no"

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    environment:
      INFO: 1
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - docker-proxy-network
    restart: unless-stopped

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    ports:
      - 11434:11434
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./model_data:/root/.ollama/models
      - ./tools/entrypoint-ollama.sh:/entrypoint-ollama.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint-ollama.sh"]
    networks:
      - local-network
    env_file:
      - .env
    environment:
      - OLLAMA_CONTEXT_LENGTH=32768
      - OLLAMA_FLASH_ATTENTION=true
      - OLLAMA_KV_CACHE_TYPE=q4_0

  openhands:
    profiles: ["openhands"]
    image: docker.all-hands.dev/all-hands-ai/openhands:0.39
    container_name: openhands-app
    pull_policy: always
    tty: true
    stdin_open: true
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.openhands-state-data:/.openhands-state
      - ./config.toml:/app/openhands/config.toml:ro
      - .:/workspace
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:0.39-nikolaik
      - LOG_ALL_EVENTS=true
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - local-network
    env_file:
      - .env

  vllm:
    profiles: ["vllm"]
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./model_data:/root/.cache/huggingface/hub
      - ./tools/entrypoint-vllm.sh:/entrypoint-vllm.sh:ro
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=${VLLM_MODEL_NAME:-ByteDance-Seed/UI-TARS-1.5-7B}
      - DTYPE=${VLLM_DTYPE:-float16}
      - GPU_MEMORY_UTILIZATION=${VLLM_GPU_MEMORY_UTILIZATION:-0.95}
      - HF_HOME=/root/.cache/huggingface
      - MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-32768}
      - NVIDIA_DRIVER_CAPABILITIES=all
    entrypoint: ["/bin/sh", "/entrypoint-vllm.sh"]
    networks:
      - local-network
    tty: true
    init: true

volumes:
  qdrant-storage:
  postgres-data:
  minio-data:
  workflow_workspaces:
  agent_workspaces:
    name: ${MOONMIND_AGENT_WORKSPACES_VOLUME_NAME:-agent_workspaces}
  unreal_ccache_volume:
    name: unreal_ccache_volume
  unreal_ubt_volume:
    name: unreal_ubt_volume
  codex_auth_volume:
    name: ${CODEX_VOLUME_NAME:-codex_auth_volume}
  gemini_auth_volume:
    name: ${GEMINI_VOLUME_NAME:-gemini_auth_volume}
  claude_auth_volume:
    name: ${CLAUDE_VOLUME_NAME:-claude_auth_volume}
  cursor_auth_volume:
    name: ${CURSOR_VOLUME_NAME:-cursor_auth_volume}

networks:
  local-network:
    external: true
  docker-proxy-network:
    internal: true
