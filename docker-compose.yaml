services:
  keycloak:
    profiles: ["keycloak"]
    image: quay.io/keycloak/keycloak:24.0
    command: >
      start-dev --proxy-headers=xforwarded --hostname-url=http://keycloak:8080
      --import-realm --db=postgres
      --db-url=jdbc:postgresql://postgres:5432/keycloak --db-username=keycloak
      --db-password=${KC_DB_PW:-keycloak}
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PW:-admin}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports: ["8085:8080"] # host→container
    depends_on:
      postgres:
        condition: service_healthy
    networks: [local-network]
    restart: unless-stopped

  api:
    image: ${MOONMIND_IMAGE:-ghcr.io/moonladderstudios/moonmind:latest}
    init: true
    ports:
      - "${MOONMIND_API_HOST_PORT:-7000}:8000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=${POSTGRES_HOST:-moonmind-api-db}
      - CODEX_TEMPLATE_PATH=/app/api_service/config.template.toml
      - FASTAPI_RELOAD=${FASTAPI_RELOAD:-false}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MODEL_CONTEXT_PROTOCOL_ENABLED=true
      - MODEL_CONTEXT_PROTOCOL_PORT=8000
      - MODEL_CONTEXT_PROTOCOL_HOST=0.0.0.0
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_ARTIFACT_BACKEND=${TEMPORAL_ARTIFACT_BACKEND:-s3}
      - TEMPORAL_ARTIFACT_S3_ENDPOINT=${TEMPORAL_ARTIFACT_S3_ENDPOINT:-http://moonmind-temporal-artifacts-s3:9000}
      - TEMPORAL_ARTIFACT_S3_PUBLIC_ENDPOINT=${TEMPORAL_ARTIFACT_S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      - TEMPORAL_ARTIFACT_S3_BUCKET=${TEMPORAL_ARTIFACT_S3_BUCKET:-moonmind-temporal-artifacts}
      - TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID=${TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID:-minioadmin}
      - TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY=${TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY:-minioadmin}
      - TEMPORAL_DASHBOARD_SUBMIT_ENABLED=true
      - TEMPORAL_WORKFLOW_EDITING_ENABLED=${TEMPORAL_WORKFLOW_EDITING_ENABLED:-true}
      - SYSTEM_DOCKER_HOST=${SYSTEM_DOCKER_HOST:-tcp://docker-proxy:2375}
      - DOCKER_HOST=${SYSTEM_DOCKER_HOST:-tcp://docker-proxy:2375}
      - MOONMIND_OAUTH_RUNNER_IMAGE=${MOONMIND_OAUTH_RUNNER_IMAGE:-${MOONMIND_IMAGE:-ghcr.io/moonladderstudios/moonmind:latest}}
      - MOONMIND_ALLOW_LOCAL_ENCRYPTION_KEY_GENERATION=${MOONMIND_ALLOW_LOCAL_ENCRYPTION_KEY_GENERATION:-1}
      - MOONMIND_DEPLOYMENT_DESIRED_STATE_JSON_FILE=${MOONMIND_DEPLOYMENT_DESIRED_STATE_JSON_FILE:-/workspace/deployment_state/desired-state.json}
      # OIDC specific variables for API service
      - AUTH_PROVIDER=${AUTH_PROVIDER:-disabled} # local, google, or disabled
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-http://keycloak:8080/realms/moonmind} # For 'local'
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-api-service} # For 'local', matches realm-export.json
      - OIDC_CLIENT_SECRET=${API_CLIENT_SECRET:-changeme} # For 'local', matches realm-export.json
      - JWT_SECRET=${JWT_SECRET:-devsecret} # For 'disabled' auth provider (legacy JWT)
    env_file:
      - path: .env
        required: false
    volumes:
      - ./model_data:/app/model_data
      - ./api_service:/app/api_service
      - ./moonmind:/app/moonmind:ro
      - ./docs:/app/docs:ro
      - ./.agents:/app/.agents:ro
      - ./moonspec:/app/moonspec:ro
      - ./deploy/state:/workspace/deployment_state:ro
      - ./keycloak:/app/keycloak:ro # Mount keycloak configs if needed by api, or remove if only for keycloak service
      - moonmind_secrets:/app/var/secrets
      - agent_workspaces:/work/agent_jobs:ro
      - workflow_workspaces:/work/runs:ro
    command: sh /app/api_service/entrypoint.sh
    networks:
      - local-network
      - docker-proxy-network
    healthcheck:
      test: [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
          urllib.request.urlopen('http://localhost:8000/healthz')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "ai.model.context.protocol.version=2025-03-26"
      - "ai.model.context.protocol.endpoint=/mcp"
    depends_on:
      init-db:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      docker-proxy:
        condition: service_started

  postgres:
    image: postgres:${POSTGRES_VERSION:-17}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-moonmind}
      TEMPORAL_POSTGRES_USER: ${TEMPORAL_POSTGRES_USER:-temporal}
      TEMPORAL_POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      TEMPORAL_POSTGRES_DB: ${TEMPORAL_POSTGRES_DB:-temporal}
      TEMPORAL_VISIBILITY_DB: ${TEMPORAL_VISIBILITY_DB:-temporal_visibility}
      KC_DB_PW: ${KC_DB_PW:-keycloak}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init_db_scripts:/docker-entrypoint-initdb.d
    expose:
      - "5432"
    networks:
      local-network:
        aliases:
          - moonmind-api-db
          - temporal-db
      sandbox-egress-network:
        aliases:
          - moonmind-api-db
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-moonmind}
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION:-1.29.1}
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgres
      - POSTGRES_USER=${TEMPORAL_POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      - DBNAME=${TEMPORAL_POSTGRES_DB:-temporal}
      - VISIBILITY_DBNAME=${TEMPORAL_VISIBILITY_DB:-temporal_visibility}
      - NUM_HISTORY_SHARDS=${TEMPORAL_NUM_HISTORY_SHARDS:-1}
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamicconfig/development-sql.yaml
      - SKIP_ADD_CUSTOM_SEARCH_ATTRIBUTES=true
      - BIND_ON_IP=0.0.0.0
    ports:
      - "7233:7233"
    volumes:
      - ./services/temporal/dynamicconfig:/etc/temporal/dynamicconfig:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      local-network:
        aliases:
          - temporal-internal
      sandbox-egress-network:
        aliases:
          - temporal-internal
    restart: unless-stopped

  # Network alias `moonmind-temporal-artifacts-s3` is the stable S3 hostname for
  # Temporal artifacts. Do not use the generic name `minio` in TEMPORAL_ARTIFACT_S3_ENDPOINT
  # when other compose stacks on this network also expose MinIO as `minio` (DNS returns
  # multiple backends → intermittent NoSuchKey).
  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address :9001
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000"
      - "9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      local-network:
        aliases:
          - moonmind-temporal-artifacts-s3
      sandbox-egress-network:
        aliases:
          - moonmind-temporal-artifacts-s3
    restart: unless-stopped

  temporal-namespace-init:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.1-tctl-1.18.4-cli-1.5.0}
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_NAMESPACE_RETENTION_DAYS=${TEMPORAL_NAMESPACE_RETENTION_DAYS:-90}
      - TEMPORAL_RETENTION_MAX_STORAGE_GB=${TEMPORAL_RETENTION_MAX_STORAGE_GB:-100}
      - TEMPORAL_RETENTION_ESTIMATED_GB_PER_DAY=${TEMPORAL_RETENTION_ESTIMATED_GB_PER_DAY:-1}
    volumes:
      - ./services/temporal/scripts/bootstrap-namespace.sh:/etc/temporal/bootstrap-namespace.sh:ro
    entrypoint:
      - /bin/sh
      - /etc/temporal/bootstrap-namespace.sh
    depends_on:
      temporal:
        condition: service_started
    networks:
      - local-network
    restart: "no"

  temporal-visibility-rehearsal:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.1-tctl-1.18.4-cli-1.5.0}
    profiles: ["temporal-tools"]
    environment:
      - TEMPORAL_POSTGRES_HOST=postgres
      - TEMPORAL_POSTGRES_PORT=5432
      - TEMPORAL_POSTGRES_USER=${TEMPORAL_POSTGRES_USER:-temporal}
      - TEMPORAL_POSTGRES_PASSWORD=${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      - TEMPORAL_VISIBILITY_DB=${TEMPORAL_VISIBILITY_DB:-temporal_visibility}
      - TEMPORAL_VISIBILITY_SCHEMA_DIR=${TEMPORAL_VISIBILITY_SCHEMA_DIR:-/etc/temporal/schema/postgresql/v12/visibility/versioned}
      - TEMPORAL_NUM_HISTORY_SHARDS=${TEMPORAL_NUM_HISTORY_SHARDS:-1}
      - TEMPORAL_SHARD_DECISION_ACK=${TEMPORAL_SHARD_DECISION_ACK:-}
    volumes:
      - ./services/temporal/scripts/rehearse-visibility-schema-upgrade.sh:/etc/temporal/rehearse-visibility-schema-upgrade.sh:ro
    entrypoint:
      - /bin/sh
      - /etc/temporal/rehearse-visibility-schema-upgrade.sh
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
    networks:
      - local-network
    restart: "no"

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.29.1-tctl-1.18.4-cli-1.5.0}
    profiles: ["temporal-tools"]
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
    command: sh -lc "sleep infinity"
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
    networks:
      - local-network
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-2.34.0}
    profiles: ["temporal-ui"]
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
    ports:
      - "${TEMPORAL_UI_HOST_PORT:-8088}:8080"
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
    networks:
      - local-network
    restart: unless-stopped

  temporal-worker-workflow:
    image: ${MOONMIND_IMAGE:-ghcr.io/moonladderstudios/moonmind:latest}
    init: true
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_WORKER_FLEET=workflow
      - TEMPORAL_WORKFLOW_TASK_QUEUE=${TEMPORAL_WORKFLOW_TASK_QUEUE:-mm.workflow}
      - TEMPORAL_USER_WORKFLOW_V2_TASK_QUEUE=${TEMPORAL_USER_WORKFLOW_V2_TASK_QUEUE:-mm.workflow.user.v2}
      - TEMPORAL_MERGE_AUTOMATION_WORKFLOW_TASK_QUEUE=${TEMPORAL_MERGE_AUTOMATION_WORKFLOW_TASK_QUEUE:-mm.workflow.merge_automation}
      - TEMPORAL_WORKFLOW_WORKER_CONCURRENCY=${TEMPORAL_WORKFLOW_WORKER_CONCURRENCY:-8}
      - TEMPORAL_MERGE_AUTOMATION_WORKFLOW_WORKER_CONCURRENCY=${TEMPORAL_MERGE_AUTOMATION_WORKFLOW_WORKER_CONCURRENCY:-2}
      - TEMPORAL_WORKER_COMMAND=${TEMPORAL_WORKER_COMMAND:-python -m
        moonmind.workflows.temporal.worker_runtime}
      - MOONMIND_URL=${MOONMIND_URL:-http://api:8000}
      - TEMPORAL_ARTIFACT_BACKEND=${TEMPORAL_ARTIFACT_BACKEND:-s3}
      - TEMPORAL_ARTIFACT_S3_ENDPOINT=${TEMPORAL_ARTIFACT_S3_ENDPOINT:-http://moonmind-temporal-artifacts-s3:9000}
      - TEMPORAL_ARTIFACT_S3_PUBLIC_ENDPOINT=${TEMPORAL_ARTIFACT_S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      - TEMPORAL_ARTIFACT_S3_BUCKET=${TEMPORAL_ARTIFACT_S3_BUCKET:-moonmind-temporal-artifacts}
      - TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID=${TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID:-minioadmin}
      - TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY=${TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY:-minioadmin}
      - MOONMIND_ALLOW_LOCAL_ENCRYPTION_KEY_GENERATION=${MOONMIND_ALLOW_LOCAL_ENCRYPTION_KEY_GENERATION:-1}
    env_file:
      - path: .env
        required: false
    volumes:
      - ./moonmind:/app/moonmind:ro
      - ./api_service:/app/api_service:ro
      - ./docs:/app/docs:ro
      - ./services:/app/services:ro
      - moonmind_secrets:/app/var/secrets
      - agent_workspaces:/work/agent_jobs
    entrypoint:
      - python
      - /app/services/temporal/scripts/start-workflow-worker-group.py
    healthcheck:
      test: [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
          urllib.request.urlopen('http://localhost:8080/healthz')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
    networks:
      - local-network
    restart: unless-stopped

  temporal-worker-artifacts:
    image: ${MOONMIND_IMAGE:-ghcr.io/moonladderstudios/moonmind:latest}
    init: true
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_WORKER_FLEET=artifacts
      - TEMPORAL_ACTIVITY_ARTIFACTS_TASK_QUEUE=${TEMPORAL_ACTIVITY_ARTIFACTS_TASK_QUEUE:-mm.activity.artifacts}
      - TEMPORAL_ARTIFACTS_WORKER_CONCURRENCY=${TEMPORAL_ARTIFACTS_WORKER_CONCURRENCY:-8}
      - TEMPORAL_ARTIFACT_BACKEND=${TEMPORAL_ARTIFACT_BACKEND:-s3}
      - TEMPORAL_ARTIFACT_S3_ENDPOINT=${TEMPORAL_ARTIFACT_S3_ENDPOINT:-http://moonmind-temporal-artifacts-s3:9000}
      - TEMPORAL_ARTIFACT_S3_PUBLIC_ENDPOINT=${TEMPORAL_ARTIFACT_S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      - TEMPORAL_ARTIFACT_S3_BUCKET=${TEMPORAL_ARTIFACT_S3_BUCKET:-moonmind-temporal-artifacts}
      - TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID=${TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID:-minioadmin}
      - TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY=${TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY:-minioadmin}
      - TEMPORAL_WORKER_COMMAND=${TEMPORAL_WORKER_COMMAND:-python -m
        moonmind.workflows.temporal.worker_runtime}
      - MOONMIND_ALLOW_LOCAL_ENCRYPTION_KEY_GENERATION=${MOONMIND_ALLOW_LOCAL_ENCRYPTION_KEY_GENERATION:-1}
    env_file:
      - path: .env
        required: false
    volumes:
      - ./moonmind:/app/moonmind:ro
      - ./api_service:/app/api_service:ro
      - ./docs:/app/docs:ro
      - ./services:/app/services:ro
      - moonmind_secrets:/app/var/secrets
    entrypoint:
      - /bin/sh
      - /app/services/temporal/scripts/start-worker.sh
    healthcheck:
      test: [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
          urllib.request.urlopen('http://localhost:8080/healthz')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
      minio:
        condition: service_started
    networks:
      - local-network
    restart: unless-stopped

  temporal-worker-llm:
    image: ${MOONMIND_IMAGE:-ghcr.io/moonladderstudios/moonmind:latest}
    init: true
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_WORKER_FLEET=llm
      - TEMPORAL_ACTIVITY_LLM_TASK_QUEUE=${TEMPORAL_ACTIVITY_LLM_TASK_QUEUE:-mm.activity.llm}
      - TEMPORAL_LLM_WORKER_CONCURRENCY=${TEMPORAL_LLM_WORKER_CONCURRENCY:-4}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TEMPORAL_WORKER_COMMAND=${TEMPORAL_WORKER_COMMAND:-python -m
        moonmind.workflows.temporal.worker_runtime}
      - TEMPORAL_ARTIFACT_BACKEND=${TEMPORAL_ARTIFACT_BACKEND:-s3}
      - TEMPORAL_ARTIFACT_S3_ENDPOINT=${TEMPORAL_ARTIFACT_S3_ENDPOINT:-http://moonmind-temporal-artifacts-s3:9000}
      - TEMPORAL_ARTIFACT_S3_PUBLIC_ENDPOINT=${TEMPORAL_ARTIFACT_S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      - TEMPORAL_ARTIFACT_S3_BUCKET=${TEMPORAL_ARTIFACT_S3_BUCKET:-moonmind-temporal-artifacts}
      - TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID=${TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID:-minioadmin}
      - TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY=${TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY:-minioadmin}
      - MOONMIND_ALLOW_LOCAL_ENCRYPTION_KEY_GENERATION=${MOONMIND_ALLOW_LOCAL_ENCRYPTION_KEY_GENERATION:-1}
    env_file:
      - path: .env
        required: false
    volumes:
      - ./moonmind:/app/moonmind:ro
      - ./api_service:/app/api_service:ro
      - ./docs:/app/docs:ro
      - ./services:/app/services:ro
      - moonmind_secrets:/app/var/secrets
    entrypoint:
      - /bin/sh
      - /app/services/temporal/scripts/start-worker.sh
    healthcheck:
      test: [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
          urllib.request.urlopen('http://localhost:8080/healthz')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      temporal:
        condition: service_started
      temporal-namespace-init:
        condition: service_completed_successfully
    networks:
      - local-network
    restart: unless-stopped

  temporal-worker-sandbox:
    image: ${MOONMIND_IMAGE:-ghcr.io/moonladderstudios/moonmind:latest}
    init: true
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal-internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_WORKER_FLEET=sandbox
      - TEMPORAL_ACTIVITY_SANDBOX_TASK_QUEUE=${TEMPORAL_ACTIVITY_SANDBOX_TASK_QUEUE:-mm.activity.sandbox}
      - TEMPORAL_SANDBOX_WORKER_CONCURRENCY=${TEMPORAL_SANDBOX_WORKER_CONCURRENCY:-2}
      - CODEX_VOLUME_PATH=${CODEX_VOLUME_PATH:-/home/app/.codex}
      - CODEX_HOME=${CODEX_VOLUME_PATH:-/home/app/.codex}
      - CODEX_CONFIG_HOME=${CODEX_VOLUME_PATH:-/home/app/.codex}
      - CODEX_CONFIG_PATH=${CODEX_VOLUME_PATH:-/home/app/.codex}/config.toml
      - CODEX_TEMPLATE_PATH=/app/api_service/config.template.toml
      - CLAUDE_HOME=${CLAUDE_VOLUME_PATH:-/home/app/.claude}
      - CLAUDE_VOLUME_PATH=${CLAUDE_VOLUME_PATH:-/home/app/.claude}
      - MOONMIND_CLAUDE_CLI_AUTH_MODE=${MOONMIND_CLAUDE_CLI_AUTH_MODE:-api_key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - MOONMIND_CODEX_MODEL=${MOONMIND_CODEX_MODEL:-}
      - MOONMIND_CODEX_EFFORT=${MOONMIND_CODEX_EFFORT:-}
      - MOONMIND_CLAUDE_MODEL=${MOONMIND_CLAUDE_MODEL:-}
      - MOONMIND_CLAUDE_EFFORT=${MOONMIND_CLAUDE_EFFORT:-}
      - TEMPORAL_WORKER_COMMAND=${TEMPORAL_WORKER_COMMAND:-python -m
        moonmind.workflows.temporal.worker_runtime}
      - TEMPORAL_ARTIFACT_BACKEND=${TEMPORAL_ARTIFACT_BACKEND:-s3}
      - TEMPORAL_ARTIFACT_S3_ENDPOINT=${TEMPORAL_ARTIFACT_S3_ENDPOINT:-http://moonmind-temporal-artifacts-s3:9000}
      - TEMPORAL_ARTIFACT_S3_PUBLIC_ENDPOINT=${TEMPORAL_ARTIFACT_S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      - TEMPORAL_ARTIFACT_S3_BUCKET=${TEMPORAL_ARTIFACT_S3_BUCKET:-moonmind-temporal-artifacts}
      - TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID=${TEMPORAL_ARTIFACT_S3_ACCESS_KEY_ID:-minioadmin}
      - TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY=${TEMPORAL_ARTIFACT_S3_SECRET_ACCESS_KEY:-minioadmin}
      - MOONMIND_ALLOW_LOCAL_ENCRYPTION_KEY_GENERATION=${MOONMIND_ALLOW_LOCAL_ENCRYPTION_KEY_GENERATION:-1}
      - HTTP_PROXY=${MOONMIND_SANDBOX_HTTP_PROXY:-http://sandbox-egress-proxy:3128}
      - HTTPS_PROXY=${MOONMIND_SANDBOX_HTTPS_PROXY:-http://sandbox-egress-proxy:3128}
      - http_proxy=${MOONMIND_SANDBOX_HTTP_PROXY:-http://sandbox-egress-proxy:3128}
      - https_proxy=${MOONMIND_SANDBOX_HTTPS_PROXY:-http://sandbox-egress-proxy:3128}
      - NO_PROXY=${MOONMIND_SANDBOX_NO_PROXY:-localhost,127.0.0.1,temporal-internal,moonmind-temporal-artifacts-s3,moonmind-api-db,postgres,minio,temporal}
