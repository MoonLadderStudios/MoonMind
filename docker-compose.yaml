      - CODEX_HOME=${CODEX_VOLUME_PATH:-/home/app/.codex}
    command: >-
      sh -lc "CODEX_HOME=$${CODEX_HOME:-/home/app/.codex}; mkdir -p
      \"$${CODEX_HOME}\" && chown -R 1000:1000 \"$${CODEX_HOME}\" && chmod 0775
      \"$${CODEX_HOME}\""
    volumes:
      - codex_auth_volume:${CODEX_VOLUME_PATH:-/home/app/.codex}
    restart: "no"

  claude-auth-init:
    image: alpine:3.20
    command: >-
      sh -lc "mkdir -p ${CLAUDE_VOLUME_PATH:-/home/app/.claude} && chown -R
      1000:1000 ${CLAUDE_VOLUME_PATH:-/home/app/.claude} && chmod 0775
      ${CLAUDE_VOLUME_PATH:-/home/app/.claude}"
    volumes:
      - claude_auth_volume:${CLAUDE_VOLUME_PATH:-/home/app/.claude}
    restart: "no"

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    environment:
      INFO: 1
      CONTAINERS: 1
      EXEC: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 1
      VOLUMES: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/docker-proxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - docker-proxy-network
    restart: unless-stopped

  sandbox-egress-proxy:
    image: ubuntu/squid:latest
    volumes:
      - ./docker/sandbox-egress-proxy/squid.conf:/etc/squid/squid.conf:ro
    expose:
      - "3128"
    networks:
      - local-network
      - sandbox-egress-network
    restart: unless-stopped

volumes:
  qdrant-storage:
  omnigent-host-state:
  postgres-data:
  minio-data:
  workflow_workspaces:
  agent_workspaces:
    name: ${MOONMIND_AGENT_WORKSPACES_VOLUME_NAME:-agent_workspaces}
  moonmind_secrets:
    name: ${MOONMIND_SECRETS_VOLUME_NAME:-moonmind_secrets}
  unreal_ccache_volume:
    name: unreal_ccache_volume
  unreal_ubt_volume:
    name: unreal_ubt_volume
  codex_auth_volume:
    name: ${CODEX_VOLUME_NAME:-codex_auth_volume}
  claude_auth_volume:
    name: ${CLAUDE_VOLUME_NAME:-claude_auth_volume}
  omnigent-data:

networks:
  local-network:
    external: true
  docker-proxy-network:
    name: ${MOONMIND_DOCKER_PROXY_NETWORK:-moonmind_docker-proxy-network}
    internal: true
  sandbox-egress-network:
    name: ${MOONMIND_SANDBOX_EGRESS_NETWORK:-moonmind_sandbox-egress-network}
    internal: true
