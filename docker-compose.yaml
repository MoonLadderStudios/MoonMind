      - MOONMIND_CURSOR_CLI_AUTH_MODE=${MOONMIND_CURSOR_CLI_AUTH_MODE:-api_key}
      - CURSOR_API_KEY=${CURSOR_API_KEY:-}
      - CURSOR_HOME=${CURSOR_VOLUME_PATH:-/home/app/.cursor}
      - MOONMIND_CURSOR_MODEL=${MOONMIND_CURSOR_MODEL:-}
      - MOONMIND_CURSOR_EFFORT=${MOONMIND_CURSOR_EFFORT:-}
      - TEMPORAL_WORKER_COMMAND=${TEMPORAL_WORKER_COMMAND:-python -m moonmind.workflows.temporal.worker_runtime}
    env_file:
