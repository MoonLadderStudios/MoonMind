version: '3.8'

services:
  job:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - PYTHONUNBUFFERED=1
      - FASTAPI_RELOAD=${FASTAPI_RELOAD:-0}
    env_file:
      - .env
    volumes:
      - ./jobs:/app/jobs
      - ./model_data:/app/model_data
      - ./moonmind:/app/moonmind:ro
      - ./prompts:/app/prompts
      - ${DATA_MOUNT_SOURCE:-./data}:${DATA_MOUNT_TARGET:-/app/data}
    command: echo "This is the YAML command, should NOT run if overridden"
    networks:
      - local-network

  rabbitmq:
    image: rabbitmq:3.13-management
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-moonmind}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD?Variable RABBITMQ_PASSWORD is not set}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - local-network
    restart: unless-stopped


  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    image: moonmind/orchestrator:latest
    env_file:
      - .env
    environment:
      - ORCHESTRATOR_ARTIFACT_ROOT=${ORCHESTRATOR_ARTIFACT_ROOT:-var/artifacts/workflows}
      - ORCHESTRATOR_STATSD_HOST=${ORCHESTRATOR_STATSD_HOST:-}
      - ORCHESTRATOR_STATSD_PORT=${ORCHESTRATOR_STATSD_PORT:-8125}
      - DOCKER_HOST=${ORCHESTRATOR_DOCKER_HOST:-unix:///var/run/docker.sock}
      - WORKFLOW_REPO_ROOT=${WORKFLOW_REPO_ROOT:-${MOONMIND_ORCHESTRATOR_WORKFLOW_REPO_ROOT:-/workspace}}
      - WORKFLOW_SKILLS_CACHE_ROOT=${WORKFLOW_SKILLS_CACHE_ROOT:-/tmp/workflow_skill_cache}
      - WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT=${WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT:-${MOONMIND_ORCHESTRATOR_WORKFLOW_SKILLS_LOCAL_MIRROR_ROOT:-/workspace/.agents/skills/local}}
      - WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT=${WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT:-${MOONMIND_ORCHESTRATOR_WORKFLOW_SKILLS_LEGACY_MIRROR_ROOT:-/workspace/.agents/skills}}
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - local-network
    restart: unless-stopped

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    environment:
      INFO: 1
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - docker-proxy-network
    restart: unless-stopped

networks:
  local-network:
    external: true
  docker-proxy-network:
    internal: true

volumes:
  rabbitmq-data:
