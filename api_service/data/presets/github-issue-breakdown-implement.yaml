slug: github-issue-breakdown-implement
title: Breakdown and GitHub Issue Implement
description: Break a preferred source input into stories, create GitHub issues, then create dependent GitHub Issue Implement workflows for each generated issue.
scope: global
tags:
  - github
  - moonspec
  - breakdown
  - implement
requiredCapabilities:
  - git
  - gh
annotations:
  sourceSkill: github-issue-breakdown
  githubWorkflow: breakdown-to-dependent-implement
  output: dependent-github-issue-implement-workflows
  traceability:
    implementationIssueKey: MM-1069
    sourceIssueKey: MM-1063
    coverageIds:
      - DESIGN-REQ-001
      - DESIGN-REQ-005
      - DESIGN-REQ-006
      - DESIGN-REQ-008
      - DESIGN-REQ-014
      - DESIGN-REQ-015
inputs:
  - name: feature_request
    label: Workflow Instructions
    type: markdown
    required: false
    default: ""
  - name: source_design_path
    label: Source Document Path
    type: repo_path
    required: false
    default: ""
  - name: github_repository
    label: GitHub Repository
    type: text
    required: true
    default: ""
  - name: publish_mode
    label: Publish Mode
    type: enum
    required: true
    default: pr
    options:
      - pr
      - branch
      - none
  - name: source_issue_key
    label: Source Issue Key
    type: text
    required: false
    default: ""
steps:
  - title: Break down preferred source input
    instructions: |-
      Run moonspec-breakdown using this input preference chain:

      1. If Source document path is non-empty, read that repo path and use it as the source design.
      2. Otherwise, use Workflow instructions as the source design.

      Source document path:
      {{ inputs.source_design_path }}

      Source issue key:
      {{ inputs.source_issue_key }}

      Workflow instructions:
      {{ inputs.feature_request }}

      Preserve story order, dependencies, source issue, source document path, sourceReference, and traceability in the breakdown output.
      If the selected input is a readable repo path under docs/ (except docs/tmp/) or AGENTS.md, use that file as the canonical declarative document and preserve its path plus stable canonical claim IDs in every story's sourceReference.path and sourceReference.claimIds.
      If the selected input is non-canonical file-backed source, preserve that source path in source.path, source.referencePath, and story sourceReference.path, record sourceReference.claimIds as an empty list, and use sourceReference.coverageIds for run-local traceability.
      If the selected input is workflow instructions without a readable path, preserve those instructions as inline source text, set source.path and source.referencePath to null, set each story's sourceReference.path to null, and set sourceReference.claimIds to an empty list.
      Record sourceDocumentClass in the breakdown output.
      Write the coverage-checked story breakdown to the runtime-provided story breakdown paths.
    skill:
      id: moonspec-breakdown
      args: {}
      requiredCapabilities:
        - git
  - title: Reconcile stories with current implementation
    instructions: |-
      Use story-reconcile-implementation to compare the generated MoonSpec story breakdown against the current repository implementation before any GitHub issue creation occurs.

      Read the runtime-provided story breakdown JSON path and rewrite that same JSON handoff with implementationStatus and jiraCreation fields for every story.
      Mark fully implemented stories with jiraCreation.action = "skip" so no GitHub issue or downstream GitHub Issue Implement workflow is created for completed work.
      For partially implemented stories, preserve the original story scope and add remainingWork so GitHub tracks only the unmet requirements.
      Mark unverifiable stories with jiraCreation.action = "manual_review" so deterministic GitHub creation will not create implementation work automatically.
      Write the reconciliation report to the runtime-provided markdown breakdown path when available.
      Do not create GitHub issues, do not create implementation tasks, and do not implement code in this reconciliation step.
    skill:
      id: story-reconcile-implementation
      args: {}
      requiredCapabilities:
        - git
  - title: Create GitHub issues
    instructions: |-
      Create one GitHub issue in {{ inputs.github_repository }} for each eligible story from the reconciled MoonSpec breakdown.

      Use the runtime-provided story breakdown JSON path.
      Every GitHub issue must include the Source Document path and canonical claim IDs from the story breakdown when present; otherwise include the source title and Source issue key when present.
      Do not create GitHub issues for stories where jiraCreation.action is skip or manual_review.
      For stories where jiraCreation.action is create_remaining_work_issue, create the GitHub issue from the story's remainingWork while preserving the original story traceability.
      Preserve story order in the returned issue mappings.
    storyOutput:
      mode: github
      fallback: fail
      github:
        repository: "{{ inputs.github_repository }}"
        sourceIssueKey: "{{ inputs.source_issue_key }}"
    skill:
      id: story.create_github_issues
      requiredCapabilities:
        - gh
      args: {}
  - title: Create dependent GitHub Issue Implement workflows
    instructions: |-
      Create one GitHub Issue Implement workflow execution for each GitHub issue created from the trusted GitHub story output.

      Use the ordered issue mappings returned by story.create_github_issues. Preserve the generated story order when creating downstream workflows.
      Do not create downstream workflows for skipped fully implemented stories or manual-review stories that did not produce GitHub issue mappings.
      Each downstream workflow must run GitHub Issue Implement on its corresponding GitHub issue and must not run implementation inline inside this breakdown run.
      Create workflow dependencies with dependsOn so each later generated workflow waits for the immediately earlier generated workflow ID.
      Preserve source issue {{ inputs.source_issue_key }}, source document path, dependencies, and traceability in downstream workflow inputs.
      Report created workflows, skipped stories, dependency edges, partial failures, and no-downstream-workflow outcomes honestly.
    githubOrchestration:
      task:
        repository: "{{ context.repository }}"
        runtime:
          mode: "{{ context.targetRuntime }}"
        publish:
          mode: "{{ inputs.publish_mode }}"
      traceability:
        sourceIssueKey: "{{ inputs.source_issue_key }}"
    skill:
      id: story.create_github_issue_implement_tasks
      requiredCapabilities:
        - gh
      args: {}
