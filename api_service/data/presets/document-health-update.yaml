slug: document-health-update
title: Document Health Update
description: Review the health of a documentation scope, then remediate the issues
  the review found. Runs a document health review step that audits documentation against
  the current implementation and records a structured health report, then a document
  health remediate step that fixes only the reported issues.
scope: global
version: 1.0.0
tags:
- documentation
- document-health
- remediation
requiredCapabilities:
- git
annotations:
  documentWorkflow: review-then-remediate
  output: document-health-remediation
inputs:
- name: documentation_scope
  label: Documentation Scope
  type: text
  required: true
  default: docs/
- name: constraints
  label: Constraints
  type: textarea
  required: false
  default: ''
steps:
- title: Document health review
  annotations:
    documentHealthRole: review
  instructions: 'Review the health of the documentation in scope: {{ inputs.documentation_scope
    }}.


    Audit each in-scope document against the current implementation. Treat repository
    source code, tests, schemas, and executable configuration as the source of truth.
    Identify documentation health issues such as: drift or factual inaccuracy versus
    the implementation, stale or superseded descriptions, broken or outdated cross-references
    and links, and coverage or structural gaps. For canonical docs under docs/, judge
    health against the documented desired state and do not treat a buggy or incomplete
    implementation as the target; record an implementation gap instead of downgrading
    the doc.


    This is a review-only step. Do not edit documentation in this step.


    Additional constraints:

    {{ inputs.constraints }}


    Write a structured health report to artifacts/document-health-review.json. The
    report must include the reviewed scope and a findings list, where each finding
    records the document path, the issue type, a severity, the supporting evidence,
    and a recommended remediation. When no health issues are found, record an empty
    findings list and say so explicitly.


    Scope this review strictly to the documentation scope above. Do not broaden scope
    or audit unrelated documents.'
  skill:
    id: auto
    args: {}
    requiredCapabilities:
    - git
- title: Document health remediate
  annotations:
    documentHealthRole: remediate
  instructions: 'Read artifacts/document-health-review.json (the structured health
    report produced by the document health review step) before doing anything.


    If the report records an empty findings list, make no documentation changes and
    report that remediation is skipped because the review found no document health
    issues.


    Otherwise remediate ONLY the issues recorded in the review report, limited to
    the documents named in those findings. Apply the smallest correct edit for each
    finding so the documentation accurately describes the current implementation.
    For canonical docs under docs/, preserve the documented desired-state framing:
    when the implementation contradicts the intended architecture, contract, operator-visible
    behavior, or target semantics, record the implementation gap rather than downgrading
    the doc to match buggy behavior.


    Additional constraints:

    {{ inputs.constraints }}


    Do not introduce new findings, redo review work that is already recorded, or broaden
    scope beyond the documents in the report. Follow the project''s testing standards:
    if a change touches executable content, add or update the covering tests and confirm
    they pass before finishing.


    Report which findings were remediated, which were intentionally left for follow-up,
    and the evidence for each change.'
  skill:
    id: auto
    args: {}
    requiredCapabilities:
    - git
