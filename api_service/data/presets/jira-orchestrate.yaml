      id: moonspec-doc-reconcile
      args: {}
      requiredCapabilities:
        - git
  - title: Create pull request
    annotations:
      jiraOrchestrateRole: pull-request-handoff
    instructions: |-
      /clear

      Create a pull request for the completed work for Jira issue {{ inputs.jira_issue_key }}.

      {% if inputs.run_verify %}Before committing, inspect the latest post-remediation moonspec-verify result and confirm the verdict is FULLY_IMPLEMENTED. If the latest verdict is ADDITIONAL_WORK_NEEDED, NO_DETERMINATION, BLOCKED, FAILED_UNRECOVERABLE, or ENVIRONMENT_CONTAMINATED_BY_SKILL_PROJECTION, stop without committing, pushing, creating a pull request, or changing Jira. Classify runtime or infrastructure causes as environment failure.{% else %}Before committing, confirm implementation is complete and the focused tests required by the Jira issue have passed. Verification was disabled for this workflow execution, so do not require a moonspec-verify report before creating a pull request.{% endif %}

      This Jira Orchestrate handoff step is the explicit PR-publication step for this preset. It intentionally owns pull request creation before the Jira Review transition so the confirmed pull request URL is available to both Jira and MoonMind publish handling. If generic managed-runtime guidance says not to push or create a pull request, treat this step-specific handoff instruction as the controlling instruction for this step only. If the workflow is submitted with PR merge automation enabled, the parent workflow must use the pull request URL produced by this step as the published PR and then run merge automation against that PR. If the runtime instructions, workflow parameters, authentication, remote configuration, branch protection, or repository permissions prevent committing, pushing, or creating the pull request in this step, stop before changing Jira to Review and report the exact blocker.

      First confirm the working tree contains only intentional changes for this issue and no raw credentials. Commit the work with a concise message that includes {{ inputs.jira_issue_key }}. Push the current non-protected work branch and create a non-draft pull request with the available authenticated GitHub tooling.

      The pull request must be ready for review, not a draft. Do not pass draft flags when creating it. If the available tool or repository default creates a draft pull request, immediately mark it ready for review (for example, with the authenticated GitHub tooling's ready-for-review command) and verify the final pull request isDraft value is false before continuing.

      The pull request title must include {{ inputs.jira_issue_key }}. The pull request body must include:
      - the Jira issue key
      - the active MoonSpec feature path
      - verification verdict, or a note that verification was disabled for this workflow execution
      - tests run
      - remaining risks
      - {% if inputs.run_verify %}the doc reconciliation outcome from artifacts/jira-orchestrate-doc-reconcile.json when present: updated canonical doc paths, the no-update rationale, or the escalation Jira issue key{% else %}a note that doc reconciliation was skipped because verification was disabled{% endif %}
      - a Documentation Conformance section listing canonical sources, temporary artifacts consulted, claim coverage, and reconciliation outcomes

      {% if inputs.run_verify %}Canonical doc edits produced by the doc reconciliation step are intentional changes for this issue and must be committed in the same pull request.{% else %}Do not require doc reconciliation output before committing because verification was disabled and the doc reconciliation step was skipped.{% endif %}

      After creation and non-draft verification, record the confirmed pull request URL in the step result and in a local handoff artifact at artifacts/jira-orchestrate-pr.json with keys jira_issue_key and pull_request_url. Do not continue unless the pull_request_url is a GitHub pull request URL for the current work branch and the pull request is confirmed non-draft.
    skill:
      id: auto
      args: {}
      requiredCapabilities:
        - git
