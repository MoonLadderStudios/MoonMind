slug: jira-orchestrate
title: Jira Orchestrate
description: Move a Jira issue through implementation by using its preset brief as the MoonSpec orchestration input, creating a PR, and advancing the issue to Review.
scope: global
tags:
  - jira
  - moonspec
  - orchestration
  - pull-request
requiredCapabilities:
  - git
  - jira
  - gh
annotations:
  sourceSkill: moonspec-orchestrate
  jiraWorkflow: implementation-to-code-review
  output: pull-request
  inputSchema:
    type: object
    required:
      - jira_issue
    properties:
      jira_issue:
        type: object
        title: Jira issue
        description: Issue that will seed the task instructions and orchestration context.
        required:
          - key
        properties:
          key:
            type: string
            title: Issue key
          summary:
            type: string
            title: Summary
          description:
            type: string
            title: Description
          url:
            type: string
            format: uri
            title: URL
          status:
            type: string
            title: Status
          assignee:
            type: string
            title: Assignee
  uiSchema:
    jira_issue:
      widget: jira.issue-picker
      dataSource: jira.issues
      searchPlaceholder: Search Jira issues
      allowManualKeyEntry: true
  defaults: {}
  issueInput:
    provider: jira
    objectInput: jira_issue
    refInput: jira_issue_key
    refPath:
      - key
inputs:
  - name: jira_issue_key
    label: Jira Issue Key
    type: text
    required: true
  - name: source_design_path
    label: Source Design Path
    type: text
    required: false
    default: ""
  - name: constraints
    label: Constraints
    type: textarea
    required: false
    default: ""
steps:
  - title: Move Jira issue to In Progress
    instructions: |-
      Change Jira issue {{ inputs.jira_issue_key }} to status In Progress before implementation starts.

      Use the trusted Jira issue updater workflow and Jira transition tools. Match In Progress against the issue's available transitions or target statuses; do not guess transition IDs. Re-fetch the issue when possible and report the confirmed status.
    skill:
      id: jira-issue-updater
      requiredCapabilities:
        - jira
      args: {}
  - title: Check Jira blockers before implementation
    type: tool
    instructions: |-
      Check Jira issue {{ inputs.jira_issue_key }} through the deterministic trusted Jira blocker preflight before any MoonSpec implementation work starts.

      Jira Blocks direction is strict for Jira GET issue responses: when the target issue response exposes the other issue as outwardIssue and the link type says the outward relationship is "blocks", that other issue blocks {{ inputs.jira_issue_key }}. When the target issue response exposes the other issue as inwardIssue and the link type says the inward relationship is "is blocked by", {{ inputs.jira_issue_key }} blocks a later issue and that link MUST NOT block this orchestration.

      Ignore non-blocker issue links for the blocker decision.

      Continue only when no blocker links exist or every detected blocking issue is status Done.

      If any blocking issue is not Done, or if a blocker relationship exists but blocker status cannot be determined from trusted Jira data, stop the orchestration immediately. Report a blocked outcome in the required JSON format (targetIssueKey, decision, blockingIssues, summary) and do not proceed to any subsequent steps, including brief loading, classification, or MoonSpec implementation. Include {{ inputs.jira_issue_key }} as the targetIssueKey.

      Do not use raw Jira credentials, web scraping, hardcoded transition IDs, or prompt text alone to decide blocker state.
    targetIssueKey: "{{ inputs.jira_issue_key }}"
    blockerPreflight:
      targetIssueKey: "{{ inputs.jira_issue_key }}"
      linkType: Blocks
    tool:
      id: jira.check_blockers
      requiredCapabilities:
        - jira
      args:
        targetIssueKey: "{{ inputs.jira_issue_key }}"
        blockerPreflight:
          targetIssueKey: "{{ inputs.jira_issue_key }}"
          linkType: Blocks
  - title: Load Jira preset brief
    type: tool
    instructions: |-
      Fetch Jira issue {{ inputs.jira_issue_key }} through the deterministic trusted Jira tool surface.

      Build the canonical MoonSpec orchestration input from the issue's Jira preset brief. Prefer a normalized preset brief or recommended preset instructions when the Jira issue response exposes one. If that field is unavailable, synthesize the brief from the issue key, summary, description, acceptance criteria, and relevant implementation notes.

      Preserve the issue key in the brief so downstream spec artifacts and the pull request can reference {{ inputs.jira_issue_key }}.
    tool:
      id: jira.load_preset_brief
      requiredCapabilities:
        - jira
      args: {}
      inputs:
        issueKey: "{{ inputs.jira_issue_key }}"
  - title: Classify request and resume point
    instructions: |-
      Use the Jira preset brief for {{ inputs.jira_issue_key }} as the canonical Moon Spec orchestration input.

      Additional constraints:
      {{ inputs.constraints }}

      Jira Orchestrate always runs as a runtime implementation workflow.
      If the brief points at an implementation document, treat it as runtime source requirements.
      Source design path (optional): {{ inputs.source_design_path }}.

      Classify the input as a single-story feature request, broad technical or declarative design, or existing feature directory.
      Inspect existing Moon Spec artifacts and resume from the first incomplete stage instead of regenerating valid later-stage artifacts.
    skill:
      id: auto
      args: {}
  - title: Create or select Moon Spec
    instructions: |-
      For a single-story Jira preset brief, run moonspec-specify unless an active spec.md already passes the specify gate.
      For a broad technical or declarative design, run moonspec-breakdown first, then select the recommended first generated spec unless the issue brief explicitly requires processing all specs.
      Preserve Jira issue {{ inputs.jira_issue_key }} and the original preset brief in spec.md so final verification can compare against them.
    skill:
      id: moonspec-specify
      args: {}
  - title: Split broad designs when needed
    instructions: |-
      Run moonspec-breakdown only when the Jira preset brief is a broad technical or declarative design with multiple independently testable stories.
      Keep each generated spec isolated and process specs in dependency order when multiple specs are required by {{ inputs.jira_issue_key }}.
    skill:
      id: auto
      args: {}
  - title: Plan selected spec
    instructions: |-
      Run moonspec-plan when plan.md or required design artifacts are missing or stale.
      Verify that plan.md, research.md, quickstart.md, and any required data model or contracts exist before continuing.
      Keep unit and integration test strategies explicit.
    skill:
      id: moonspec-plan
      args: {}
  - title: Generate TDD task breakdown
    instructions: |-
      Run moonspec-tasks when tasks.md is missing or upstream artifacts changed.
      Verify tasks.md covers exactly one story and includes red-first unit tests, integration tests, implementation tasks, story validation, and final /moonspec-verify work.
    skill:
      id: moonspec-tasks
      args: {}
  - title: Align Moon Spec artifacts
    instructions: |-
      Run moonspec-align after task generation.
      Let moonspec-align analyze and remediate artifact drift conservatively without manual analyze prompts, scripted user approvals, or extra Prompt A/Prompt B loops.
      If alignment changes spec.md, plan.md, design artifacts, or tasks.md, re-check the downstream gates and regenerate only artifacts that are now stale.
    skill:
      id: moonspec-align
      args: {}
  - title: Implement the task breakdown
    instructions: |-
      /clear

      Run moonspec-implement when implementation work remains.
      Require TDD evidence: unit and integration tests are written and confirmed failing before production code.
      Mark completed tasks [X] in tasks.md and preserve the selected story scope.
    skill:
      id: moonspec-implement
      args: {}
      requiredCapabilities:
        - git
  - title: Verify completion
    instructions: |-
      /clear

      Run moonspec-verify as the final read-only gate unless an up-to-date verification report already covers the current code and artifacts.
      If the verdict is ADDITIONAL_WORK_NEEDED, preserve the report as the mandatory remediation input for the next step.
      If the verdict is NO_DETERMINATION, stop and report the missing evidence, commands, or context. If the verdict is BLOCKED, FAILED_UNRECOVERABLE, or ENVIRONMENT_CONTAMINATED_BY_SKILL_PROJECTION, classify it as an environment or setup failure when the verifier identifies missing runtime infrastructure, stop immediately, skip all remediation attempts, and do not create a pull request.
      Do not create a pull request from this step. Pull request creation is allowed only after the post-remediation verification step reports FULLY_IMPLEMENTED.
    skill:
      id: moonspec-verify
      args: {}
  - title: Remediate verification gaps 1 of 6
    annotations:
      jiraOrchestrateRole: moonspec-remediation
      moonSpecRemediationAttempt: 1
      moonSpecRemediationMaxAttempts: 6
    instructions: |-
      /clear

      Inspect the latest moonspec-verify result for {{ inputs.jira_issue_key }} before doing any work. This is remediation attempt 1 of 6.

      If the latest verdict is FULLY_IMPLEMENTED, make no code changes and report that remediation is skipped because verification already passed.

      If the latest verdict is ADDITIONAL_WORK_NEEDED, treat the verification report's gaps and remaining work as the authoritative bounded implementation backlog. Run moonspec-implement to fix the reported implementation or validation gaps, update tasks.md only for work actually completed, and run the focused unit or integration checks named by the verification report when feasible.

      If the latest verdict is NO_DETERMINATION, only proceed when the missing evidence is recoverable in this runtime, such as by running a skipped command or inspecting available files. Otherwise stop and report the exact blocker. If the latest verdict is BLOCKED, FAILED_UNRECOVERABLE, or ENVIRONMENT_CONTAMINATED_BY_SKILL_PROJECTION, treat it as terminal for Jira Orchestrate remediation, classify runtime or infrastructure causes as environment failure, skip every remaining remediation attempt, and do not create a pull request.

      Do not broaden the selected story scope, do not create a pull request, and do not move Jira during remediation.
    skill:
      id: moonspec-implement
      args: {}
      requiredCapabilities:
        - git
  - title: Verify remediation 1 of 6
    annotations:
      jiraOrchestrateRole: moonspec-verification-gate
      moonSpecRemediationAttempt: 1
      moonSpecRemediationMaxAttempts: 6
      moonSpecFinalRemediationGate: false
    instructions: |-
      /clear

      Run moonspec-verify after remediation attempt 1, even when remediation was skipped because the prior verdict was FULLY_IMPLEMENTED.

      If the verdict is ADDITIONAL_WORK_NEEDED and another remediation attempt remains, preserve the verification report as the mandatory input for the next remediation attempt.
      If the verdict is NO_DETERMINATION, stop and report the missing evidence, commands, or context unless the missing evidence is recoverable in the current runtime by the next remediation attempt. If the verdict is BLOCKED, FAILED_UNRECOVERABLE, or ENVIRONMENT_CONTAMINATED_BY_SKILL_PROJECTION, treat it as terminal, classify runtime or infrastructure causes as environment failure, skip every remaining remediation attempt, and do not create a pull request.

      Continue toward pull request creation only when the latest post-remediation verdict is FULLY_IMPLEMENTED.
    skill:
      id: moonspec-verify
      args: {}
  - title: Remediate verification gaps 2 of 6
