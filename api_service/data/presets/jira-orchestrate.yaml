  - title: Reconcile declarative docs
    annotations:
      jiraOrchestrateRole: doc-reconciliation
    instructions: |-
      /clear

      Run moonspec-doc-reconcile for {{ inputs.jira_issue_key }} only when the controlling post-remediation verdict is FULLY_IMPLEMENTED. If the latest verdict is not FULLY_IMPLEMENTED, make no changes and report that doc reconciliation is skipped because publication is already blocked.

      Use the canonical source document recorded in spec.md (Source Document){% if inputs.source_design_path %} or the provided source design path {{ inputs.source_design_path }}{% endif %} as the starting authority candidate. Reconcile by authority scope, not original-source convenience: apply docs/Workflows/MoonSpecDocumentModel.md plus the docs/DocumentationArchitecture.md authority ladder and module-owned contract policy to identify the canonical document that owns each affected claim. The owning canonical doc may be different from the original source doc. If no canonical source candidate under docs/ exists, write the structured no_update_required outcome and continue.

      Consume the latest moonspec-verify report, including its Source Document Drift section, plus artifacts/doc-discoveries/<feature>.json when present. Apply the moonspec-doc-reconcile update gate strictly: edit canonical docs only for definite, evidence-backed discoveries showing the document is functionally wrong, internally inconsistent, or correctly diverged from for verified best-practice reasons. Otherwise report no_update_required; a no-op outcome is a correct result.

      If a required update conflicts with the constitution, README, Document Model, Documentation Architecture Standard, module-owned contract policy, or architecture direction, or if ownership is ambiguous between multiple canonical documents, do not edit the document; create the Jira escalation issue per the skill and continue. Escalation does not block pull request creation.

      Write the structured outcome to artifacts/jira-orchestrate-doc-reconcile.json with keys action, docPaths, updated, noUpdateRequired, escalated, gateRationale, evidence, and jiraIssue when escalated. Every updated/noUpdateRequired/escalated item must include a reason. Do not commit, push, or create a pull request from this step; any canonical doc edits remain in the working tree so the pull request step publishes them together with the implementation.
    skill:
      id: moonspec-doc-reconcile
      args: {}
      requiredCapabilities:
        - git
  - title: Create pull request
    annotations:
      jiraOrchestrateRole: pull-request-handoff
    instructions: |-
      /clear

      Create a pull request for the completed work for Jira issue {{ inputs.jira_issue_key }}.

      Before committing, inspect the latest post-remediation moonspec-verify result and confirm the verdict is FULLY_IMPLEMENTED. If the latest verdict is ADDITIONAL_WORK_NEEDED, NO_DETERMINATION, BLOCKED, FAILED_UNRECOVERABLE, or ENVIRONMENT_CONTAMINATED_BY_SKILL_PROJECTION, stop without committing, pushing, creating a pull request, or changing Jira. Classify runtime or infrastructure causes as environment failure.

      This Jira Orchestrate handoff step is the explicit PR-publication step for this preset. It intentionally owns pull request creation before the Jira Review transition so the confirmed pull request URL is available to both Jira and MoonMind publish handling. If generic managed-runtime guidance says not to push or create a pull request, treat this step-specific handoff instruction as the controlling instruction for this step only. If the task is submitted with PR merge automation enabled, the parent workflow must use the pull request URL produced by this step as the published PR and then run merge automation against that PR. If the runtime instructions, task parameters, authentication, remote configuration, branch protection, or repository permissions prevent committing, pushing, or creating the pull request in this step, stop before changing Jira to Review and report the exact blocker.

      First confirm the working tree contains only intentional changes for this issue and no raw credentials. Commit the work with a concise message that includes {{ inputs.jira_issue_key }}. Push the current non-protected work branch and create a non-draft pull request with the available authenticated GitHub tooling.

      The pull request must be ready for review, not a draft. Do not pass draft flags when creating it. If the available tool or repository default creates a draft pull request, immediately mark it ready for review (for example, with the authenticated GitHub tooling's ready-for-review command) and verify the final pull request isDraft value is false before continuing.

      The pull request title must include {{ inputs.jira_issue_key }}. The pull request body must include:
      - the Jira issue key
      - the active MoonSpec feature path
      - verification verdict
      - tests run
      - remaining risks
      - the doc reconciliation outcome from artifacts/jira-orchestrate-doc-reconcile.json when present: updated canonical doc paths, the no-update rationale, or the escalation Jira issue key
      - a Documentation Conformance section listing canonical sources, temporary artifacts consulted, claim coverage, and reconciliation outcomes

      Canonical doc edits produced by the doc reconciliation step are intentional changes for this issue and must be committed in the same pull request.

      After creation and non-draft verification, record the confirmed pull request URL in the step result and in a local handoff artifact at artifacts/jira-orchestrate-pr.json with keys jira_issue_key and pull_request_url. Do not continue unless the pull_request_url is a GitHub pull request URL for the current work branch and the pull request is confirmed non-draft.
    skill:
      id: auto
      args: {}
      requiredCapabilities:
        - git
  - title: Move Jira issue to Review
    annotations:
      jiraOrchestrateRole: code-review-handoff
    instructions: |-
      Change Jira issue {{ inputs.jira_issue_key }} to status Review only after the pull request exists.

      Before using any Jira transition tool, read the previous pull request creation result or artifacts/jira-orchestrate-pr.json and verify it contains a non-empty pull_request_url for {{ inputs.jira_issue_key }}. If no confirmed pull request URL is available, stop without changing Jira and report that Review is blocked until PR creation succeeds.

      Use the trusted Jira issue updater workflow and Jira transition tools. Match Review against the issue's available transitions or target statuses; do not guess transition IDs. Add or preserve a Jira-visible reference to the pull request when supported by the trusted tools. Re-fetch the issue when possible and report the confirmed status.
    skill:
      id: jira-issue-updater
      requiredCapabilities:
        - jira
      args: {}
