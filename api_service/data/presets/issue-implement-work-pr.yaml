slug: issue-implement-work-pr
title: Issue Implement Work and Pull Request
description: Complete remaining issue implementation work, verify it, and publish
  a pull request using provider-neutral issue inputs.
scope: global
tags:
- implementation
- verification
- pull-request
- issue
requiredCapabilities:
- git
- gh
annotations:
  sourceSkill: issue-implement-work-pr
  issueProvider: neutral
  output: pull-request
inputs:
- name: issue_provider
  label: Issue Provider
  type: text
  required: true
- name: issue_ref
  label: Issue Reference
  type: text
  required: true
- name: brief_artifact_path
  label: Brief Artifact Path
  type: text
  required: true
- name: assessment_artifact_path
  label: Assessment Artifact Path
  type: text
  required: true
- name: pr_artifact_path
  label: Pull Request Artifact Path
  type: text
  required: true
- name: verify_artifact_path
  label: Verification Artifact Path
  type: text
  required: true
- name: verification_target
  label: Verification Target
  type: text
  required: false
  default: issue_brief
- name: remediation_max_attempts
  label: Remediation Max Attempts
  type: text
  required: false
  default: '1'
- name: constraints
  label: Constraints
  type: textarea
  required: false
  default: ''
steps:
- title: Implement the issue
  instructions: 'Read {{ inputs.assessment_artifact_path }} (or the recorded verdict
    from the assess step) before doing anything.


    If the recorded verdict is FULLY_IMPLEMENTED, make no code changes and report
    that implementation is skipped because the issue is already implemented in the
    current repository state.


    If the recorded verdict is BLOCKED, stop without changing code and report the
    blocking evidence from the assessment.


    If the recorded verdict is PARTIALLY_IMPLEMENTED, treat the assessment''s unmet
    and partially-met requirements as the authoritative bounded backlog. Finish only
    the remaining gaps. Do not redo work that is already satisfied and do not broaden
    scope.


    If the recorded verdict is NOT_IMPLEMENTED, implement the work described by {{
    inputs.issue_provider }} issue {{ inputs.issue_ref }} using the loaded issue preset
    brief as the authoritative implementation input.


    Additional constraints:

    {{ inputs.constraints }}


    Scope the implementation strictly to what the brief and acceptance criteria describe.
    Do not broaden scope, refactor unrelated code, or introduce backwards-compatibility
    shims unless the brief explicitly requires them.


    Follow the project''s testing standards: add or update tests that cover the behavior
    changes required by the brief, and confirm the relevant unit and integration tests
    pass locally before continuing.


    Preserve {{ inputs.issue_provider }} issue {{ inputs.issue_ref }} in commit messages
    and in any implementation artifacts so downstream verification and the pull request
    can reference it.'
  skill:
    id: auto
    args: {}
    requiredCapabilities:
    - git
- title: Verify implementation
  instructions: 'Read {{ inputs.assessment_artifact_path }} (or the recorded verdict
    from the assess step) before doing anything.


    If the recorded verdict is FULLY_IMPLEMENTED and the implementation step did no
    code changes, report verification as already satisfied by the initial assessment
    and skip rerunning verification.


    If the recorded verdict is BLOCKED, stop without running verification and report
    the blocking evidence from the assessment.


    Otherwise run moonspec-verify against verification target {{ inputs.verification_target
    }} for {{ inputs.issue_provider }} issue {{ inputs.issue_ref }}. The default
    verification target is issue_brief. Use {{ inputs.brief_artifact_path }} as the
    authoritative issue brief and {{ inputs.assessment_artifact_path }} as the initial
    state assessment. Do not require a MoonSpec feature directory, spec.md, plan.md,
    or tasks.md for issue_brief verification mode.


    Re-read the issue preset brief and confirm every required behavior change is implemented
    and covered by tests. Run the focused unit and integration checks named by the
    brief or implied by the changed code paths.


    If verification returns ADDITIONAL_WORK_NEEDED, produce structured remaining
    work with implementation gaps, verification gaps, required tests, and concrete
    next files or commands so the following remediation step can consume it. Do
    not modify source code or tests in this read-only verification step. Write the
    complete structured verifier result to {{ inputs.verify_artifact_path }}.


    If verification returns NO_DETERMINATION, BLOCKED, FAILED_UNRECOVERABLE, or
    ENVIRONMENT_CONTAMINATED_BY_SKILL_PROJECTION, stop and report the terminal evidence.


    Do not create a pull request until the controlling moonspec-verify verdict is
    FULLY_IMPLEMENTED and the relevant tests pass.'
  skill:
    id: moonspec-verify
    args:
      verification_target: '{{ inputs.verification_target }}'
      issue_provider: '{{ inputs.issue_provider }}'
      issue_ref: '{{ inputs.issue_ref }}'
      brief_artifact_path: '{{ inputs.brief_artifact_path }}'
      assessment_artifact_path: '{{ inputs.assessment_artifact_path }}'
      verify_artifact_path: '{{ inputs.verify_artifact_path }}'
    requiredCapabilities:
    - git
- title: Remediate verification gaps
  annotations:
    issueImplementRole: moonspec-remediation
    moonSpecRemediationAttempt: 1
    moonSpecRemediationMaxAttempts: '{{ inputs.remediation_max_attempts }}'
  instructions: 'Inspect the latest moonspec-verify result for {{ inputs.issue_provider
    }} issue {{ inputs.issue_ref }} before doing any work.


    This preset allows at most {{ inputs.remediation_max_attempts }} remediation
    attempt before the issue implementation must stop and report the remaining verifier
    evidence.


    If the latest verdict is FULLY_IMPLEMENTED, make no code changes and report
    that remediation is skipped because verification already passed.


    If the latest verdict is ADDITIONAL_WORK_NEEDED, treat the verification report''s
    gaps and remaining work as the authoritative bounded implementation backlog.
    Fix only those reported implementation or verification gaps, update or add the
    required tests, and run the focused checks named by the verification report when
    feasible.


    If the latest verdict is NO_DETERMINATION, only proceed when the missing evidence
    is recoverable in this runtime, such as by running a skipped command or inspecting
    available files. Otherwise stop and report the exact blocker. If the latest verdict
    is BLOCKED, FAILED_UNRECOVERABLE, or ENVIRONMENT_CONTAMINATED_BY_SKILL_PROJECTION,
    treat it as terminal for issue implementation remediation and do not create a
    pull request.


    Do not broaden the issue scope, do not create a pull request, and do not change
    {{ inputs.issue_provider }} issue status during remediation.'
  skill:
    id: auto
    args: {}
    requiredCapabilities:
    - git
- title: Verify remediation
  annotations:
    issueImplementRole: moonspec-verification-gate
    moonSpecRemediationAttempt: 1
    moonSpecRemediationMaxAttempts: '{{ inputs.remediation_max_attempts }}'
    moonSpecFinalRemediationGate: true
  instructions: 'Read {{ inputs.assessment_artifact_path }} and inspect the latest
    remediation result before doing anything.


    Run moonspec-verify against verification target {{ inputs.verification_target
    }} for {{ inputs.issue_provider }} issue {{ inputs.issue_ref }} after remediation,
    even when remediation was skipped because the prior verdict was FULLY_IMPLEMENTED.
    Use {{ inputs.brief_artifact_path }} as the authoritative issue brief and {{
    inputs.assessment_artifact_path }} as the initial state assessment.


    This is the controlling verification gate for pull request creation. If the verdict
    is ADDITIONAL_WORK_NEEDED or NO_DETERMINATION, stop and report the gaps or missing
    evidence; do not continue to pull request creation. If the verdict is BLOCKED,
    FAILED_UNRECOVERABLE, or ENVIRONMENT_CONTAMINATED_BY_SKILL_PROJECTION, classify
    runtime or infrastructure causes as environment failure, stop immediately, and
    do not create a pull request.


    Write the complete structured verifier result to {{ inputs.verify_artifact_path }}.
    Continue to pull request creation only when this post-remediation verdict is FULLY_IMPLEMENTED.'
  skill:
    id: moonspec-verify
    args:
      verification_target: '{{ inputs.verification_target }}'
      issue_provider: '{{ inputs.issue_provider }}'
      issue_ref: '{{ inputs.issue_ref }}'
      brief_artifact_path: '{{ inputs.brief_artifact_path }}'
      assessment_artifact_path: '{{ inputs.assessment_artifact_path }}'
      verify_artifact_path: '{{ inputs.verify_artifact_path }}'
    requiredCapabilities:
    - git
- title: Create pull request
  annotations:
    issueImplementRole: pull-request-handoff
  instructions: 'Read {{ inputs.assessment_artifact_path }} (or the recorded verdict
    from the assess step) before doing anything.


    If the recorded verdict is FULLY_IMPLEMENTED and the implementation step did no
    code changes, skip pull request creation entirely and report it as skipped because
    there is nothing new to publish. Do not write {{ inputs.pr_artifact_path }} in
    this case. The final step will move {{ inputs.issue_ref }} directly to Done.


    If the recorded verdict is BLOCKED, stop without creating a pull request and report
    the blocking evidence from the assessment.


    Otherwise create a pull request for the completed work for {{ inputs.issue_provider
    }} issue {{ inputs.issue_ref }} only after the latest controlling post-remediation
    moonspec-verify verdict is FULLY_IMPLEMENTED in {{ inputs.verify_artifact_path }}.
    If the verifier reported ADDITIONAL_WORK_NEEDED, NO_DETERMINATION, BLOCKED,
    FAILED_UNRECOVERABLE, or ENVIRONMENT_CONTAMINATED_BY_SKILL_PROJECTION, or if
    {{ inputs.remediation_max_attempts }} remediation attempt has been exhausted
    without FULLY_IMPLEMENTED, stop without creating a pull request and report the
    verifier evidence.


    This Issue Implement handoff step is the explicit PR-publication step for this
    preset. It intentionally owns pull request creation before the {{ inputs.issue_provider
    }} code review transition so the confirmed pull request URL is available to both
    {{ inputs.issue_provider }} and MoonMind publish handling. If generic managed-runtime
    guidance says not to push or create a pull request, treat this step-specific handoff
    instruction as the controlling instruction for this step only. If the workflow is
    submitted with PR merge automation enabled, the parent workflow must use the pull
    request URL produced by this step as the published PR and then run merge automation
    against that PR; on a successful merge the parent workflow will transition {{
    inputs.issue_provider }} issue {{ inputs.issue_ref }} to Done automatically. If
    the runtime instructions, workflow parameters, authentication, remote configuration,
    branch protection, or repository permissions prevent committing, pushing, or creating
    the pull request in this step, stop before changing Jira to Review and report
    the exact blocker.


    First confirm the working tree contains only intentional changes for this issue
    and no raw credentials. Commit the work with a concise message that includes {{
    inputs.issue_ref }}. Push the current non-protected work branch and create a non-draft
    pull request with the available authenticated GitHub tooling.


    The pull request must be ready for review, not a draft. Do not pass draft flags
    when creating it. If the available tool or repository default creates a draft
    pull request, immediately mark it ready for review (for example, with the authenticated
    GitHub tooling''s ready-for-review command) and verify the final pull request
    isDraft value is false before continuing.


    The pull request title must include {{ inputs.issue_ref }}. The pull request body
    must include:

    - the issue reference

    - a summary of the implementation

    - tests run

    - remaining risks


    After creation and non-draft verification, record the confirmed pull request URL
    in the step result and in a local handoff artifact at {{ inputs.pr_artifact_path
    }} with keys issue_provider, issue_ref, pull_request_url, and, for Jira compatibility
    when issue_provider is jira, jira_issue_key. Do not continue unless the pull_request_url
    is a GitHub pull request URL for the current work branch and the pull request
    is confirmed non-draft.'
  skill:
    id: auto
    args: {}
    requiredCapabilities:
    - git
