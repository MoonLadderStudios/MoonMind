<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MoonMind Mission Control</title>
  <script>
    (() => {
      const key = "moonmind.theme";
      const root = document.documentElement;
      let stored = null;

      try {
        const raw = window.localStorage ? window.localStorage.getItem(key) : null;
        stored = raw === "dark" || raw === "light" ? raw : null;
        if (raw && !stored && window.localStorage) {
          window.localStorage.removeItem(key);
        }
      } catch (_error) {
        stored = null;
      }

      const prefersDark =
        window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      const mode = stored || (prefersDark ? "dark" : "light");
      root.classList.toggle("dark", mode === "dark");
      root.dataset.theme = mode;
    })();
  </script>
  <link rel="stylesheet" href="/static/task_dashboard/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  {{ assets_html | safe }}
</head>

<body>
  <main class="dashboard-root">
    <section class="worker-pause-banner" data-worker-pause hidden aria-live="polite">
      <p>
        <span class="worker-pause-label" data-worker-pause-status>Workers: Running</span>
        <span class="worker-pause-reason" data-worker-pause-reason></span>
        <a class="worker-pause-manage" href="/tasks/workers" data-worker-pause-manage>Manage workers</a>
      </p>
    </section>

    <header class="masthead">
      <div class="masthead-copy">
        <p class="eyebrow">MoonMind Operations</p>
        <h1>Mission Control</h1>
      </div>
    </header>

    {% include "_navigation.html" %}

    <section class="panel" aria-live="polite">
      <div id="mission-control-root"></div>
    </section>
  </main>

  <script id="moonmind-ui-boot" type="application/json">
    {{ boot_payload | safe }}
  </script>
</body>

</html>
