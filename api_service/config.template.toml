# Managed by MoonMind automation
approval_policy = "never"
# Managed Codex runs are already container-sandboxed by MoonMind, so avoid
# nested bubblewrap requirements inside the worker container.
sandbox_mode = "danger-full-access"

[sandbox_workspace_write]
network_access = true

[workflow]
codex_queue = "codex"
artifact_root = "var/artifacts/workflows"

[task_proposals]
# Proposal routing defaults shared by the API and workers. These map to
# MOONMIND_PROPOSAL_TARGETS/MOONMIND_CI_REPOSITORY when sourced from env.
proposal_targets_default = "project"
moonmind_ci_repository = "MoonLadderStudios/MoonMind"
max_items_project_default = 3
max_items_moonmind_default = 2
moonmind_severity_floor_default = "high"

[feature_flags]
# Disable the Task Preset Catalog (UI + API) when required.
disable_task_template_catalog = false
# Rollout scope for the session-aware Live Logs timeline contract:
# off | internal | codex_managed | all_managed
live_logs_session_timeline_rollout = "off"
# Expose the Create-page Jira browser contract. This is separate from
# ATLASSIAN_JIRA_TOOL_ENABLED so trusted tools can be enabled without showing
# Jira controls in the browser UI.
jira_create_page_enabled = false
jira_create_page_default_project_key = ""
jira_create_page_default_board_id = ""
jira_create_page_remember_last_board_in_session = true
