openapi: 3.0.3
info:
  title: Task Run Control Surface (Phase 1)
  version: 1.0.0
  description: >-
    Current task-run control API contract aligned with worker self-heal Phase 1.
    Recovery-specific actions (`retry_step`, `hard_reset_step`, `resume_from_step`)
    are intentionally deferred.
servers:
  - url: https://api.moonmind.local
paths:
  /api/task-runs/{taskRunId}/control:
    post:
      summary: Apply pause/resume/takeover controls to a running task
      operationId: applyTaskRunControl
      parameters:
        - in: path
          name: taskRunId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRunControlRequest'
      responses:
        '200':
          description: Updated job payload including `liveControl`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobModel'
        '400':
          description: Invalid action payload
        '403':
          description: Operator lacks access to the task run
  /api/queue/jobs/{jobId}/heartbeat:
    post:
      summary: Worker heartbeat returning current live-control state
      operationId: heartbeatJob
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job snapshot with pause/takeover control metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/JobModel'
                  - type: object
                    properties:
                      payload:
                        allOf:
                          - type: object
                          - $ref: '#/components/schemas/JobPayload'
components:
  schemas:
    TaskRunControlRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [pause, resume, takeover]
    JobModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, succeeded, failed, cancelled, dead_letter]
        payload:
          $ref: '#/components/schemas/JobPayload'
    JobPayload:
      type: object
      properties:
        liveControl:
          $ref: '#/components/schemas/LiveControl'
    LiveControl:
      type: object
      properties:
        paused:
          type: boolean
        takeover:
          type: boolean
        updatedAt:
          type: string
          format: date-time
