openapi: 3.0.3
info:
  title: MoonMind Manifest Task System Phase 0
  version: 0.2.0
  description: >
    Phase 0 control-plane APIs for manifest queue submission, manifest registry
    CRUD, and registry-backed run creation. Contract reflects current runtime
    behavior in MoonMind queue/registry modules.
servers:
  - url: /api
paths:
  /queue/jobs:
    post:
      summary: Submit a manifest queue job
      operationId: createManifestQueueJob
      description: >
        Creates a queue job with `type=manifest`. Payload is normalized by the
        server contract, capability metadata is derived server-side, and invalid
        manifests fail with 422.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManifestJobCreateRequest'
      responses:
        '201':
          description: Manifest job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestJobModel'
        '422':
          description: Invalid queue payload
    get:
      summary: List queue jobs filtered to manifests
      operationId: listManifestQueueJobs
      parameters:
        - in: query
          name: type
          required: true
          schema:
            type: string
            enum: [manifest]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Manifest job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ManifestJobModel'
                required: [items]

  /manifests:
    get:
      summary: List manifest registry entries
      operationId: listManifests
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          description: Registry list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestListResponse'

  /manifests/{name}:
    get:
      summary: Fetch a manifest registry record
      operationId: getManifest
      parameters:
        - $ref: '#/components/parameters/ManifestName'
      responses:
        '200':
          description: Manifest detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestRegistryRecord'
        '404':
          description: Manifest not found
    put:
      summary: Upsert manifest YAML
      operationId: upsertManifest
      parameters:
        - $ref: '#/components/parameters/ManifestName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  minLength: 1
              required: [content]
      responses:
        '200':
          description: Manifest upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestRegistryRecord'
        '422':
          description: Invalid manifest payload

  /manifests/{name}/runs:
    post:
      summary: Submit a registry-backed manifest run
      operationId: createManifestRun
      parameters:
        - $ref: '#/components/parameters/ManifestName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManifestRunRequest'
      responses:
        '201':
          description: Manifest run queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestRunResponse'
        '404':
          description: Manifest not found
        '422':
          description: Validation error

components:
  parameters:
    ManifestName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Registry key and manifest name.

  schemas:
    ManifestJobCreateRequest:
      type: object
      properties:
        type:
          type: string
          enum: [manifest]
        priority:
          type: integer
          default: 0
        payload:
          type: object
          properties:
            manifest:
              $ref: '#/components/schemas/ManifestEnvelopeRequest'
          required: [manifest]
      required: [type, payload]

    ManifestEnvelopeRequest:
      type: object
      properties:
        name:
          type: string
        action:
          type: string
          enum: [plan, run]
          default: run
        source:
          $ref: '#/components/schemas/ManifestSourceRequest'
        options:
          $ref: '#/components/schemas/ManifestOptions'
      required: [name, source]

    ManifestSourceRequest:
      oneOf:
        - $ref: '#/components/schemas/ManifestSourceInline'
        - $ref: '#/components/schemas/ManifestSourceRegistry'
        - $ref: '#/components/schemas/ManifestSourcePath'
      discriminator:
        propertyName: kind
        mapping:
          inline: '#/components/schemas/ManifestSourceInline'
          registry: '#/components/schemas/ManifestSourceRegistry'
          path: '#/components/schemas/ManifestSourcePath'

    ManifestSourceInline:
      type: object
      properties:
        kind:
          type: string
          enum: [inline]
        content:
          type: string
          description: Raw YAML manifest body.
      required: [kind, content]

    ManifestSourceRegistry:
      type: object
      properties:
        kind:
          type: string
          enum: [registry]
        name:
          type: string
        content:
          type: string
          description: >
            YAML content snapshot used for normalization. The
            /manifests/{name}/runs endpoint populates this automatically.
      required: [kind, name, content]

    ManifestSourcePath:
      type: object
      properties:
        kind:
          type: string
          enum: [path]
        path:
          type: string
        content:
          type: string
          description: YAML content used for normalization.
      required: [kind, path, content]
      description: Supported only when server path-source flag is enabled.

    ManifestOptions:
      type: object
      properties:
        dryRun:
          type: boolean
        forceFull:
          type: boolean
        maxDocs:
          type: integer
          minimum: 1
      additionalProperties: false

    ManifestJobModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [manifest]
        status:
          type: string
          enum: [queued, running, succeeded, failed, cancelled, dead_letter]
        priority:
          type: integer
        payload:
          $ref: '#/components/schemas/SanitizedManifestPayload'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, type, status, payload, createdAt, updatedAt]

    SanitizedManifestPayload:
      type: object
      properties:
        manifest:
          $ref: '#/components/schemas/SanitizedManifestEnvelope'
        manifestHash:
          type: string
        manifestVersion:
          type: string
          enum: [v0]
        requiredCapabilities:
          type: array
          items:
            type: string
        effectiveRunConfig:
          type: object
          additionalProperties: true
        manifestSecretRefs:
          $ref: '#/components/schemas/ManifestSecretRefs'

    SanitizedManifestEnvelope:
      type: object
      properties:
        name:
          type: string
        action:
          type: string
          enum: [plan, run]
        source:
          $ref: '#/components/schemas/SanitizedManifestSource'
        options:
          $ref: '#/components/schemas/ManifestOptions'

    SanitizedManifestSource:
      type: object
      properties:
        kind:
          type: string
          enum: [inline, registry, path]
        name:
          type: string
          description: Registry name when `kind=registry`.
        path:
          type: string
          description: Path value when `kind=path`.
      required: [kind]

    ManifestSecretRefs:
      type: object
      properties:
        profile:
          type: array
          items:
            type: object
            properties:
              provider:
                type: string
              field:
                type: string
              envKey:
                type: string
              normalized:
                type: string
            required: [provider, field, envKey, normalized]
        vault:
          type: array
          items:
            type: object
            properties:
              mount:
                type: string
              path:
                type: string
              field:
                type: string
              ref:
                type: string
            required: [mount, path, field, ref]

    ManifestRegistryRecord:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        content:
          type: string
        contentHash:
          type: string
        updatedAt:
          type: string
          format: date-time
          nullable: true
        lastRun:
          type: object
          nullable: true
          properties:
            jobId:
              type: string
              format: uuid
              nullable: true
            status:
              type: string
              nullable: true
            startedAt:
              type: string
              format: date-time
              nullable: true
            finishedAt:
              type: string
              format: date-time
              nullable: true
        state:
          type: object
          properties:
            stateJson:
              type: object
              nullable: true
            stateUpdatedAt:
              type: string
              format: date-time
              nullable: true
      required: [name, content, contentHash, state]

    ManifestListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              version:
                type: string
              contentHash:
                type: string
              updatedAt:
                type: string
                format: date-time
              
              lastRunJobId:
                type: string
                format: uuid
                nullable: true
              lastRunStatus:
                type: string
                nullable: true
              stateUpdatedAt:
                type: string
                format: date-time
                nullable: true
            required: [name, version, contentHash, updatedAt]
      required: [items]

    ManifestRunRequest:
      type: object
      properties:
        action:
          type: string
          enum: [plan, run]
          default: run
        options:
          $ref: '#/components/schemas/ManifestOptions'

    ManifestRunResponse:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        queue:
          $ref: '#/components/schemas/ManifestRunQueueMetadata'
      required: [jobId, queue]

    ManifestRunQueueMetadata:
      type: object
      properties:
        type:
          type: string
          enum: [manifest]
        requiredCapabilities:
          type: array
          items:
            type: string
        manifestHash:
          type: string
          nullable: true
      required: [type, requiredCapabilities]
