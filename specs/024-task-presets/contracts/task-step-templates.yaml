openapi: 3.0.3
info:
  title: Task Step Template API (Current Snapshot)
  version: 0.2.0
paths:
  /api/task-step-templates:
    get:
      summary: List templates filtered by scope/tag/query/favorites.
      parameters:
        - $ref: '#/components/parameters/Scope'
        - $ref: '#/components/parameters/ScopeRef'
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: favoritesOnly
          schema:
            type: boolean
        - in: query
          name: includeInactive
          schema:
            type: boolean
      responses:
        '200':
          description: Template summaries
    post:
      summary: Create template (team/personal, admin for global)
      requestBody:
        required: true
      responses:
        '201':
          description: Created template metadata

  /api/task-step-templates/save-from-task:
    post:
      summary: Convert selected draft steps into a new template.
      requestBody:
        required: true
      responses:
        '201':
          description: Created template metadata

  /api/task-step-templates/{slug}:
    get:
      summary: Fetch latest version of a template by slug.
      parameters:
        - $ref: '#/components/parameters/Slug'
        - $ref: '#/components/parameters/Scope'
        - $ref: '#/components/parameters/ScopeRef'
      responses:
        '200':
          description: Template details
    delete:
      summary: Soft-delete template.
      parameters:
        - $ref: '#/components/parameters/Slug'
        - $ref: '#/components/parameters/Scope'
        - $ref: '#/components/parameters/ScopeRef'
      responses:
        '204':
          description: Deleted

  /api/task-step-templates/{slug}/versions/{version}:
    get:
      summary: Fetch a specific template version.
      parameters:
        - $ref: '#/components/parameters/Slug'
        - $ref: '#/components/parameters/Scope'
        - $ref: '#/components/parameters/ScopeRef'
        - in: path
          name: version
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Version payload
    put:
      summary: Update release status/reviewer metadata for a version.
      parameters:
        - $ref: '#/components/parameters/Slug'
        - $ref: '#/components/parameters/Scope'
        - $ref: '#/components/parameters/ScopeRef'
        - in: path
          name: version
          required: true
          schema:
            type: string
      requestBody:
        required: true
      responses:
        '200':
          description: Updated template metadata

  /api/task-step-templates/{slug}:expand:
    post:
      summary: Expand template with provided inputs/context.
      parameters:
        - $ref: '#/components/parameters/Slug'
        - $ref: '#/components/parameters/Scope'
        - $ref: '#/components/parameters/ScopeRef'
      requestBody:
        required: true
      responses:
        '200':
          description: Expanded step list and applied template metadata

  /api/task-step-templates/{slug}:favorite:
    post:
      summary: Mark template as favorite for current user.
      parameters:
        - $ref: '#/components/parameters/Slug'
      requestBody:
        required: true
      responses:
        '204':
          description: Favorited
    delete:
      summary: Remove template from favorites for current user.
      parameters:
        - $ref: '#/components/parameters/Slug'
      requestBody:
        required: true
      responses:
        '204':
          description: Unfavorited

components:
  parameters:
    Slug:
      in: path
      name: slug
      required: true
      schema:
        type: string
    Scope:
      in: query
      name: scope
      required: true
      schema:
        type: string
        enum: [global, team, personal]
    ScopeRef:
      in: query
      name: scopeRef
      required: false
      schema:
        type: string
