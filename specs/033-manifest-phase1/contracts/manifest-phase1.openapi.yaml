openapi: 3.1.0
info:
  title: Manifest Task System Phase 1 (Worker Readiness) Contracts
  version: "0.2.0"
  description: >-
    Contract slice for worker-facing manifest secret resolution and
    manifest registry checkpoint callback persistence.
servers:
  - url: https://moonmind.local
paths:
  /api/queue/jobs/{jobId}/manifest/secrets:
    post:
      summary: Resolve manifest secrets for a running claimed job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManifestSecretResolutionRequest'
      responses:
        '200':
          description: Resolved secret material and vault metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestSecretResolutionResponse'
        '403':
          description: Worker auth/capability/ownership violation
        '409':
          description: Job is not in a running state for resolution
        '422':
          description: Manifest payload/secret references are invalid or unresolved

  /api/manifests/{name}/state:
    post:
      summary: Persist manifest checkpoint state and optional run metadata
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManifestStateUpdateRequest'
      responses:
        '200':
          description: Updated manifest record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestDetailResponse'
        '404':
          description: Manifest not found

components:
  schemas:
    ManifestSecretResolutionRequest:
      type: object
      properties:
        includeProfile:
          type: boolean
          default: true
        includeVault:
          type: boolean
          default: true

    ManifestSecretProfileValue:
      type: object
      required: [envKey, value]
      properties:
        provider:
          type: string
        field:
          type: string
        envKey:
          type: string
        normalized:
          type: string
        value:
          type: string

    ManifestSecretVaultValue:
      type: object
      required: [ref]
      properties:
        mount:
          type: string
        path:
          type: string
        field:
          type: string
        ref:
          type: string

    ManifestSecretResolutionResponse:
      type: object
      properties:
        profile:
          type: array
          items:
            $ref: '#/components/schemas/ManifestSecretProfileValue'
        vault:
          type: array
          items:
            $ref: '#/components/schemas/ManifestSecretVaultValue'

    ManifestStateUpdateRequest:
      type: object
      required: [stateJson]
      properties:
        stateJson:
          type: object
          additionalProperties: true
        lastRunJobId:
          type: string
          format: uuid
        lastRunStatus:
          type: string
        lastRunStartedAt:
          type: string
          format: date-time
        lastRunFinishedAt:
          type: string
          format: date-time

    ManifestState:
      type: object
      properties:
        stateJson:
          type: object
          additionalProperties: true
        stateUpdatedAt:
          type: string
          format: date-time

    ManifestDetailResponse:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        content:
          type: string
        contentHash:
          type: string
        updatedAt:
          type: string
          format: date-time
        state:
          $ref: '#/components/schemas/ManifestState'
