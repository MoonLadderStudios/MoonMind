openapi: 3.1.0
info:
  title: Spec Automation Phase Metadata Contract
  version: 1.0.0
  description: >
    Contract for Spec Automation run detail responses that surface normalized
    skills execution metadata, including adapter-level observability.
servers:
  - url: http://localhost:8000
paths:
  /api/spec-automation/runs/{run_id}:
    get:
      summary: Get Spec Automation run detail
      operationId: getSpecAutomationRun
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Run found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecAutomationRunDetail"
        "404":
          description: Run not found
components:
  schemas:
    SpecAutomationRunDetail:
      type: object
      required:
        - run_id
        - status
        - phases
        - artifacts
      properties:
        run_id:
          type: string
          format: uuid
        status:
          type: string
        branch_name:
          type: string
          nullable: true
        pull_request_url:
          type: string
          nullable: true
        result_summary:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        phases:
          type: array
          items:
            $ref: "#/components/schemas/SpecAutomationPhaseState"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/SpecAutomationArtifactSummary"
    SpecAutomationPhaseState:
      type: object
      required:
        - phase
        - status
        - attempt
      properties:
        phase:
          type: string
        status:
          type: string
        attempt:
          type: integer
          minimum: 1
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        stdout_path:
          type: string
          nullable: true
        stderr_path:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        selected_skill:
          type: string
          nullable: true
        adapter_id:
          type: string
          nullable: true
        execution_path:
          type: string
          enum: [skill, direct_fallback, direct_only]
          nullable: true
        used_skills:
          type: boolean
          nullable: true
        used_fallback:
          type: boolean
          nullable: true
        shadow_mode_requested:
          type: boolean
          nullable: true
    SpecAutomationArtifactSummary:
      type: object
      required:
        - artifact_id
        - name
        - artifact_type
      properties:
        artifact_id:
          type: string
          format: uuid
        name:
          type: string
        artifact_type:
          type: string
        storage_path:
          type: string
          nullable: true
        content_type:
          type: string
          nullable: true
        size_bytes:
          type: integer
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        source_phase:
          type: string
          nullable: true
